<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Détails de l'événement public</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <!-- PocketBase + config -->
    <script src="js/hebergement_pb.js"></script>
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "DM Sans", sans-serif;
            background-image: url("img/page-public-manifestation-details.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header {
            background: rgba(44, 62, 80, 0.90);
            color: white;
            padding: 20px;
            text-align: center;
        }

        h1 { margin: 0; font-size: 28px; }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 10px;
        }

        .event-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.25);
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }

        .btn {
            display: inline-block;
            background: #2980b9;
            color: white;
            padding: 12px 18px;
            border-radius: 6px;
            text-decoration: none;
            margin-top: 15px;
        }

        .btn:hover { background: #1f6391; }

        .back {
            display: inline-block;
            margin-bottom: 20px;
            color: #ffffff;
            text-decoration: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
        }

        .back:hover { text-decoration: underline; }
    </style>
</head>

<body>

<header>
    <h1>Détails de l'événement public</h1>
</header>

<div class="container">

    <a href="public-manifestations.html" class="back">← Retour aux événements publics</a>

    <div id="eventContainer">
        <p style="color:white; text-shadow:0 1px 3px rgba(0,0,0,0.6);">Chargement...</p>
    </div>

</div>

<script>
    const pb = new PocketBase(window.PB_URL);

    // 🔒 Protection d’accès
    if (!pb.authStore.isValid) {
        window.location.href = "login.html";
    }

    const urlParams = new URLSearchParams(window.location.search);
    const eventId = urlParams.get("id");

    async function loadEventDetails() {
        const container = document.getElementById("eventContainer");

        if (!eventId) {
            container.innerHTML = "<p style='color:white;'>Événement introuvable.</p>";
            return;
        }

        try {
            const ev = await pb.collection("planning_events").getOne(eventId);

            const imgUrl = ev.image
                ? pb.files.getUrl(ev, ev.image)
                : "https://via.placeholder.com/900x300?text=Événement";

            container.innerHTML = `
                <img src="${imgUrl}" class="event-image" alt="Image événement">

                <div class="card">
                    <h2>${ev.titre}</h2>

                    <p><strong>📅 Du :</strong> ${ev.date_debut}</p>
                    <p><strong>📅 Au :</strong> ${ev.date_fin}</p>

                    <p><strong>📍 Lieu :</strong> ${ev.lieu || "Non spécifié"}</p>

                    <p><strong>Description :</strong><br>${ev.description_longue || ev.description_courte || ""}</p>

                    <a class="btn" href="public-manifestation-inscription.html?id=${ev.id}">
                        S'inscrire à cet événement
                    </a>
                </div>
            `;

        } catch (error) {
            console.error(error);
            container.innerHTML = "<p style='color:white;'>Impossible de charger l'événement.</p>";
        }
    }

    loadEventDetails();
</script>

</body>
</html>
