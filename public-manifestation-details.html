<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails de l'événement public</title>

    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 28px;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 10px;
        }

        .event-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            background: #2980b9;
            color: white;
            padding: 12px 18px;
            border-radius: 6px;
            text-decoration: none;
            margin-top: 15px;
        }

        .btn:hover {
            background: #1f6391;
        }

        .back {
            display: inline-block;
            margin-bottom: 20px;
            color: #2c3e50;
            text-decoration: none;
        }

        .back:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<header>
    <h1>Détails de l'événement public</h1>
</header>

<div class="container">

    <a href="public-manifestations.html" class="back">← Retour aux événements publics</a>

    <div id="eventContainer">
        <p>Chargement...</p>
    </div>

</div>

<script>
    const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

    // Récupération de l'ID dans l'URL
    const urlParams = new URLSearchParams(window.location.search);
    const eventId = urlParams.get("id");

    async function loadEventDetails() {
        const container = document.getElementById("eventContainer");

        if (!eventId) {
            container.innerHTML = "<p>Événement introuvable.</p>";
            return;
        }

        try {
            const ev = await pb.collection("planning_events").getOne(eventId);

            const imgUrl = ev.image
                ? pb.files.getUrl(ev, ev.image)
                : "https://via.placeholder.com/900x300?text=Événement";

            container.innerHTML = `
                <img src="${imgUrl}" class="event-image" alt="Image événement">

                <div class="card">
                    <h2>${ev.titre}</h2>

                    <p><strong>📅 Du :</strong> ${ev.date_debut}</p>
                    <p><strong>📅 Au :</strong> ${ev.date_fin}</p>

                    <p><strong>📍 Lieu :</strong> ${ev.lieu || "Non spécifié"}</p>

                    <p><strong>Description :</strong><br>${ev.description_longue || ev.description_courte || ""}</p>

                    <a class="btn" href="public-manifestation-inscription.html?id=${ev.id}">
                        S'inscrire à cet événement
                    </a>
                </div>
            `;

        } catch (error) {
            console.error(error);
            container.innerHTML = "<p>Impossible de charger les détails de l'événement.</p>";
        }
    }

    loadEventDetails();
</script>

</body>
</html>
