<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des inscrits – Responsable</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- SheetJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("img/page-manifestations.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: "DM Sans", sans-serif;
        }

        /* HEADER */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
        }

        .header-left {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .header-center {
            flex: 1;
            text-align: center;
        }

        .header-title {
            color: white;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 0 0 10px black;
        }

        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* PAGE */
        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 120px 20px 40px 20px;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 5px;
            text-shadow: 0 0 10px black;
        }

        #totalInscrits {
            text-align: center;
            color: #fff7c2;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 8px 12px;
            border-radius: 6px;
            background: #7b0f23;
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #9c1a33;
        }

        .btn-delete {
            background: #d50000 !important;
        }

        .btn-delete:hover {
            background: #9b0000 !important;
        }

        .btn-text-delete {
            background: transparent;
            color: #d50000;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-text-delete:hover {
            color: #9b0000;
            text-decoration: underline;
        }

        table {
            width: 100%;
            max-width: 900px;
            margin: 20px auto;
            border-collapse: collapse;
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #7b0f23;
            color: white;
            cursor: pointer;
        }

        tr:hover {
            background: #f2f2f2;
        }

        .inline-controls {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .small-btn {
            padding: 4px 8px;
            font-size: 12px;
        }

        #selectCompanion {
            background: white;
            color: black;
            border: 1px solid #aaa;
            padding: 6px;
            border-radius: 6px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">

    <div class="header-left">
        <a href="index.html" class="btn">🏠 Menu</a>
        <a href="compagnons.html" class="btn">📋 Liste des manifestations</a>
    </div>

    <div class="header-center">
        <div class="header-title">Gestion des inscrits</div>
    </div>

    <div class="header-right">
        <button class="btn" onclick="exportPDF()">PDF</button>
        <button class="btn" onclick="exportExcel()">Excel</button>
    </div>

</div>

<div class="overlay">

    <h1 id="manifestTitle">Liste des inscrits</h1>
    <div id="totalInscrits"></div>

    <!-- FORMULAIRE AJOUT INSCRIPTION -->
    <div id="addForm" style="text-align:center; margin-bottom:20px;">
        <button class="btn" onclick="toggleAddForm()">➕ Ajouter une inscription</button>

        <div id="addZone" style="display:none; margin-top:15px;">
            <select id="selectCompanion"></select>
            <input type="number" id="nbPersonnesAdd" min="1" value="1" class="btn" style="width:80px;">
            <button class="btn" onclick="ajouterInscription()">Valider</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th onclick="sortTable('nom')">Nom</th>
                <th onclick="sortTable('prenom')">Prénom</th>
                <th onclick="sortTable('email')">Email</th>
                <th onclick="sortTable('nb_personnes')">Nb pers.</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="inscritsBody"></tbody>
    </table>
</div>

<!-- PocketBase centralisé -->
<script src="js/pocketbase.umd.js"></script>
<script src="js/hebergement_pb.js"></script>

<!-- Auth -->
<script src="js/auth.js"></script>

<script>
    const pb = new PocketBase(window.PB_URL);

    const url = new URL(window.location.href);
    const manifestationId = url.searchParams.get("id");

    const user = pb.authStore.model;

    if (!user) {
        alert("Veuillez vous connecter.");
        window.location.href = "index.html";
    }

    let manifestation = null;
    let inscrits = [];
    let filtered = [];
    let sortDirection = 1;

    async function loadInscrits() {
        const tbody = document.getElementById("inscritsBody");
        tbody.innerHTML = "<tr><td colspan='5'>Chargement...</td></tr>";

        try {
            manifestation = await pb.collection("manifestations").getOne(manifestationId, {
                expand: "responsables"
            });

            const responsables = manifestation.expand?.responsables || [];
            const estResponsable = responsables.some(r => r.id === user.id);

            if (!estResponsable) {
                alert("Accès refusé : vous n'êtes pas responsable de cette manifestation.");
                window.location.href = "compagnons.html";
                return;
            }

            const d = new Date(manifestation.date);
            const dateAff = d.toLocaleDateString("fr-CH");
            const heureAff = manifestation.date.split(" ")[1].slice(0,5);

            document.getElementById("manifestTitle").textContent =
                `Inscrits – ${manifestation.title} le ${dateAff} à ${heureAff}`;

            inscrits = await pb.collection("inscriptions").getFullList({
                filter: `manifestation = "${manifestationId}"`,
                expand: "companion"
            });

            filtered = inscrits;

            updateTotal();
            displayTable();
            loadCompanionsNotInscribed();

        } catch (err) {
            console.error(err);
            tbody.innerHTML = "<tr><td colspan='5'>Erreur de chargement</td></tr>";
        }
    }

    function updateTotal() {
        const totalPersonnes = filtered.reduce((sum, i) => sum + (i.nb_personnes || 1), 0);

        document.getElementById("totalInscrits").innerHTML =
            `Total inscrits : ${filtered.length}<br>
             Total personnes : <strong>${totalPersonnes}</strong>`;
    }

    function displayTable() {
        const tbody = document.getElementById("inscritsBody");
        tbody.innerHTML = "";

        filtered.forEach(i => {
            const c = i.expand?.companion;

            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${c?.nom || "-"}</td>
                <td>${c?.prenom || "-"}</td>
                <td>${c?.email_public || "-"}</td>
                <td>
                    <div class="inline-controls">
                        <button class="btn small-btn" onclick="modifierNb('${i.id}', -1)">–</button>
                        <strong>${i.nb_personnes || 1}</strong>
                        <button class="btn small-btn" onclick="modifierNb('${i.id}', 1)">+</button>
                    </div>
                </td>
                <td>
                    <button class="btn-text-delete" onclick="deleteInscrit('${i.id}')">Supprimer</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    function sortTable(field) {
        sortDirection *= -1;

        filtered.sort((a, b) => {
            const ca = a.expand?.companion;
            const cb = b.expand?.companion;

            if (field === "nb_personnes") {
                return ((a.nb_personnes || 1) - (b.nb_personnes || 1)) * sortDirection;
            }

            return (ca?.[field] || "").localeCompare(cb?.[field] || "") * sortDirection;
        });

        displayTable();
    }

    async function modifierNb(id, delta) {
        const inscription = inscrits.find(i => i.id === id);
        let nb = inscription.nb_personnes || 1;

        nb += delta;
        if (nb < 1) nb = 1;

        try {
            await pb.collection("inscriptions").update(id, { nb_personnes: nb });
            loadInscrits();
        } catch (err) {
            alert("Erreur lors de la modification.");
            console.error(err);
        }
    }

    async function deleteInscrit(id) {
        if (!confirm("Voulez-vous vraiment supprimer cette inscription ?")) return;

        try {
            await pb.collection("inscriptions").delete(id);
            loadInscrits();
        } catch (err) {
            alert("Erreur lors de la suppression.");
            console.error(err);
        }
    }

    function toggleAddForm() {
        const zone = document.getElementById("addZone");
        zone.style.display = zone.style.display === "none" ? "block" : "none";
    }

    async function loadCompanionsNotInscribed() {
        const allCompanions = await pb.collection("companions").getFullList();
        const inscritsIds = inscrits.map(i => i.companion);

        const notInscribed = allCompanions.filter(c => !inscritsIds.includes(c.id));

        const select = document.getElementById("selectCompanion");
        select.innerHTML = "";

        notInscribed
            .sort((a,b) => a.nom.localeCompare(b.nom))
            .forEach(c => {
                const opt = document.createElement("option");
                opt.value = c.id;
                opt.textContent = `${c.nom} ${c.prenom}`;
                select.appendChild(opt);
            });
    }

    async function ajouterInscription() {
        const compId = document.getElementById("selectCompanion").value;
        const nb = parseInt(document.getElementById("nbPersonnesAdd").value);

        if (!compId) {
            alert("Veuillez choisir un compagnon.");
            return;
        }

        try {
            await pb.collection("inscriptions").create({
                manifestation: manifestationId,
                companion: compId,
                nb_personnes: nb
            });

            loadInscrits();
            toggleAddForm();

        } catch (err) {
            alert("Erreur lors de l'ajout.");
            console.error(err);
        }
    }

    function formatFileName() {
        const cleanTitle = manifestation.title
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
            .replace(/[^a-zA-Z0-9]/g, "_");

        return `${cleanTitle}_${manifestation.date}`;
    }

    function exportPDF() {
        if (filtered.length === 0) return;

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        let y = 10;

        doc.text(`Manifestation : ${manifestation.title}`, 10, y); y += 8;
        doc.text(`Date : ${manifestation.date}`, 10, y); y += 12;

        filtered.forEach(i => {
            const c = i.expand?.companion;
            doc.text(
                `${c?.nom || "-"} ${c?.prenom || "-"} – ${c?.email_public || "-"} – ${i.nb_personnes || 1} pers.`,
                10,
                y
            );
            y += 8;
        });

        doc.save(formatFileName() + ".pdf");
    }

    function exportExcel() {
        if (filtered.length === 0) return;

        const data = filtered.map(i => {
            const c = i.expand?.companion;
            return {
                Nom: c?.nom || "-",
                Prénom: c?.prenom || "-",
                Email: c?.email_public || "-",
                "Nb personnes": i.nb_personnes || 1
            };
        });

        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Inscrits");

        XLSX.writeFile(wb, formatFileName() + ".xlsx");
    }

    loadInscrits();
</script>

</body>
</html>
