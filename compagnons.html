<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mes manifestations</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <!-- ⭐ PocketBase centralisé -->
    <script src="js/pocketbase.umd.js"></script>
    <script src="js/hebergement_pb.js"></script>

    <!-- Auth -->
    <script src="js/auth.js"></script>

    <!-- ⭐ Initialisation PocketBase -->
    <script>
        const pb = new PocketBase(window.PB_URL);
    </script>

    <style>
        body {
            margin: 0;
            font-family: "DM Sans", sans-serif;
            background-image: url("img/page-compagnons.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .overlay {
            background: rgba(0,0,0,0.55);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .btn {
            padding: 8px 12px;
            border-radius: 6px;
            background: white;
            color: #7b0f23;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:hover {
            background: #ffe6ea;
        }

        .container {
            padding: 110px 20px 40px 20px;
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            position: relative;
        }

        .badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #28a745;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .card h2 {
            margin: 0;
            color: #7b0f23;
        }

        .info {
            margin: 8px 0;
            color: #444;
        }

        .desc {
            margin: 8px 0 12px 0;
            font-size: 15px;
            color: #333;
            font-style: italic;
        }

        .status {
            font-weight: bold;
            margin-top: 10px;
        }

        .btn-action {
            margin-top: 10px;
            padding: 10px 14px;
            border-radius: 6px;
            background: #7b0f23;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-action:hover {
            background: #9c1a33;
        }
    </style>
</head>

<body>

<div class="overlay">

    <div class="header">

        <div style="display:flex; gap:10px; align-items:center;">
            <a href="index.html" class="btn">Menu</a>
            <a id="btnAdmin" href="admin/admin-menu.html" class="btn" style="display:none;">Menu admin</a>
            <a id="btnNew" href="admin/admin-manifestation-nouveau.html" class="btn" style="display:none;">+ Nouvelle manifestation</a>
        </div>

        <div style="font-size:22px;font-weight:bold;">Mes manifestations</div>

        <button class="btn" onclick="logout()">Déconnexion</button>

    </div>

    <div class="container" id="manifestList">
        Chargement des manifestations...
    </div>

</div>

<script>
    requireCompanion();

    const user = pb.authStore.model;
    const isComite = (user.role === "comite" && user.collectionName === "users");

    if (isComite) {
        document.getElementById("btnAdmin").style.display = "inline-block";
        document.getElementById("btnNew").style.display = "inline-block";
    }

    async function loadManifestations() {
        const container = document.getElementById("manifestList");
        container.innerHTML = "Chargement...";

        try {
            const now = new Date();

            const manifestations = await pb.collection("manifestations").getFullList({
                sort: "date",
                expand: "responsables"
            });

            const inscriptions = await pb.collection("inscriptions").getFullList({
                filter: `companion = "${user.id}"`,
                expand: "manifestation"
            });

            container.innerHTML = "";

            const futures = manifestations.filter(m => {
                const d = new Date(m.date);
                return !isNaN(d.getTime()) && d >= now;
            });

            futures.forEach(m => {

                const d = new Date(m.date);
                const dateAff = d.toLocaleDateString("fr-CH");

                let heureAff = "";
                if (typeof m.date === "string" && m.date.includes(" ")) {
                    const parts = m.date.split(" ");
                    if (parts[1]) heureAff = parts[1].slice(0,5);
                }

                const limite = new Date(m.date_limite);
                const limiteAff = !isNaN(limite.getTime())
                    ? limite.toLocaleDateString("fr-CH")
                    : "Non définie";

                const limiteDepassee = (!isNaN(limite.getTime()) && now > limite);

                let responsable = "Non défini";
                if (m.expand?.responsables?.length > 0) {
                    responsable = m.expand.responsables
                        .map(r => `${r.nom} ${r.prenom} (${r.initiales || ""})`)
                        .join(", ");
                }

                const inscription = inscriptions.find(i =>
                    i.manifestation === m.id ||
                    (i.expand && i.expand.manifestation && i.expand.manifestation.id === m.id)
                );

                const estInscrit = Boolean(inscription);

                let badge = "";
                let status = "";
                let actionBtn = "";

                if (!isComite) {
                    if (estInscrit) {
                        badge = `<div class="badge">INSCRIT</div>`;
                        status = `<div class="status" style="color:green;">✔ Inscrit (${inscription.nb_personnes} pers.)</div>`;

                        if (limiteDepassee) {
                            actionBtn = `
                                <div style="
                                    margin-top:15px;
                                    padding:12px;
                                    background:#fff3cd;
                                    border-left:6px solid #ffca2c;
                                    border-radius:6px;
                                    color:#664d03;
                                    font-weight:bold;
                                    text-align:center;
                                    font-size:16px;
                                ">
                                    ⛔ Date limite dépassée.<br>
                                    En cas de modification, veuillez contacter l'organisateur.
                                </div>
                            `;
                        } else {
                            actionBtn = `
                                <button class="btn-action" onclick="goTo('${m.id}', '${inscription.id}')">Modifier mon inscription</button>
                                <button class="btn-action" style="background:#444;" onclick="desinscrire('${inscription.id}')">Se désinscrire</button>
                            `;
                        }

                    } else {
                        status = `<div class="status" style="color:#7b0f23;">✖ Non inscrit</div>`;

                        if (!limiteDepassee) {
                            actionBtn = `<button class="btn-action" onclick="goTo('${m.id}', '')">S’inscrire</button>`;
                        } else {
                            actionBtn = `
                                <div style="
                                    margin-top:15px;
                                    padding:12px;
                                    background:#fff3cd;
                                    border-left:6px solid #ffca2c;
                                    border-radius:6px;
                                    color:#664d03;
                                    font-weight:bold;
                                    text-align:center;
                                    font-size:16px;
                                ">
                                    ⛔ Date limite dépassée.<br>
                                    Inscription impossible.
                                </div>
                            `;
                        }
                    }
                }

                container.innerHTML += `
                    <div class="card">
                        ${badge}
                        <h2>${m.title}</h2>

                        <div class="desc">${m.description || "Aucune description."}</div>

                        <div class="info" style="display:flex; justify-content:space-between; align-items:center;">
                            <span>📅 ${dateAff}${heureAff ? " à " + heureAff : ""}</span>
                            <span>⏳ Date limite : ${limiteAff}</span>
                        </div>

                        <div class="info">📌 Organisateur : ${responsable}</div>

                        ${status}
                        ${actionBtn}

                        <button class="btn-action" style="background:#555;margin-top:15px;"
                            onclick="window.location.href='liste-inscrits-compagnon.html?id=${m.id}'">
                            Voir la liste des inscrits
                        </button>
                    </div>
                `;
            });

            if (futures.length === 0) {
                container.innerHTML = "Aucune manifestation à venir.";
            }

        } catch (err) {
            container.innerHTML = "Erreur de chargement.";
        }
    }

    function goTo(manifestId, inscriptionId) {
        window.location.href = `compagnon-inscription.html?m=${manifestId}&i=${inscriptionId}`;
    }

    async function desinscrire(id) {
        if (!confirm("Voulez-vous vraiment vous désinscrire ?")) return;
        await pb.collection("inscriptions").delete(id);
        loadManifestations();
    }

    loadManifestations();
</script>

</body>
</html>
