<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mes manifestations</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
    <script src="js/auth.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "DM Sans", sans-serif;
            background-image: url("img/page-compagnons.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .overlay {
            background: rgba(0,0,0,0.55);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .btn {
            padding: 8px 12px;
            border-radius: 6px;
            background: white;
            color: #7b0f23;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:hover {
            background: #ffe6ea;
        }

        .container {
            padding: 110px 20px 40px 20px;
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            position: relative;
        }

        .badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #28a745;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .card h2 {
            margin: 0;
            color: #7b0f23;
        }

        .info {
            margin: 8px 0;
            color: #444;
        }

        .desc {
            margin: 8px 0 12px 0;
            font-size: 15px;
            color: #333;
            font-style: italic;
        }

        .status {
            font-weight: bold;
            margin-top: 10px;
        }

        .btn-action {
            margin-top: 10px;
            padding: 10px 14px;
            border-radius: 6px;
            background: #7b0f23;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-action:hover {
            background: #9c1a33;
        }

        .btn-disabled {
            background: #aaa !important;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

<div class="overlay">

    <div class="header">
        <a href="index.html" class="btn">Menu</a>

        <a id="btnAdmin" href="admin/admin-menu.html" class="btn" style="display:none;">Menu admin</a>

        <div style="font-size:22px;font-weight:bold;">Mes manifestations</div>
        <button class="btn" onclick="logout()">Déconnexion</button>
    </div>

    <div class="container" id="manifestList">
        Chargement des manifestations...
    </div>

</div>

<script>
    requireCompanion();

    const role = pb.authStore.model.role;
    const hideInscription = (role !== "compagnon");

    if (!hideInscription) {
        document.getElementById("btnAdmin").style.display = "none";
    } else {
        document.getElementById("btnAdmin").style.display = "inline-block";
    }

    async function loadManifestations() {
        const container = document.getElementById("manifestList");
        container.innerHTML = "Chargement...";

        try {
            const now = new Date();

            const manifestations = await pb.collection("manifestations").getFullList({
                sort: "date",
                expand: "responsables"
            });

            const inscriptions = await pb.collection("inscriptions").getFullList({
                filter: `companion = "${pb.authStore.model.id}"`,
                expand: "manifestation"
            });

            container.innerHTML = "";

            const futures = manifestations.filter(m => {
                const d = new Date(m.date);
                return !isNaN(d.getTime()) && d >= now;
            });

            futures.forEach(m => {
                const d = new Date(m.date);
                const dateAff = d.toLocaleDateString("fr-CH");

                let heureAff = "";
                if (typeof m.date === "string" && m.date.includes(" ")) {
                    const parts = m.date.split(" ");
                    if (parts[1]) heureAff = parts[1].slice(0,5);
                }

                const limite = new Date(m.date_limite);
                const limiteAff = !isNaN(limite.getTime())
                    ? limite.toLocaleDateString("fr-CH")
                    : "Non définie";
                const isClosed = !isNaN(limite.getTime()) && now > limite;

                let responsable = "Non défini";
                if (m.expand?.responsables?.length > 0) {
                    responsable = m.expand.responsables
                        .map(r => `${r.nom} ${r.prenom} (${r.initiales || ""})`)
                        .join(", ");
                }

                const inscription = inscriptions.find(i =>
                    i.manifestation === m.id ||
                    (i.expand && i.expand.manifestation && i.expand.manifestation.id === m.id)
                );

                const estInscrit = Boolean(inscription);

                let badge = estInscrit ? `<div class="badge">INSCRIT</div>` : "";

                let status = estInscrit
                    ? `<div class="status" style="color:green;">✔ Inscrit (${inscription.nb_personnes} pers.)</div>`
                    : `<div class="status" style="color:#7b0f23;">✖ Non inscrit</div>`;

                let actionBtn = "";

                if (estInscrit) {
                    if (isClosed) {
                        actionBtn = `<button class="btn-action btn-disabled">Modification impossible (date limite dépassée)</button>`;
                    } else {
                        actionBtn = `
                            <button class="btn-action" onclick="goTo('${m.id}', '${inscription.id}')">Modifier mon inscription</button>
                            <button class="btn-action" style="background:#444;" onclick="desinscrire('${inscription.id}')">Se désinscrire</button>
                        `;
                    }
                } else {
                    if (isClosed) {
                        actionBtn = `<button class="btn-action btn-disabled">Inscriptions fermées</button>`;
                    } else {
                        actionBtn = `<button class="btn-action" onclick="goTo('${m.id}', '')">S’inscrire</button>`;
                    }
                }

                container.innerHTML += `
                    <div class="card">

                        ${hideInscription ? "" : badge}

                        <h2>${m.title}</h2>

                        <div class="desc">${m.description || "Aucune description."}</div>

                        <div class="info" style="display:flex; justify-content:space-between; align-items:center;">
                            <span>📅 ${dateAff}${heureAff ? " à " + heureAff : ""}</span>
                            <span>⏳ Date limite : ${limiteAff}</span>
                        </div>
                        
                        <div class="info">📌 Organisateur : ${responsable}</div>

                        ${hideInscription ? "" : status}
                        ${hideInscription ? "" : actionBtn}

                        <button class="btn-action" style="background:#555;margin-top:15px;"
                            onclick="window.location.href='liste-inscrits-compagnon.html?id=${m.id}'">
                            Voir la liste des inscrits
                        </button>
                    </div>
                `;
            });

            if (futures.length === 0) {
                container.innerHTML = "Aucune manifestation à venir.";
            }

        } catch (err) {
            container.innerHTML = "Erreur de chargement.";
            console.error(err);
        }
    }

    function goTo(manifestId, inscriptionId) {
        window.location.href = `compagnon-inscription.html?m=${manifestId}&i=${inscriptionId}`;
    }

    async function desinscrire(id) {
        if (!confirm("Voulez-vous vraiment vous désinscrire ?")) return;

        try {
            await pb.collection("inscriptions").delete(id);
            loadManifestations();
        } catch (err) {
            console.error(err);
            alert("Impossible de se désinscrire.");
        }
    }

    loadManifestations();
</script>

</body>
</html>
