<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des compagnons</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <!-- SheetJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("img/page-admin-compagnons.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            text-shadow: 0 0 10px black;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
            margin-right: 10px;
        }

        .btn:hover {
            background: #5A000C;
        }

        .top-bar {
            width: 95%;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #searchInput {
            padding: 10px;
            width: 260px;
            border-radius: 6px;
            border: none;
            font-size: 15px;
        }

        table {
            width: 95%;
            margin: 0 auto;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #7A0010;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        tr:hover {
            background: rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>
    <div class="overlay">
        <h1>Liste des compagnons</h1>

        <div class="top-bar">
            <a href="index.html" class="btn">Menu</a>

            <div>
                <button class="btn" onclick="exportPDF()">Export PDF</button>
                <button class="btn" onclick="exportExcel()">Export Excel</button>
            </div>

            <input type="text" id="searchInput" placeholder="Recherche...">
        </div>

        <table id="tableCompagnons">
            <thead>
                <tr>
                    <th onclick="sortTable(0)">Nom</th>
                    <th onclick="sortTable(1)">Prénom</th>
                    <th onclick="sortTable(2)">Initiales</th>
                    <th onclick="sortTable(3)">Fonction</th>
                    <th onclick="sortTable(4)">Adresse</th>
                    <th onclick="sortTable(5)">N° postal</th>
                    <th onclick="sortTable(6)">Lieu</th>
                    <th onclick="sortTable(7)">Email</th>
                    <th onclick="sortTable(8)">Téléphone</th>
                    <th>Détails</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <script>
        const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

        if (!pb.authStore.isValid) {
            window.location.href = "login.html";
        }

        let allCompagnons = [];

        async function chargerCompagnons() {
            const tbody = document.querySelector("#tableCompagnons tbody");
            tbody.innerHTML = "<tr><td colspan='10'>Chargement...</td></tr>";

            try {
                allCompagnons = await pb.collection("companions").getFullList({ sort: "nom" });
                afficherTable(allCompagnons);
            } catch (err) {
                tbody.innerHTML = "<tr><td colspan='10'>Erreur lors du chargement.</td></tr>";
                console.error(err);
            }
        }

        function afficherTable(data) {
            const tbody = document.querySelector("#tableCompagnons tbody");
            tbody.innerHTML = "";

            data.forEach(c => {
                const tr = document.createElement("tr");

                tr.innerHTML = `
                    <td>${c.nom || ""}</td>
                    <td>${c.prenom || ""}</td>
                    <td>${c.initiales || ""}</td>
                    <td>${c.fonction || ""}</td>
                    <td>${c.adresse || ""}</td>
                    <td>${c.npa || ""}</td>
                    <td>${c.lieu || ""}</td>
                    <td>${c.email_public || ""}</td>
                    <td>${c.telephone || ""}</td>
                    <td>
                        <a class="btn" href="compagnon-details.html?id=${c.id}">
                            Détails
                        </a>
                    </td>
                `;

                tbody.appendChild(tr);
            });
        }

        chargerCompagnons();

        /* 🔍 Recherche instantanée */
        document.getElementById("searchInput").addEventListener("keyup", function () {
            const q = this.value.toLowerCase();
            const filtered = allCompagnons.filter(c =>
                JSON.stringify(c).toLowerCase().includes(q)
            );
            afficherTable(filtered);
        });

        /* 🔼 Tri dynamique */
        function sortTable(col) {
            const tbody = document.querySelector("#tableCompagnons tbody");
            const rows = Array.from(tbody.querySelectorAll("tr"));

            const sorted = rows.sort((a, b) => {
                const A = a.children[col].innerText.toLowerCase();
                const B = b.children[col].innerText.toLowerCase();
                return A.localeCompare(B, "fr");
            });

            tbody.innerHTML = "";
            sorted.forEach(r => tbody.appendChild(r));
        }

        /* 📄 Export PDF */
        function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: "landscape" });

    const rows = allCompagnons.map(c => [
        c.nom || "",
        c.prenom || "",
        c.initiales || "",
        c.fonction || "",
        c.adresse || "",
        c.npa || "",
        c.lieu || "",
        c.email_public || "",
        c.telephone || ""
    ]);

    doc.text("Liste des compagnons", 14, 12);

    doc.autoTable({
        head: [[
            "Nom", "Prénom", "Initiales", "Fonction",
            "Adresse", "N° postal", "Lieu", "Email", "Téléphone"
        ]],
        body: rows,
        startY: 22, // ⬅️ > 20, donc reste sur la même page
        theme: "grid",
        headStyles: {
            fillColor: [122, 0, 16],
            textColor: 255,
            fontStyle: "bold"
        },
        styles: {
            fontSize: 8,
            cellPadding: 2,
            lineHeight: 1.1,
            overflow: "linebreak"
        },
        columnStyles: {
            0: { cellWidth: 25 },
            1: { cellWidth: 25 },
            2: { cellWidth: 15 },
            3: { cellWidth: 25 },
            4: { cellWidth: 40 },
            5: { cellWidth: 15 },
            6: { cellWidth: 25 },
            7: { cellWidth: 45 },
            8: { cellWidth: 35 }
        }
    });

    doc.save("liste_compagnons.pdf");
}

        /* 📊 Export Excel */
        function exportExcel() {
    const data = allCompagnons.map(c => ({
        Nom: c.nom,
        Prénom: c.prenom,
        Initiales: c.initiales,
        Fonction: c.fonction,
        Adresse: c.adresse,
        "N° postal": c.npa,
        Lieu: c.lieu,
        Email: c.email_public,
        Téléphone: c.telephone
    }));

    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Compagnons");

    XLSX.writeFile(wb, "liste_compagnons.xlsx");
}

    </script>
</body>
</html>
