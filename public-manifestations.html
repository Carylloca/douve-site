<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Événements publics</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "DM Sans", sans-serif;
            background-image: url("img/page-public-manifestations.jpg"); /* ✔ tu gardes ton style */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header {
            background: rgba(44, 62, 80, 0.9);
            color: white;
            padding: 20px;
            text-align: center;
        }

        h1 { margin: 0; font-size: 28px; }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 10px;
        }

        .event-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        .event-info h2 { margin-top: 0; color: #2c3e50; }
        .event-info p { margin: 6px 0; }

        .btn {
            display: inline-block;
            background: #2980b9;
            color: white;
            padding: 10px 16px;
            border-radius: 6px;
            text-decoration: none;
            margin-top: 10px;
        }

        .btn:hover { background: #1f6391; }

        .no-events {
            text-align: center;
            font-size: 20px;
            color: #fff;
            margin-top: 40px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
        }
    </style>
</head>

<body>

<header>
    <h1>Événements publics</h1>
</header>

<div class="container" id="eventsContainer">
    <p class="no-events">Chargement des événements publics...</p>
</div>

<script>
const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

async function loadManifestations() {
    const container = document.getElementById("eventsContainer");

    container.innerHTML = "<p class='no-events'>Chargement...</p>";

    try {
        const events = await pb.collection("manifestations").getFullList({
            filter: `public = true`,
            sort: "-date_debut"
        });

        if (events.length === 0) {
            container.innerHTML = "<p class='no-events'>Aucun événement public pour le moment.</p>";
            return;
        }

        container.innerHTML = "";

        events.forEach(ev => {
            const date = new Date(ev.date_debut).toLocaleDateString("fr-FR", {
                weekday: "long",
                day: "numeric",
                month: "long",
                year: "numeric"
            });

            container.innerHTML += `
                <div class="event-card">
                    <div class="event-info">
                        <h2>${ev.titre}</h2>
                        <p><strong>Date :</strong> ${date}</p>
                        <p>${ev.description || ""}</p>
                        <a href="public-manifestation-details.html?id=${ev.id}" class="btn">Voir</a>
                    </div>
                </div>
            `;
        });

    } catch (err) {
        console.error(err);
        container.innerHTML = "<p class='no-events'>Erreur lors du chargement.</p>";
    }
}

loadManifestations();
</script>

</body>
</html>
