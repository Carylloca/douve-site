<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription à l'événement</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "DM Sans", sans-serif;
            background-image: url("img/page-public-manifestation-inscription.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header {
            background: rgba(44, 62, 80, 0.90);
            color: white;
            padding: 20px;
            text-align: center;
        }

        h1 { margin: 0; font-size: 28px; }

        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 10px;
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }

        label { font-weight: bold; display: block; margin-top: 15px; }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        textarea { resize: vertical; height: 100px; }

        .btn {
            display: inline-block;
            background: #2980b9;
            color: white;
            padding: 12px 18px;
            border-radius: 6px;
            text-decoration: none;
            margin-top: 20px;
            cursor: pointer;
            border: none;
            font-size: 16px;
        }

        .btn:hover { background: #1f6391; }

        .back {
            display: inline-block;
            margin-bottom: 20px;
            color: #ffffff;
            text-decoration: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
        }

        .back:hover { text-decoration: underline; }

        #feedback { margin-top: 15px; font-weight: bold; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>

<body>

<header>
    <h1>Inscription à l'événement</h1>
</header>

<div class="container">

    <a href="public-manifestation-details.html?id=" class="back" id="backBtn">← Retour</a>

    <div class="card">
        <h2 id="eventTitle">Chargement...</h2>

        <form id="inscriptionForm" onsubmit="inscrirePersonne(event)">

            <label>Nom</label>
            <input type="text" id="nom" required>

            <label>Prénom</label>
            <input type="text" id="prenom" required>

            <label>Jour</label>
            <select id="jour" required></select>

            <label>Créneau</label>
            <select id="creneau" required></select>

            <label>Poste souhaité (optionnel)</label>
            <select id="poste">
                <option value="">— Aucun —</option>
            </select>

            <label>Commentaire (optionnel)</label>
            <textarea id="commentaire"></textarea>

            <button class="btn" type="submit">Valider l'inscription</button>

            <p id="feedback"></p>
        </form>
    </div>

</div>

<script src="js/inscription.js"></script>

<script>
    // pb est déjà déclaré dans inscription.js

    const urlParams = new URLSearchParams(window.location.search);
    const eventId = urlParams.get("id");

    document.getElementById("backBtn").href =
        "public-manifestation-details.html?id=" + eventId;

    // Charger le titre de l'événement
    async function chargerTitre() {
        const ev = await pb.collection("planning_events").getOne(eventId, {
            requestKey: null
        });
        document.getElementById("eventTitle").textContent = ev.titre;
    }

    // Charger les jours (OPTION C : afficher date + jour de la semaine)
    async function chargerJours() {
        const jours = await pb.collection("planning_jours").getFullList({
            filter: `planning_event = "${eventId}"`,
            sort: "ordre",
            requestKey: null
        });

        const select = document.getElementById("jour");
        select.innerHTML = ""; // reset

        jours.forEach(j => {
            const d = new Date(j.date);

            const texte = d.toLocaleDateString("fr-CH", {
                weekday: "long",
                day: "numeric",
                month: "long",
                year: "numeric"
            });

            const opt = document.createElement("option");
            opt.value = j.id;
            opt.textContent = texte;
            select.appendChild(opt);
        });
    }

    // Charger les créneaux
    async function chargerCreneaux() {
        // 1) Charger les jours de l'événement
        const jours = await pb.collection("planning_jours").getFullList({
            filter: `planning_event = "${eventId}"`,
            requestKey: null
        });

        const joursIds = jours.map(j => j.id);
        if (joursIds.length === 0) return;

        // 2) Charger les créneaux liés à ces jours
        const creneaux = await pb.collection("planning_creneaux").getFullList({
            filter: `planning_jour.id ?~ "${joursIds.join(',')}"`,
            requestKey: null
        });

        const select = document.getElementById("creneau");
        select.innerHTML = ""; // reset

        creneaux.forEach(c => {
            const opt = document.createElement("option");
            opt.value = c.id;
            opt.textContent = c.heure_debut + " → " + c.heure_fin;
            select.appendChild(opt);
        });
    }

    // Charger les postes
    async function chargerPostes() {
        const postes = await pb.collection("planning_postes").getFullList({
            filter: `manifestation = "${eventId}"`,
            sort: "ordre",
            requestKey: null
        });

        const select = document.getElementById("poste");
        select.innerHTML = '<option value="">— Aucun —</option>';

        postes.forEach(p => {
            const opt = document.createElement("option");
            opt.value = p.id;
            opt.textContent = p.titre;
            select.appendChild(opt);
        });
    }

    // Charger tout
    chargerTitre();
    chargerJours();
    chargerCreneaux();
    chargerPostes();
</script>

</body>
</html>
