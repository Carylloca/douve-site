<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription à l'événement</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "DM Sans", sans-serif;
            background-image: url("img/page-public-manifestation-inscription.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Header public harmonisé */
        header {
            height: 70px;
            background: rgba(44, 62, 80, 0.90);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
        }

        header h1 {
            margin: 0;
            font-size: 26px;
            font-weight: bold;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 10px;
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }

        label { font-weight: bold; display: block; margin-top: 15px; }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        textarea { resize: vertical; height: 100px; }

        .btn {
            display: inline-block;
            background: #2980b9;
            color: white;
            padding: 12px 18px;
            border-radius: 6px;
            text-decoration: none;
            margin-top: 20px;
            cursor: pointer;
            border: none;
            font-size: 16px;
        }

        .btn:hover { background: #1f6391; }

        .back {
            display: inline-block;
            margin-bottom: 20px;
            color: #ffffff;
            text-decoration: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
        }

        .back:hover { text-decoration: underline; }

        #feedback { margin-top: 15px; font-weight: bold; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>

<body>

<header>
    <h1>Inscription à l'événement</h1>
</header>

<div class="container">

    <a href="public-manifestation-details.html?id=" class="back" id="backBtn">← Retour</a>

    <div class="card">
        <h2 id="eventTitle">Chargement...</h2>

        <form id="inscriptionForm" onsubmit="inscrirePersonne(event)">

            <label>Nom</label>
            <input type="text" id="nom" required>

            <label>Prénom</label>
            <input type="text" id="prenom" required>

            <label>Jour</label>
            <select id="jour" required></select>

            <label>Créneau</label>
            <select id="creneau" required></select>

            <label>Poste souhaité (optionnel)</label>
            <select id="poste">
                <option value="">— Aucun —</option>
            </select>

            <label>Commentaire (optionnel)</label>
            <textarea id="commentaire"></textarea>

            <button class="btn" type="submit">Valider l'inscription</button>

            <p id="feedback"></p>
        </form>
    </div>

</div>

<script>
    const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

    const urlParams = new URLSearchParams(window.location.search);
    const eventId = urlParams.get("id");

    document.getElementById("backBtn").href =
        "public-manifestation-details.html?id=" + eventId;

    // Charger le titre de l'événement
    async function chargerTitre() {
        const ev = await pb.collection("planning_events").getOne(eventId, {
            requestKey: null
        });
        document.getElementById("eventTitle").textContent = ev.titre;
    }

    // Charger les jours
    async function chargerJours() {
        const jours = await pb.collection("planning_jours").getFullList({
            filter: `planning_event = "${eventId}"`,
            sort: "date",
            requestKey: null
        });

        const select = document.getElementById("jour");
        select.innerHTML = "";

        jours.forEach(j => {
            const d = new Date(j.date);
            const texte = d.toLocaleDateString("fr-CH", {
                weekday: "long",
                day: "numeric",
                month: "long",
                year: "numeric"
            });

            const opt = document.createElement("option");
            opt.value = j.id;
            opt.textContent = texte;
            select.appendChild(opt);
        });
    }

    let creneauxParJour = [];

    // Charger les créneaux du jour sélectionné
    async function chargerCreneaux() {
        const jourId = document.getElementById("jour").value;
        if (!jourId) return;

        const creneaux = await pb.collection("planning_creneaux").getFullList({
            filter: `planning_jour = "${jourId}"`,
            sort: "heure_debut",
            requestKey: null
        });

        const uniques = {};
        creneaux.forEach(c => {
            const key = c.heure_debut + "|" + c.heure_fin;
            if (!uniques[key]) {
                uniques[key] = {
                    id: c.id,
                    heure_debut: c.heure_debut,
                    heure_fin: c.heure_fin,
                    postes: []
                };
            }
            uniques[key].postes.push(c.poste);
        });

        creneauxParJour = Object.values(uniques);

        const select = document.getElementById("creneau");
        select.innerHTML = "";

        creneauxParJour.forEach(c => {
            const opt = document.createElement("option");
            opt.value = c.id;
            opt.textContent = c.heure_debut + " → " + c.heure_fin;
            select.appendChild(opt);
        });

        chargerPostesPourCreneau();
    }

    document.getElementById("creneau").addEventListener("change", chargerPostesPourCreneau);

    async function chargerPostesPourCreneau() {
        const creneauId = document.getElementById("creneau").value;
        if (!creneauId) return;

        const creneau = creneauxParJour.find(c => c.id === creneauId);
        if (!creneau) return;

        const conditions = creneau.postes.map(id => `id = "${id}"`).join(" || ");
        const postes = conditions
            ? await pb.collection("planning_postes").getFullList({
                  filter: conditions,
                  sort: "ordre",
                  requestKey: null
              })
            : [];

        const select = document.getElementById("poste");
        select.innerHTML = '<option value="">— Aucun —</option>';

        postes.forEach(p => {
            const opt = document.createElement("option");
            opt.value = p.id;
            opt.textContent = p.titre;
            select.appendChild(opt);
        });
    }

    document.getElementById("jour").addEventListener("change", chargerCreneaux);

    // Inscription
    async function inscrirePersonne(e) {
        e.preventDefault();

        const nom = document.getElementById("nom").value.trim();
        const prenom = document.getElementById("prenom").value.trim();
        const jourId = document.getElementById("jour").value;
        const creneauId = document.getElementById("creneau").value;
        const posteId = document.getElementById("poste").value || null;
        const commentaire = document.getElementById("commentaire").value.trim();

        const user = pb.authStore.model;

        try {
            await pb.collection("planning_disponibilites").create({
                planning_event: eventId,
                planning_jour: jourId,
                planning_creneau: creneauId,
                compagnon: user ? user.id : null,
                poste_souhaite: posteId, // null si aucun poste
                nom_personne: nom,
                prenom_personne: prenom,
                commentaire: commentaire,
                inscrit_par: user ? (user.email || user.id) : "public"
            });

            const fb = document.getElementById("feedback");
            fb.textContent = "✅ Inscription enregistrée avec succès !";
            fb.className = "success";

            document.getElementById("inscriptionForm").reset();
            await chargerJours();
            await chargerCreneaux();
        } catch (err) {
            console.error("Erreur PocketBase :", err);
            const fb = document.getElementById("feedback");
            fb.textContent = "❌ Erreur lors de l’enregistrement de l’inscription.";
            fb.className = "error";
        }
    }

    (async () => {
        await chargerTitre();
        await chargerJours();
        await chargerCreneaux();
    })();
</script>

</body>
</html>
