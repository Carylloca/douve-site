<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Chalet – Espace Compagnon</title>

    <link rel="icon" type="image/png" href="../favicon.png">

    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

    <!-- 1) PocketBase -->
<script src="../js/pocketbase.umd.js"></script>

<!-- 2) Configuration de l’hébergement PocketBase -->
<script src="../js/hebergement_pb.js"></script>

<!-- 3) Authentification (restaure la session, charge les cookies) -->
<script src="../js/auth.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: url("../img/page-compagnon-chalet.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        header {
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        header h1 {
            margin: 0;
            font-size: 22px;
            text-shadow: 0 0 10px black;
        }

        .btn {
            background: #7A0010;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #5a000c;
        }

        .layout {
            display: flex;
            justify-content: center;
            gap: 25px;
            max-width: 1200px;
            margin: 20px auto;
        }

        #calendar {
            width: 350px;
            background: rgba(255,255,255,0.90);
            padding: 15px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }

        .panel {
            flex: 1;
            background: rgba(255,255,255,0.90);
            padding: 25px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }

        .my-badge {
            background: #7A0010;
            color: white;
            padding: 2px 6px;
            border-radius: 6px;
            font-size: 11px;
            margin-right: 6px;
        }

        .filter-box {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-toggle {
            cursor: pointer;
            padding: 6px 10px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            border: none;
            font-weight: bold;
        }

        .filter-toggle.active {
            background: #32CD32;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #7A0010;
            color: white;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }

        th.desc-col { text-align: left; }

        th.type-col, td.type-col {
            width: 80px;
            text-align: center;
            font-size: 18px;
        }

        th.type-col {
            font-size: 16px !important;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        td.desc-col { text-align: left; }
        td.date-col { width: 90px; }

        tr:hover {
            background: #f0f0f0;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 4px;
        }

        .legend-container {
            display: flex;
            gap: 15px;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .legend-box {
            background: #f7f7f7;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ddd;
            flex: 1;
        }

        .legend-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 10px;
        }

        @media (max-width: 900px) {
            .layout {
                flex-direction: column;
                align-items: center;
            }
            #calendar, .panel {
                width: 90%;
            }
            .legend-container {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<header>
    <a class="btn" href="../index.html">Menu</a>
    <h1>Réservations du Chalet – Espace Compagnon</h1>
    <button class="btn" onclick="logout()">⏻ Déconnexion</button>
</header>

<div class="layout">

    <div id="calendar"></div>

    <div class="panel">

        <div class="filter-box">
            <button id="filterBtn" class="filter-toggle">Afficher uniquement mes réservations</button>
        </div>

        <div class="legend-container">

            <div class="legend-box">
                <strong>Statuts :</strong><br><br>
                <div class="legend-grid">
                    <div><span class="status-dot" style="background:#1E90FF;"></span> En cours</div>
                    <div><span class="status-dot" style="background:#32CD32;"></span> Confirmée</div>
                    <div><span class="status-dot" style="background:#8B4513;"></span> Terminée</div>
                    <div><span class="status-dot" style="background:#B22222;"></span> Annulée</div>
                </div>
            </div>

            <div class="legend-box">
                <strong>Types :</strong><br><br>
                <div class="legend-grid">
                    <div>🍷🍽️ Repas</div>
                    <div>👤 Interne</div>
                    <div>🧹 Nettoyage</div>
                    <div>🧑‍🤝‍🧑 Frairie</div>
                    <div>↗️ Externe</div>
                    <div>🛠️ Travaux</div>
                </div>
            </div>

        </div>

        <h3>Liste des réservations</h3>

        <table id="reservationsTable">
            <thead>
                <tr>
                    <th class="desc-col">Description</th>
                    <th class="type-col">Type</th>
                    <th>Compagnon</th>
                    <th class="date-col">Début</th>
                    <th class="date-col">Fin</th>
                </tr>
            </thead>
            <tbody id="reservationsBody"></tbody>
        </table>
    </div>

</div>

<script>
let currentUser = null;
let reservationsList = [];
let filterMineOnly = false;

const statusColors = {
    "réservation en cours": "#1E90FF",
    "confirmée": "#32CD32",
    "terminée": "#8B4513",
    "annulée": "#B22222"
};

const typeIcons = {
    "Interne 🍷🍽️": "🍷🍽️",
    "Interne 👤": "👤",
    "Nettoyage": "🧹",
    "Frairie": "🧑‍🤝‍🧑",
    "Externe": "↗️",
    "Travaux": "🛠️"
};

function logout() {
    pb.authStore.clear();
    window.location.href = "../index.html";
}

function formatDate(d) {
    return d.substring(8,10) + "." + d.substring(5,7) + "." + d.substring(0,4);
}

async function init() {
    currentUser = pb.authStore.model;

    if (!currentUser) {
        alert("Veuillez vous connecter.");
        window.location.href = "../login.html";
        return;
    }

    await loadReservations();
    populateTable();
    loadCalendar();

    document.getElementById("filterBtn").onclick = toggleFilter;
}

async function loadReservations() {
    const events = await pb.collection("chalet_reservations").getFullList({
        expand: "compagnon"
    });

    reservationsList = events.map(r => ({
        id: r.id,
        type: r.type,
        status: r.status,
        startDate: r.startDate,
        endDate: r.endDate,
        description: r.description,
        companionId: r.expand?.compagnon?.id,
        companionName: r.expand?.compagnon
            ? r.expand.compagnon.nom + " " + r.expand.compagnon.prenom
            : null
    }));

    const today = new Date().toISOString().substring(0, 10);

    for (const r of reservationsList) {
        if (r.endDate < today && r.status !== "annulée" && r.status !== "terminée") {
            await pb.collection("chalet_reservations").update(r.id, {
                status: "terminée"
            });
            r.status = "terminée";
        }
    }

    reservationsList.sort((a, b) => new Date(a.startDate) - new Date(b.startDate));
}

function toggleFilter() {
    filterMineOnly = !filterMineOnly;

    const btn = document.getElementById("filterBtn");
    btn.classList.toggle("active");

    btn.textContent = filterMineOnly
        ? "Afficher toutes les réservations"
        : "Afficher uniquement mes réservations";

    populateTable();
    loadCalendar();
}

function populateTable() {
    const tbody = document.getElementById("reservationsBody");
    tbody.innerHTML = "";

    let list = reservationsList;

    if (filterMineOnly) {
        list = list.filter(r => r.companionId === currentUser.id);
    }

    list.forEach(r => {
        const shortDesc = r.description
            ? r.description.substring(0, 80) + (r.description.length > 80 ? "…" : "")
            : "-";

        const tr = document.createElement("tr");

        if (r.companionId === currentUser.id) {
            tr.onclick = () => {
                window.location.href = "compagnon-chalet-edit.html?id=" + r.id;
            };
            tr.style.cursor = "pointer";
        }

        tr.innerHTML = `
            <td class="desc-col">
                <span class="status-dot" style="background:${statusColors[r.status]}"></span>
                ${r.companionId === currentUser.id ? '<span class="my-badge">Ma réservation</span>' : ''}
                ${shortDesc}
            </td>
            <td class="type-col">${typeIcons[r.type] || ""}</td>
            <td>${r.companionName || "-"}</td>
            <td class="date-col">${formatDate(r.startDate)}</td>
            <td class="date-col">${formatDate(r.endDate)}</td>
        `;

        tbody.appendChild(tr);
    });
}

function loadCalendar() {
    const calendarEl = document.getElementById("calendar");

    let list = reservationsList;

    if (filterMineOnly) {
        list = list.filter(r => r.companionId === currentUser.id);
    }

    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: "dayGridMonth",
        locale: "fr",
        height: 450,
        displayEventTime: false,
        events: list.map(r => ({
            id: r.id,
            title: `${typeIcons[r.type] || ""} ` +
                   r.description.substring(0, 40) +
                   (r.description.length > 40 ? "…" : ""),
            start: r.startDate,
            end: r.endDate,
            backgroundColor: statusColors[r.status] || "#555"
        }))
    });

    calendar.render();
}

init();
</script>

</body>
</html>
