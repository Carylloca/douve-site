<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Chalet – Espace Compagnon</title>

    <link rel="icon" type="image/png" href="../favicon.png">

    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: url("../img/page-admin-chalet.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        header {
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        .btn {
            background: #7A0010;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .layout {
            display: flex;
            justify-content: center;
            gap: 25px;
            max-width: 1200px;
            margin: 20px auto;
        }

        #calendar {
            width: 350px;
            background: rgba(255,255,255,0.90);
            padding: 15px;
            border-radius: 12px;
        }

        .panel {
            flex: 1;
            background: rgba(255,255,255,0.90);
            padding: 25px;
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #7A0010;
            color: white;
            padding: 10px;
            text-align: center;
        }

        th.desc-col { text-align: left; }

        th.type-col, td.type-col {
            width: 55px;
            text-align: center;
            font-size: 22px;
        }

        /* Correction du titre Type */
        th.type-col {
            font-size: 16px !important;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        td.desc-col { text-align: left; }
        td.date-col { width: 90px; }

        tr:hover {
            background: #f0f0f0;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>
    <a class="btn" href="../index.html">Menu</a>
    <h1>Réservations du Chalet – Espace Compagnon</h1>
    <div></div>
</header>

<div class="layout">

    <div id="calendar"></div>

    <div class="panel">
        <h3>Liste des réservations</h3>

        <table id="reservationsTable">
            <thead>
                <tr>
                    <th class="desc-col">Description</th>
                    <th class="type-col">Type</th>
                    <th>Compagnon</th>
                    <th class="date-col">Début</th>
                    <th class="date-col">Fin</th>
                </tr>
            </thead>
            <tbody id="reservationsBody"></tbody>
        </table>
    </div>

</div>

<script>
const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

let currentUser = null;

async function init() {
    currentUser = pb.authStore.model;

    if (!currentUser) {
        alert("Veuillez vous connecter.");
        window.location.href = "../login.html";
        return;
    }

    loadReservations();
    loadCalendar();
}

async function loadReservations() {
    const records = await pb.collection("chalet_reservations").getFullList({
        expand: "compagnon"
    });

    const tbody = document.getElementById("reservationsBody");
    tbody.innerHTML = "";

    records.forEach(r => {
        const tr = document.createElement("tr");

        tr.onclick = () => {
            if (r.expand.compagnon.id === currentUser.id) {
                window.location.href = "compagnon-chalet-edit.html?id=" + r.id;
            }
        };

        tr.innerHTML = `
            <td class="desc-col">${r.description}</td>
            <td class="type-col">${r.type}</td>
            <td>${r.expand.compagnon.prenom} ${r.expand.compagnon.nom}</td>
            <td>${r.startDate}</td>
            <td>${r.endDate}</td>
        `;

        tbody.appendChild(tr);
    });
}

function loadCalendar() {
    const calendarEl = document.getElementById("calendar");

    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: "dayGridMonth",
        locale: "fr",
        events: async (info, success) => {
            const records = await pb.collection("chalet_reservations").getFullList();
            success(records.map(r => ({
                title: r.description,
                start: r.startDate,
                end: r.endDate
            })));
        }
    });

    calendar.render();
}

init();
</script>

</body>
</html>
