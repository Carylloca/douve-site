<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Détails du compagnon</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- AutoTable (OBLIGATOIRE pour les tableaux PDF) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("img/page-compagnon-details.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 40px 20px;
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 10px black;
        }

        .top-buttons {
            text-align: center;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            margin: 5px;
        }

        .btn:hover {
            background: #5A000C;
        }

        .btn-danger {
            background: #b30000;
        }

        .btn-danger:hover {
            background: #7a0000;
        }

        .card {
            width: 50%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            color: black;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }

        .row {
            margin-bottom: 12px;
            font-size: 18px;
        }

        .label {
            font-weight: bold;
            color: #7A0010;
        }

        .photo {
            width: 208px;
            height: 208px;
            border-radius: 10px;
            object-fit: cover;
            border: 3px solid #7A0010;
            display: block;
            margin-bottom: 10px;
        }

        .photo-container {
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="overlay">

        <h1>Détails du compagnon</h1>

        <div class="top-buttons">
            <a href="index.html" class="btn">Menu</a>
            <a href="liste-compagnons.html" class="btn">← Retour</a>
            <button class="btn" onclick="exportPDF()">Télécharger PDF</button>
            <a id="editBtn" href="#" class="btn" style="display:none;">Modifier</a>
            <button id="deleteBtn" class="btn btn-danger" style="display:none;" onclick="supprimerCompagnon()">Supprimer</button>
        </div>

        <div class="card" id="details">
            Chargement...
        </div>

    </div>

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <script>
        const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

        if (!pb.authStore.isValid) {
            window.location.href = "login.html";
        }

        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        let compagnonData = null;

        function formatDate(d) {
            if (!d) return "";
            const onlyDate = d.split(" ")[0];
            if (onlyDate.includes("-")) {
                const [y, m, day] = onlyDate.split("-");
                return `${day}.${m}.${y}`;
            }
            return onlyDate;
        }

        async function chargerDetails() {
            try {
                const c = await pb.collection("companions").getOne(id);
                compagnonData = c;

                const photoHTML = c.photo
                    ? `<img src="${pb.files.getUrl(c, c.photo)}" class="photo">`
                    : "";

                document.getElementById("details").innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:30px;">
                        <div style="flex:1;">
                            <div class="row"><span class="label">Nom :</span> ${c.nom}</div>
                            <div class="row"><span class="label">Prénom :</span> ${c.prenom}</div>
                            <div class="row"><span class="label">Initiales :</span> ${c.initiales || ""}</div>
                            <div class="row"><span class="label">Fonction :</span> ${c.fonction || ""}</div>
                            <div class="row"><span class="label">Adresse :</span> ${c.adresse || ""}</div>
                            <div class="row"><span class="label">N° postal :</span> ${c.npa || ""}</div>
                            <div class="row"><span class="label">Lieu :</span> ${c.lieu || ""}</div>
                            <div class="row"><span class="label">Email :</span> ${c.email_public || ""}</div>
                            <div class="row"><span class="label">Téléphone :</span> ${c.telephone || ""}</div>
                            <div class="row"><span class="label">Date de naissance :</span> ${formatDate(c.date_naissance)}</div>
                            <div class="row"><span class="label">Conjoint :</span> ${(c.conjoint_prenom || "") + " " + (c.conjoint_nom || "")}</div>
                            <div class="row"><span class="label">Téléphone professionnel :</span> ${c.telephone_prof || ""}</div>
                            <div class="row"><span class="label">Email professionnel :</span> ${c.email_prof || ""}</div>
                        </div>

                        <div class="photo-container">
                            ${photoHTML}
                            <div id="photoBtnContainer"></div>
                        </div>
                    </div>
                `;

                const user = pb.authStore.model;

                if (user && user.collectionName === "users") {
                    document.getElementById("editBtn").style.display = "inline-block";
                    document.getElementById("editBtn").href = "admin/admin-compagnon-modifier.html?id=" + id;

                    document.getElementById("deleteBtn").style.display = "inline-block";

                    document.getElementById("photoBtnContainer").innerHTML =
                        `<a class="btn" href="admin/admin-compagnon-modifier.html?id=${id}#photo">Changer la photo</a>`;
                }

            } catch (err) {
                document.getElementById("details").innerHTML =
                    "<p>Erreur lors du chargement des informations.</p>";
                console.error(err);
            }
        }

        chargerDetails();

        async function supprimerCompagnon() {
            if (!confirm("Voulez-vous vraiment supprimer ce compagnon ?")) return;

            try {
                await pb.collection("companions").delete(id);
                alert("Compagnon supprimé.");
                window.location.href = "liste-compagnons.html";
            } catch (err) {
                alert("Erreur lors de la suppression.");
                console.error(err);
            }
        }

        /* 📄 EXPORT PDF — STYLE FICHE COMPAGNON */
window.exportPDF = async function () {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

    if (!compagnonData) {
        alert("Les données ne sont pas encore chargées.");
        return;
    }

    // 🎨 Couleurs
    const rouge = [122, 0, 16];
    const grisClair = [245, 245, 245];

    // 🩶 Fond clair
    doc.setFillColor(...grisClair);
    doc.rect(10, 10, 190, 277, "F");

    // 🔹 Titre
    doc.setFontSize(18);
    doc.setTextColor(...rouge);
    doc.text("Détails du compagnon", 15, 25);

    // 🖼️ Photo en haut à droite
    let imageHeight = 50;
    let imageWidth = 50;
    let imageTop = 30; // position verticale
    let imageLeft = 140; // position horizontale

    if (compagnonData.photo) {
        const imgUrl = pb.files.getUrl(compagnonData, compagnonData.photo);
        const img = await fetch(imgUrl)
            .then(r => r.blob())
            .then(b => new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.readAsDataURL(b);
            }));

        doc.addImage(img, "JPEG", imageLeft, imageTop, imageWidth, imageHeight);
        doc.setDrawColor(...rouge);
        doc.rect(imageLeft, imageTop, imageWidth, imageHeight);
    }

    // 🧾 Données (descendues sous la photo)
    const infos = [
        ["Nom", compagnonData.nom],
        ["Prénom", compagnonData.prenom],
        ["Initiales", compagnonData.initiales || ""],
        ["Fonction", compagnonData.fonction || ""],
        ["Adresse", compagnonData.adresse || ""],
        ["N° postal", compagnonData.npa || ""],
        ["Lieu", compagnonData.lieu || ""],
        ["Email", compagnonData.email_public || ""],
        ["Téléphone", compagnonData.telephone || ""],
        ["Date de naissance", compagnonData.date_naissance || ""],
        ["Conjoint", (compagnonData.conjoint_prenom || "") + " " + (compagnonData.conjoint_nom || "")],
        ["Téléphone professionnel", compagnonData.telephone_prof || ""],
        ["Email professionnel", compagnonData.email_prof || ""]
    ];

    // 📋 Tableau stylé
    doc.autoTable({
        startY: imageTop + imageHeight + 15, // ⬅️ décale le texte sous la photo
        margin: { left: 15, right: 15 },
        body: infos,
        theme: "plain",
        styles: {
            fontSize: 11,
            cellPadding: 1.5
        },
        columnStyles: {
            0: { textColor: rouge, fontStyle: "bold", cellWidth: 45 },
            1: { cellWidth: 90 }
        }
    });

    // 💾 Sauvegarde
    doc.save(`${compagnonData.nom}_${compagnonData.prenom}.pdf`);
};

    </script>

</body>
</html>
