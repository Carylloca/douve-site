<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Détails du compagnon</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("img/page-admin-compagnons.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 40px 20px;
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 10px black;
        }

        .card {
            width: 70%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            color: black;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }

        .row {
            margin-bottom: 12px;
            font-size: 18px;
        }

        .label {
            font-weight: bold;
            color: #7A0010;
        }

        /* 📸 Photo agrandie de 30% */
        .photo {
            width: 208px;
            height: 208px;
            border-radius: 10px;
            object-fit: cover;
            border: 3px solid #7A0010;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            margin-top: 20px;
            margin-right: 10px;
        }

        .btn:hover {
            background: #5A000C;
        }

        .btn-danger {
            background: #b30000;
        }

        .btn-danger:hover {
            background: #7a0000;
        }
    </style>
</head>

<body>
    <div class="overlay">
        <h1>Détails du compagnon</h1>

        <div class="card" id="details">
            Chargement...
        </div>

        <div style="margin-top:20px;">
            <a href="liste-compagnons.html" class="btn">← Retour à la liste</a>
            <button class="btn" onclick="exportPDF()">Télécharger PDF</button>
            <a id="editBtn" href="#" class="btn" style="display:none;">Modifier</a>
            <button id="deleteBtn" class="btn btn-danger" style="display:none;" onclick="supprimerCompagnon()">Supprimer</button>
        </div>
    </div>

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <script>
        const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

        if (!pb.authStore.isValid) {
            window.location.href = "login.html";
        }

        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        let compagnonData = null;

        /* 🎯 Formatage simple sans correction de jour */
        function formatDate(d) {
            if (!d) return "";

            const onlyDate = d.split("T")[0].split(" ")[0];

            if (onlyDate.includes(".")) {
                return onlyDate;
            }

            if (onlyDate.includes("-")) {
                const [y, m, day] = onlyDate.split("-");
                return `${day}.${m}.${y}`;
            }

            return onlyDate;
        }

        async function chargerDetails() {
            try {
                const c = await pb.collection("companions").getOne(id);
                compagnonData = c;

                const photoHTML = c.photo
                    ? `<img src="${pb.files.getUrl(c, c.photo)}" class="photo">`
                    : "";

                document.getElementById("details").innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:30px;">

                        <!-- COLONNE TEXTE -->
                        <div style="flex:1; max-width:70%;">
                            <div class="row"><span class="label">Nom :</span> ${c.nom}</div>
                            <div class="row"><span class="label">Prénom :</span> ${c.prenom}</div>
                            <div class="row"><span class="label">Initiales :</span> ${c.initiales || ""}</div>
                            <div class="row"><span class="label">Fonction :</span> ${c.fonction || ""}</div>

                            <div class="row"><span class="label">Adresse :</span> ${c.adresse || ""}</div>
                            <div class="row"><span class="label">N° postal :</span> ${c.npa || ""}</div>
                            <div class="row"><span class="label">Lieu :</span> ${c.lieu || ""}</div>

                            <div class="row"><span class="label">Email :</span> ${c.email_public || ""}</div>
                            <div class="row"><span class="label">Téléphone :</span> ${c.telephone || ""}</div>

                            function formatDate(d) {
                            if (!d) return "";
                            
                            // On récupère uniquement la partie date
                            const onlyDate = d.split("T")[0];
                            
                            // Format YYYY-MM-DD → DD.MM.YYYY
                            if (onlyDate.includes("-")) {
                            const [y, m, day] = onlyDate.split("-");
                            return `${day}.${m}.${y}`;
                            }
                            
                            // Format JJ.MM.AAAA → on renvoie tel quel
                            if (onlyDate.includes(".")) {
                            
                            return onlyDate;
                            }
                                
                            return onlyDate;
                            
                        }

                            <div class="row"><span class="label">Conjoint :</span> 
                                ${(c.conjoint_prenom || "") + " " + (c.conjoint_nom || "")}
                            </div>

                            <div class="row"><span class="label">Téléphone professionnel :</span> ${c.telephone_prof || ""}</div>
                            <div class="row"><span class="label">Email professionnel :</span> ${c.email_prof || ""}</div>
                        </div>

                        <!-- COLONNE PHOTO -->
                        <div>${photoHTML}</div>

                    </div>
                `;

                const user = pb.authStore.model;

                if (user && user.collectionName === "users") {
                    document.getElementById("editBtn").style.display = "inline-block";
                    document.getElementById("editBtn").href = "admin/admin-compagnon-modifier.html?id=" + id;

                    document.getElementById("deleteBtn").style.display = "inline-block";
                }
                
                if (user && user.collectionName === "users") {
                    const photoBtn = document.createElement("a");
                    photoBtn.className = "btn";
                    photoBtn.textContent = "Changer la photo";
                    photoBtn.href = "admin/admin-compagnon-modifier.html?id=" + id + "#photo";
                    document.querySelector(".overlay").appendChild(photoBtn);
                }


            } catch (err) {
                document.getElementById("details").innerHTML =
                    "<p>Erreur lors du chargement des informations.</p>";
                console.error(err);
            }
        }

        chargerDetails();

        async function supprimerCompagnon() {
            if (!confirm("Voulez-vous vraiment supprimer ce compagnon ?")) return;

            try {
                await pb.collection("companions").delete(id);
                alert("Compagnon supprimé.");
                window.location.href = "liste-compagnons.html";
            } catch (err) {
                alert("Erreur lors de la suppression.");
                console.error(err);
            }
        }

        async function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(18);
            doc.text("Fiche du compagnon", 10, 10);

            let y = 20;

            if (compagnonData.photo) {
                const url = pb.files.getUrl(compagnonData, compagnonData.photo);
                const img = await fetch(url).then(r => r.blob());
                const reader = new FileReader();
                reader.onload = function () {
                    doc.addImage(reader.result, "JPEG", 140, 10, 50, 50);
                    doc.save("fiche_compagnon.pdf");
                };
                reader.readAsDataURL(img);
            }

            const lignes = [
                `Nom : ${compagnonData.nom}`,
                `Prénom : ${compagnonData.prenom}`,
                `Initiales : ${compagnonData.initiales || ""}`,
                `Fonction : ${compagnonData.fonction || ""}`,
                `Adresse : ${compagnonData.adresse || ""}`,
                `N° postal : ${compagnonData.npa || ""}`,
                `Lieu : ${compagnonData.lieu || ""}`,
                `Email : ${compagnonData.email_public || ""}`,
                `Téléphone : ${compagnonData.telephone || ""}`,
                `Date de naissance : ${formatDate(compagnonData.date_naissance)}`,
                `Conjoint : ${(compagnonData.conjoint_prenom || "") + " " + (compagnonData.conjoint_nom || "")}`,
                `Téléphone prof : ${compagnonData.telephone_prof || ""}`,
                `Email prof : ${compagnonData.email_prof || ""}`
            ];

            doc.setFontSize(12);

            lignes.forEach(l => {
                doc.text(l, 10, y);
                y += 8;
            });

            if (!compagnonData.photo) {
                doc.save("fiche_compagnon.pdf");
            }
        }
    </script>

</body>
</html>
