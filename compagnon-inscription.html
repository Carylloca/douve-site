<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
    <script src="js/auth.js"></script>

    <style>
        body {
            margin: 0;
            background-image: url("img/page-compagnons.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: "DM Sans", sans-serif;
        }

        .overlay {
            background: rgba(0,0,0,0.55);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .btn {
            padding: 8px 12px;
            border-radius: 6px;
            background: white;
            color: #7b0f23;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #ffe6ea;
        }

        .container {
            padding: 110px 20px 40px 20px;
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        #nb {
            width: 120px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .btn-action {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 6px;
            background: #7b0f23;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .btn-action:hover {
            background: #9c1a33;
        }

        .warning-block {
            display: flex;
            background: #fff3cd;
            border-left: 6px solid #ffca2c;
            padding: 15px;
            margin: 20px 0;
            border-radius: 6px;
            color: #664d03;
            font-size: 15px;
            gap: 15px;
        }

        .warning-icon {
            font-size: 48px;
            line-height: 48px;
            display: flex;
            align-items: flex-start;
        }

        .warning-text {
            flex: 1;
        }

        #desc {
            display: block;
            margin: 10px 0 20px 0;
            font-size: 15px;
            color: #333;
        }
    </style>
</head>

<body>

<div class="overlay">

    <div class="header">
        <a href="compagnons.html" class="btn">← Calendrier</a>
        <div>Inscription</div>

        <div style="display:flex; gap:10px;">
            <a id="btnInscrits" class="btn">Liste des inscrits</a>
            <a href="index.html" class="btn">Menu</a>
            <button class="btn" onclick="logout()">Déconnexion</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2 id="title">Chargement...</h2>

            <span id="desc"></span>

            <div id="limite" style="margin-bottom:10px;"></div>

            <label>Nombre de personnes :</label>
            <input type="number" id="nb" min="1" value="1">

            <div class="warning-block">
                <div class="warning-icon">⚠️</div>
                <div class="warning-text">
                    <strong>Date limite dépassée, veuillez contacter l'organisateur.</strong>
                </div>
            </div>

            <button id="btnSave" class="btn-action" onclick="save()">Enregistrer</button>
        </div>
    </div>

</div>

<script>
    requireCompanion();

    const url = new URL(window.location.href);
    const manifestId = url.searchParams.get("m");

    document.getElementById("btnInscrits").href =
        "liste-inscrits-compagnon.html?id=" + manifestId;

    let isClosed = false;

    async function load() {
        try {
            const m = await pb.collection("manifestations").getOne(manifestId, {
                expand: "responsables"
            });

            // Date + heure
            let dateAff = "";
            let heureAff = "";
            if (m.date) {
                const d = new Date(m.date);
                if (!isNaN(d.getTime())) dateAff = d.toLocaleDateString("fr-CH");

                if (typeof m.date === "string" && m.date.includes(" ")) {
                    heureAff = m.date.split(" ")[1].slice(0,5);
                }
            }

            // Date limite
            let limiteAff = "";
            let limiteDate = null;
            if (m.date_limite) {
                const d = new Date(m.date_limite);
                if (!isNaN(d.getTime())) {
                    limiteDate = d;
                    limiteAff = d.toLocaleDateString("fr-CH");
                }
            }

            // Organisateur
            let organisateur = "Non défini";
            if (m.expand?.responsables?.length > 0) {
                organisateur = m.expand.responsables
                    .map(r => `${r.nom} ${r.prenom} (${r.initiales || ""})`)
                    .join(", ");
            }

            const user = pb.authStore.model;
            const nomCompagnon = `${user.prenom || ""} ${user.nom || ""}`.trim();

            let html = `${m.title}<br>`;
            if (dateAff) html += `<span style="font-size:16px;color:#444;">📅 ${dateAff} ${heureAff ? "à " + heureAff : ""}</span><br>`;
            html += `<span style="font-size:16px;color:#7b0f23;">👤 ${nomCompagnon}</span><br>`;
            if (limiteAff) html += `<span style="font-size:16px;color:#444;">⏳ Date limite : ${limiteAff}</span><br>`;
            html += `<span style="font-size:16px;color:#444;">📌 Organisateur : ${organisateur}</span>`;

            document.getElementById("title").innerHTML = html;
            document.getElementById("desc").textContent = m.description || "Aucune description.";

            // 🔥 Vérification délai dépassé
            if (limiteDate && new Date() > limiteDate) {
                isClosed = true;

                document.getElementById("limite").innerHTML =
                    `<span style="color:red;font-weight:bold;">⛔ Date limite dépassée, veuillez contacter l'organisateur</span>`;

                document.getElementById("nb").disabled = true;
                document.getElementById("btnSave").disabled = true;
                document.getElementById("btnSave").style.background = "#777";
            }

        } catch (err) {
            console.error(err);
            alert("Erreur de chargement.");
        }
    }

    async function save() {

        // 🔥 Sécurité côté JS
        const m = await pb.collection("manifestations").getOne(manifestId);
        if (m.date_limite && new Date() > new Date(m.date_limite)) {
            alert("Date limite dépassée, veuillez contacter l'organisateur.");
            return;
        }

        const nb = parseInt(document.getElementById("nb").value, 10);
        if (!nb || nb < 1) {
            alert("Veuillez saisir un nombre de personnes valide.");
            return;
        }

        const user = pb.authStore.model;

        try {
            const existing = await pb.collection("inscriptions").getFullList({
                filter: `companion = "${user.id}" && manifestation = "${manifestId}"`,
                sort: "-updated"
            });

            if (existing.length > 0) {
                const last = existing[0];

                await pb.collection("inscriptions").update(last.id, {
                    nb_personnes: nb,
                    nom: user.nom || "",
                    prenom: user.prenom || ""
                });

            } else {
                await pb.collection("inscriptions").create({
                    companion: user.id,
                    manifestation: manifestId,
                    nb_personnes: nb,
                    nom: user.nom || "",
                    prenom: user.prenom || ""
                });
            }

            alert("Votre inscription a été enregistrée.\nVous serez " + nb + " personne(s).");
            window.location.href = "compagnons.html";

        } catch (err) {
            console.error(err);
            alert("Erreur lors de l'enregistrement.");
        }
    }

    load();
</script>

</body>
</html>
