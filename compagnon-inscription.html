<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
    <script src="js/auth.js"></script>

    <style>
        body {
            margin: 0;
            background-image: url("img/page-compagnons.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: "DM Sans", sans-serif;
        }

        .overlay {
            background: rgba(0,0,0,0.55);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .btn {
            padding: 8px 12px;
            border-radius: 6px;
            background: white;
            color: #7b0f23;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #ffe6ea;
        }

        .container {
            padding: 110px 20px 40px 20px;
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        #nb {
            width: 120px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .btn-action {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 6px;
            background: #7b0f23;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .btn-action:hover {
            background: #9c1a33;
        }

        #info {
            margin-top: 10px;
            color: #7b0f23;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="overlay">

    <div class="header">
        <a href="compagnons.html" class="btn">← Liste des manifestations</a>
        <div>Inscription</div>

        <div style="display:flex; gap:10px;">
            <a id="btnInscrits" class="btn">Liste des inscrits</a>
            <a href="index.html" class="btn">Menu</a>
            <button class="btn" onclick="logout()">Déconnexion</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2 id="title">Chargement...</h2>
            <div id="limite" style="margin-bottom:10px;"></div>

            <label>Nombre de personnes :</label>
            <input type="number" id="nb" min="1" value="1">

            <p id="info">
                En cas de modification d'inscription après la date limite, veuillez contacter l'organisateur.
            </p>

            <button class="btn-action" onclick="save()">Enregistrer</button>
        </div>
    </div>

</div>

<script>
    requireCompanion();

    const url = new URL(window.location.href);
    const manifestId = url.searchParams.get("m");
    const inscriptionId = url.searchParams.get("i");

    // Bouton Liste des inscrits
    document.getElementById("btnInscrits").href =
        "liste-inscrits-compagnon.html?id=" + manifestId;

    async function load() {
        try {
            const m = await pb.collection("manifestations").getOne(manifestId, {
                expand: "responsables"

            // Date + heure
            let dateAff = "";
            let heureAff = "";
            if (m.date) {
                const d = new Date(m.date);
                if (!isNaN(d.getTime())) dateAff = d.toLocaleDateString("fr-CH");

                if (typeof m.date === "string" && m.date.includes(" ")) {
                    heureAff = m.date.split(" ")[1].slice(0,5);
                }
            }

            // Date limite
            let limiteAff = "";
            let limiteDate = null;
            if (m.date_limite) {
                const d = new Date(m.date_limite);
                if (!isNaN(d.getTime())) {
                    limiteDate = d;
                    limiteAff = d.toLocaleDateString("fr-CH");
                }
            }

            // Organisateur
            let organisateur = "Non défini";
            if (m.expand?.responsables?.length > 0) {
                organisateur = m.expand.responsables
                    .map(r => `${r.nom} ${r.prenom} (${r.initiales || ""})`)
                    .join(", ");
            }

            const user = pb.authStore.model;
            const nomCompagnon = user.nom || user.prenom || user.email;

            let html = `${m.title}<br>`;
            if (dateAff) html += `<span style="font-size:16px;color:#444;">📅 ${dateAff} ${heureAff ? "à " + heureAff : ""}</span><br>`;
            html += `<span style="font-size:16px;color:#7b0f23;">👤 ${nomCompagnon}</span><br>`;
            if (limiteAff) html += `<span style="font-size:16px;color:#444;">⏳ Date limite : ${limiteAff}</span><br>`;
            html += `<span style="font-size:16px;color:#444;">📌 Organisateur : ${organisateur}</span>`;

            document.getElementById("title").innerHTML = html;

            // Date limite dépassée
            if (limiteDate && new Date() > limiteDate) {
                document.getElementById("limite").innerHTML =
                    `<span style="color:red;font-weight:bold;">⛔ Date limite dépassée</span>`;
            }

            // Pré-remplir si édition
            if (inscriptionId) {
                const ins = await pb.collection("inscriptions").getOne(inscriptionId);
                if (ins.nb_personnes) document.getElementById("nb").value = ins.nb_personnes;
            }

        } catch (err) {
            console.error(err);
            alert("Erreur de chargement.");
        }
    }

    async function save() {
        const nb = parseInt(document.getElementById("nb").value, 10);

        if (!nb || nb < 1) {
            alert("Veuillez saisir un nombre de personnes valide.");
            return;
        }

        // ⭐ Récupération du compagnon connecté
        const user = pb.authStore.model;
        const nom = user.nom || "";
        const prenom = user.prenom || "";

        try {
            if (inscriptionId) {
                await pb.collection("inscriptions").update(inscriptionId, {
                    nb_personnes: nb,
                    nom: nom,
                    prenom: prenom
                });
            } else {
                await pb.collection("inscriptions").create({
                    companion: pb.authStore.model.id,
                    manifestation: manifestId,
                    nb_personnes: nb,
                    nom: nom,
                    prenom: prenom
                });
            }

            alert("Votre inscription a été enregistrée.\nVous serez " + nb + " personne(s).");
            window.location.href = "compagnons.html";

        } catch (err) {
            console.log("Erreur PocketBase :", err.data);
            console.error(err);
            alert("Erreur lors de l'enregistrement.");
        }
    }

    load();
</script>

</body>
</html>
