<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
    <script src="js/auth.js"></script>

    <style>
        body {
            margin: 0;
            background-image: url("img/page-compagnons.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: "DM Sans", sans-serif;
        }

        .overlay {
            background: rgba(0,0,0,0.55);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .btn {
            padding: 8px 12px;
            border-radius: 6px;
            background: white;
            color: #7b0f23;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #ffe6ea;
        }

        .container {
            padding: 110px 20px 40px 20px;
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        label {
            font-weight: bold;
            color: #7b0f23;
        }

        #nb {
            width: 120px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .btn-action {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 6px;
            background: #7b0f23;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .btn-action:hover {
            background: #9c1a33;
        }
    </style>
</head>

<body>

<div class="overlay">

    <div class="header">
        <a href="compagnons.html" class="btn">← Liste des manifestations</a>
        <div>Inscription</div>
        <div style="display:flex; gap:10px;">
            <a href="index.html" class="btn">Menu</a>
            <button class="btn" onclick="logout()">Déconnexion</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2 id="title">Chargement...</h2>
            <div id="limite" style="margin-bottom:15px;"></div>

            <label>Nombre de personnes :</label>
            <input type="number" id="nb" min="1" value="1">

            <button class="btn-action" onclick="save()">Enregistrer</button>
        </div>
    </div>

</div>

<script>
    requireCompanion();

    const url = new URL(window.location.href);
    const manifestId = url.searchParams.get("m");
    const inscriptionId = url.searchParams.get("i");

    async function load() {
        try {
            const m = await pb.collection("manifestations").getOne(manifestId);

            const d = new Date(m.date);
            const dateAff = d.toLocaleDateString("fr-CH");
            const heureAff = m.date.split(" ")[1].slice(0,5);

            const limite = new Date(m.date_limite);
            const now = new Date();

            const user = pb.authStore.model;
            const nomCompagnon = user.nom || user.prenom || user.email;

            document.getElementById("title").innerHTML =
                `${m.title}<br>
                 <span style="font-size:16px;color:#444;">📅 ${dateAff} à ${heureAff}</span><br>
                 <span style="font-size:16px;color:#7b0f23;">👤 ${nomCompagnon}</span>`;

            if (now > limite) {
                document.getElementById("limite").innerHTML =
                    `<span style="color:red;font-weight:bold;">⛔ Date limite dépassée</span>`;
            }

            if (inscriptionId) {
                const ins = await pb.collection("inscriptions").getOne(inscriptionId);
                document.getElementById("nb").value = ins.nb_personnes;
            }

        } catch (err) {
            console.error(err);
            alert("Erreur de chargement.");
        }
    }

    async function save() {
        const nb = parseInt(document.getElementById("nb").value);

        try {
            if (inscriptionId) {
                await pb.collection("inscriptions").update(inscriptionId, {
                    nb_personnes: nb
                });
            } else {
                await pb.collection("inscriptions").create({
                    companion: pb.authStore.model.id,
                    manifestation: manifestId,
                    nb_personnes: nb
                });
            }

            alert("Votre inscription a été enregistrée.\nVous serez " + nb + " personne(s).");

            window.location.href = "compagnons.html";

        } catch (err) {
            console.error(err);
            alert("Erreur lors de l'enregistrement.");
        }
    }

    load();
</script>

</body>
</html>
