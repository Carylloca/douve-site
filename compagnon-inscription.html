<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
    <script src="js/auth.js"></script>

    <style>
        body {
            margin: 0;
            background: #f4f4f4;
            font-family: "DM Sans", sans-serif;
        }

        /* HEADER */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: #7b0f23;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .header-title {
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            padding: 100px 20px;
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 14px;
            border-radius: 6px;
            background: #7b0f23;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .btn:hover {
            background: #9c1a33;
        }

        .btn-delete {
            background: #d50000;
        }

        .btn-delete:hover {
            background: #9b0000;
        }

        .btn-disabled {
            background: #aaa !important;
            cursor: not-allowed;
        }

        .info {
            margin-bottom: 10px;
            color: #444;
        }
    </style>
</head>

<body>

<div class="header">
    <div class="header-title">Inscription</div>
    <button class="btn" onclick="logout()">Déconnexion</button>
</div>

<div class="container">
    <div class="card" id="content">Chargement…</div>
</div>

<script>
    requireCompanion();
    const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

    const url = new URL(window.location.href);
    const manifestId = url.searchParams.get("m");
    const inscriptionId = url.searchParams.get("i");
    const companionId = pb.authStore.model.id;

    async function loadPage() {
        const box = document.getElementById("content");

        try {
            const m = await pb.collection("manifestations").getOne(manifestId);

            const d = new Date(m.date);
            const dateAff = d.toLocaleDateString("fr-CH");
            const heureAff = m.date.split(" ")[1].slice(0,5);

            const limite = new Date(m.date_limite);
            const now = new Date();
            const closed = now > limite;

            let inscription = null;
            if (inscriptionId) {
                inscription = await pb.collection("inscriptions").getOne(inscriptionId);
            }

            box.innerHTML = `
                <h2>${m.title}</h2>
                <div class="info">📅 ${dateAff} à ${heureAff}</div>
                <div class="info">⏳ Date limite : ${limite.toLocaleDateString("fr-CH")}</div>

                <label>Nombre de personnes :</label>
                <input type="number" id="nb" min="1" value="${inscription ? inscription.nb_personnes : 1}" ${closed ? "disabled" : ""}>

                <button class="btn" id="btnSave" ${closed ? "disabled" : ""}>
                    ${inscription ? "Modifier mon inscription" : "S’inscrire"}
                </button>

                ${inscription ? `
                    <button class="btn btn-delete" id="btnDelete" ${closed ? "disabled" : ""}>
                        Me désinscrire
                    </button>
                ` : ""}
            `;

            document.getElementById("btnSave").onclick = save;
            if (inscription) document.getElementById("btnDelete").onclick = remove;

        } catch (err) {
            box.innerHTML = "Erreur de chargement.";
            console.error(err);
        }
    }

    async function save() {
        const nb = parseInt(document.getElementById("nb").value);

        const data = {
            companion: companionId,
            manifestation: manifestId,
            nb_personnes: nb
        };

        try {
            if (inscriptionId) {
                await pb.collection("inscriptions").update(inscriptionId, data);
            } else {
                await pb.collection("inscriptions").create(data);
            }

            window.location.href = "compagnons.html";

        } catch (err) {
            alert("Erreur lors de l’enregistrement.");
            console.error(err);
        }
    }

    async function remove() {
        if (!confirm("Voulez-vous vraiment vous désinscrire ?")) return;

        try {
            await pb.collection("inscriptions").delete(inscriptionId);
            window.location.href = "compagnons.html";

        } catch (err) {
            alert("Erreur lors de la suppression.");
            console.error(err);
        }
    }

    loadPage();
</script>

</body>
</html>
