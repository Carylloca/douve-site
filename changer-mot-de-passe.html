<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier le mot de passe</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
    <script src="js/auth.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-image: url('index.png');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(0, 0, 0, 0.55);
            padding: 30px;
            border-radius: 12px;
            width: 330px;
            text-align: center;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: none;
            font-size: 16px;
        }

        button {
            background: rgba(139, 0, 0, 0.7);
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: rgba(179, 0, 0, 0.9);
        }

        #message {
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Modifier le mot de passe</h2>

    <label>Ancien mot de passe :</label>
    <input type="password" id="oldPassword">

    <label>Nouveau mot de passe :</label>
    <input type="password" id="newPassword">

    <label>Confirmer le nouveau mot de passe :</label>
    <input type="password" id="newPasswordConfirm">

    <button id="changeBtn">Modifier</button>

    <p id="message"></p>

    <a href="index.html" style="color:#ffdddd;">← Retour</a>

</div>

<script>
    if (!isLoggedIn()) {
        window.location.href = "login.html";
    }

    const user = getUser();

    document.getElementById("changeBtn").addEventListener("click", async () => {

        const oldPassword = document.getElementById("oldPassword").value.trim();
        const newPassword = document.getElementById("newPassword").value.trim();
        const newPasswordConfirm = document.getElementById("newPasswordConfirm").value.trim();
        const msg = document.getElementById("message");

        msg.style.color = "#ffdddd";

        if (!oldPassword || !newPassword || !newPasswordConfirm) {
            msg.textContent = "Veuillez remplir tous les champs.";
            return;
        }

        if (newPassword !== newPasswordConfirm) {
            msg.textContent = "Les nouveaux mots de passe ne correspondent pas.";
            return;
        }

        try {
            // 1️⃣ Ré-authentifier
            await pb.collection("companions").authWithPassword(user.email, oldPassword);

            // 2️⃣ Charger le record complet (nom, prenom, etc.)
            const fullUser = await pb.collection("companions").getOne(user.id);

            // 3️⃣ Mise à jour avec champs required
            await pb.collection("companions").update(user.id, {
                email: fullUser.email,
                nom: fullUser.nom,
                prenom: fullUser.prenom,
                password: newPassword,
                passwordConfirm: newPasswordConfirm
            });

            msg.style.color = "#aaffaa";
            msg.textContent = "Mot de passe modifié avec succès.";

        } catch (err) {
            msg.style.color = "#ffdddd";
            msg.textContent = "Impossible de modifier le mot de passe.";
            console.error(err);
        }
    });
</script>

</body>
</html>
