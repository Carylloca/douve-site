<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier le mot de passe</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-image: url('index.png');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(0, 0, 0, 0.55);
            padding: 30px;
            border-radius: 12px;
            width: 330px;
            text-align: center;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: none;
            font-size: 16px;
        }

        button {
            background: rgba(139, 0, 0, 0.7);
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: rgba(179, 0, 0, 0.9);
        }

        #message {
            margin-top: 10px;
            font-size: 14px;
        }

        .toggle {
            cursor: pointer;
            font-size: 12px;
            color: #ffdddd;
            margin-top: -10px;
            margin-bottom: 10px;
            display: block;
            text-align: right;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Modifier le mot de passe</h2>

    <label>Ancien mot de passe :</label>
    <input type="password" id="oldPassword">
    <span class="toggle" onclick="togglePwd('oldPassword')">Afficher</span>

    <label>Nouveau mot de passe :</label>
    <input type="password" id="newPassword">
    <span class="toggle" onclick="togglePwd('newPassword')">Afficher</span>

    <label>Confirmer le nouveau mot de passe :</label>
    <input type="password" id="newPasswordConfirm">
    <span class="toggle" onclick="togglePwd('newPasswordConfirm')">Afficher</span>

    <button id="changeBtn">Modifier</button>

    <p id="message"></p>

    <a href="index.html" style="color:#ffdddd;">← Retour</a>

</div>

<script>
    const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

    const msg = document.getElementById("message");

    // Vérifier connexion
    if (!pb.authStore.isValid || !pb.authStore.model) {
        window.location.href = "login.html";
    }

    function togglePwd(id) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
    }

    document.getElementById("changeBtn").addEventListener("click", async () => {

        const oldPassword = document.getElementById("oldPassword").value.trim();
        const newPassword = document.getElementById("newPassword").value.trim();
        const newPasswordConfirm = document.getElementById("newPasswordConfirm").value.trim();

        msg.style.color = "#ffdddd";

        if (!oldPassword || !newPassword || !newPasswordConfirm) {
            msg.textContent = "Veuillez remplir tous les champs.";
            return;
        }

        if (newPassword.length < 8) {
            msg.textContent = "Le mot de passe doit contenir au moins 8 caractères.";
            return;
        }

        if (newPassword !== newPasswordConfirm) {
            msg.textContent = "Les nouveaux mots de passe ne correspondent pas.";
            return;
        }

        try {
            const user = pb.authStore.model;

            // 1️⃣ Ré-authentifier
            await pb.collection("companions").authWithPassword(
                user.email,
                oldPassword
            );

            // 2️⃣ Charger le record complet
            const full = await pb.collection("companions").getOne(user.id);

            // 3️⃣ Nettoyer les champs immuables
            delete full.id;
            delete full.created;
            delete full.updated;
            delete full.collectionId;
            delete full.collectionName;

            // 4️⃣ Mise à jour complète
            await pb.collection("companions").update(user.id, {
                ...full,
                password: newPassword,
                passwordConfirm: newPasswordConfirm
            });

            msg.style.color = "#aaffaa";
            msg.textContent = "Mot de passe modifié avec succès. Redirection...";

            setTimeout(() => {
                window.location.href = "index.html";
            }, 1500);

        } catch (err) {
            console.error(err);
            msg.style.color = "#ffdddd";
            msg.textContent = "Ancien mot de passe incorrect ou erreur de mise à jour.";
        }
    });
</script>

</body>
</html>
