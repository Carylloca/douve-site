<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Compagnons</title>

    <style>
        /* ======== IMAGE DE FOND PERSONNALISABLE ======== */
        body {
            margin: 0;
            padding: 0;
            background-image: url("../img/page-admin-compagnons.jpg"); /* ← CHANGE ICI */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        /* ======== OVERLAY ======== */
        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* ======== TITRE ======== */
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            text-shadow: 0 0 10px black;
        }

        /* ======== BOUTONS ======== */
        .btn {
            display: block;
            width: fit-content;
            margin: 0 auto 30px auto;
            padding: 12px 20px;
            background: #7A0010; /* couleur bordeaux */
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover {
            background: #5A000C;
        }

        /* ======== CARTE COMPAGNON ======== */
        .comp-card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 10px;
            padding: 20px;
            margin: 15px auto;
            max-width: 600px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .comp-card strong {
            font-size: 18px;
        }

        .btn-delete {
            background: #d50000;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .btn-delete:hover {
            background: #9b0000;
        }
    </style>
</head>

<body>
    <div class="overlay">
        <h1>Gestion des compagnons</h1>

        <!-- Bouton retour au menu -->
        <a href="admin-menu.html" class="btn">← Retour au menu</a>

        <div id="companions">
            <p style="color:white;">Chargement...</p>
        </div>
    </div>

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <!-- Auth + API -->
    <script src="../js/auth.js"></script>

    <script>
        // Vérifier que l'utilisateur est connecté
        if (!pb.authStore.isValid) {
            window.location.href = "../login.html";
        }

        async function loadCompanions() {
            const container = document.getElementById("companions");
            container.innerHTML = "<p style='color:white;'>Chargement...</p>";

            try {
                const records = await pb.collection("companions").getFullList({
                    sort: "name"
                });

                container.innerHTML = "";

                records.forEach(c => {
                    const div = document.createElement("div");
                    div.className = "comp-card";

                    div.innerHTML = `
                        <strong>${c.name}</strong><br>
                        Email : ${c.email}<br>
                        Rôle : ${c.role}<br>
                        Groupe : ${c.group || "—"}<br><br>

                        <button class="btn-delete" onclick="deleteCompanion('${c.id}')">Supprimer</button>
                    `;

                    container.appendChild(div);
                });

            } catch (err) {
                container.innerHTML = "<p style='color:white;'>Erreur lors du chargement.</p>";
                console.error(err);
            }
        }

        async function deleteCompanion(id) {
            if (!confirm("Supprimer ce compagnon ?")) return;

            try {
                await pb.collection("companions").delete(id);
                loadCompanions();
            } catch (err) {
                alert("Erreur lors de la suppression.");
                console.error(err);
            }
        }

        loadCompanions();
    </script>
</body>
</html>
