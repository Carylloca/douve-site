<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Compagnons</title>

    <link rel="icon" type="image/png" href="../favicon.png">

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- SheetJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("../img/page-admin-compagnons.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        /* --- Barre supérieure --- */
        header {
            background: rgba(0, 0, 0, 0.85);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        .left-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #5A000C;
        }

        h1 {
            text-align: center;
            color: white;
            margin: 30px 0 20px;
            text-shadow: 0 0 10px black;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 20px;
        }

        .comp-card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 10px;
            padding: 20px;
            margin: 15px auto;
            max-width: 650px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .comp-photo {
            width: 90px;
            height: 90px;
            border-radius: 10px;
            object-fit: cover;
            border: 3px solid #7A0010;
        }

        .comp-info {
            flex: 1;
        }

        .btn-delete {
            background: #d50000;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .btn-delete:hover {
            background: #9b0000;
        }
    </style>
</head>

<body>
    <!-- Barre supérieure -->
    <header>
        <div class="left-buttons">
            <a href="../index.html" class="btn">🏠 Menu</a>
            <a href="admin-menu.html" class="btn">📋 Accueil admin</a>
        </div>
        <h2>Gestion des compagnons</h2>
        <button class="btn" onclick="logout()">⏻ Déconnexion</button>
    </header>

    <div class="overlay">
        <div style="text-align:center;">
            <a href="admin-compagnon-nouveau.html" class="btn">+ Ajouter un compagnon</a>
            <button class="btn" onclick="exportPDF()">Export PDF</button>
            <button class="btn" onclick="exportExcel()">Export Excel</button>
        </div>

        <div id="companions">
            <p style="color:white;">Chargement...</p>
        </div>
    </div>

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <!-- Auth -->
    <script src="../js/auth.js"></script>

    <script>
        // 🔒 Sécurisation admin
        requireComite();

        let companionsList = [];

        async function loadCompanions() {
            const container = document.getElementById("companions");
            container.innerHTML = "<p style='color:white;'>Chargement...</p>";

            try {
                const records = await pb.collection("companions").getFullList({
                    sort: "nom"
                });

                companionsList = records;
                container.innerHTML = "";

                records.forEach(c => {
                    const photoUrl = c.photo ? pb.files.getUrl(c, c.photo) : "../img/no-photo.png";

                    const div = document.createElement("div");
                    div.className = "comp-card";

                    div.innerHTML = `
                        <img src="${photoUrl}" class="comp-photo">

                        <div class="comp-info">
                            <strong style="font-size:20px;">${c.nom} ${c.prenom}</strong><br>
                            <strong>Fonction :</strong> ${c.fonction || "—"}<br>
                            <strong>Email :</strong> ${c.email_public || "—"}<br>
                            <strong>Téléphone :</strong> ${c.telephone || "—"}<br>
                        </div>

                        <div>
                            <a class="btn" href="admin-compagnon-modifier.html?id=${c.id}">Modifier</a><br><br>
                            <button class="btn-delete" onclick="deleteCompanion('${c.id}')">Supprimer</button>
                        </div>
                    `;

                    container.appendChild(div);
                });

            } catch (err) {
                container.innerHTML = "<p style='color:white;'>Erreur lors du chargement.</p>";
                console.error(err);
            }
        }

        async function deleteCompanion(id) {
            if (!confirm("Supprimer ce compagnon ?")) return;

            try {
                await pb.collection("companions").delete(id);
                loadCompanions();
            } catch (err) {
                alert("Erreur lors de la suppression.");
                console.error(err);
            }
        }

        function formatFileName() {
            return "Compagnons_" + new Date().toISOString().split("T")[0];
        }

        function exportPDF() {
            if (companionsList.length === 0) return;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            let y = 10;

            doc.text("Liste des compagnons", 10, y); 
            y += 12;

            companionsList.forEach(c => {
                doc.text(`${c.nom} ${c.prenom} – ${c.fonction || ""} – ${c.email_public || ""}`, 10, y);
                y += 8;
            });

            doc.save(formatFileName() + ".pdf");
        }

        function exportExcel() {
            if (companionsList.length === 0) return;

            const data = companionsList.map(c => ({
                Nom: c.nom,
                Prénom: c.prenom,
                Fonction: c.fonction || "",
                Email: c.email_public || "",
                Téléphone: c.telephone || ""
            }));

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Compagnons");

            XLSX.writeFile(wb, formatFileName() + ".xlsx");
        }

        loadCompanions();
    </script>
</body>
</html>
