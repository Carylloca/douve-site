<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Compagnons</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../favicon.png">

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- SheetJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("../img/page-admin-compagnons.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            text-shadow: 0 0 10px black;
        }

        .btn {
            display: inline-block;
            padding: 12px 20px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
            margin: 5px;
        }

        .btn:hover {
            background: #5A000C;
        }

        .comp-card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 10px;
            padding: 20px;
            margin: 15px auto;
            max-width: 600px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .comp-card strong {
            font-size: 18px;
        }

        .btn-delete {
            background: #d50000;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .btn-delete:hover {
            background: #9b0000;
        }
    </style>
</head>

<body>
    <div class="overlay">
        <h1>Gestion des compagnons</h1>

        <div style="text-align:center;">
            <a href="admin-menu.html" class="btn">← Retour au menu</a>
            <button class="btn" onclick="exportPDF()">Export PDF</button>
            <button class="btn" onclick="exportExcel()">Export Excel</button>
            <button class="btn" onclick="logout()">⏻ Déconnexion</button>
        </div>

        <div id="companions">
            <p style="color:white;">Chargement...</p>
        </div>
    </div>

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <!-- Auth -->
    <script src="../js/auth.js"></script>

    <script>
        // 🔒 Sécurisation admin
        requireComite();

        let companionsList = [];

        async function loadCompanions() {
            const container = document.getElementById("companions");
            container.innerHTML = "<p style='color:white;'>Chargement...</p>";

            try {
                const records = await pb.collection("companions").getFullList({
                    sort: "nom"
                });

                companionsList = records;
                container.innerHTML = "";

                records.forEach(c => {
                    const div = document.createElement("div");
                    div.className = "comp-card";

                    div.innerHTML = `
                        <strong>${c.nom} ${c.prenom}</strong><br>
                        Email : ${c.email}<br>
                        Rôle : ${c.role}<br>
                        Groupe : ${c.group || "—"}<br><br>

                        <button class="btn-delete" onclick="deleteCompanion('${c.id}')">Supprimer</button>
                    `;

                    container.appendChild(div);
                });

            } catch (err) {
                container.innerHTML = "<p style='color:white;'>Erreur lors du chargement.</p>";
                console.error(err);
            }
        }

        async function deleteCompanion(id) {
            if (!confirm("Supprimer ce compagnon ?")) return;

            try {
                await pb.collection("companions").delete(id);
                loadCompanions();
            } catch (err) {
                alert("Erreur lors de la suppression.");
                console.error(err);
            }
        }

        /* --- Format nom fichier --- */
        function formatFileName() {
            return "Compagnons_" + new Date().toISOString().split("T")[0];
        }

        /* --- Export PDF --- */
        function exportPDF() {
            if (companionsList.length === 0) return;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            let y = 10;

            doc.text("Liste des compagnons", 10, y); 
            y += 12;

            companionsList.forEach(c => {
                doc.text(`${c.nom} ${c.prenom} – ${c.email} – ${c.role}`, 10, y);
                y += 8;
            });

            doc.save(formatFileName() + ".pdf");
        }

        /* --- Export Excel --- */
        function exportExcel() {
            if (companionsList.length === 0) return;

            const data = companionsList.map(c => ({
                Nom: c.nom,
                Prénom: c.prenom,
                Email: c.email,
                Rôle: c.role,
                Groupe: c.group || "-"
            }));

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Compagnons");

            XLSX.writeFile(wb, formatFileName() + ".xlsx");
        }

        loadCompanions();
    </script>
</body>
</html>
