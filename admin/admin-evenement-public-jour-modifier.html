<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier un jour – Admin</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "DM Sans", sans-serif;
            background-image: url("../img/page-admin-evenement-public-jour-modifier.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header.admin-header {
            background: rgba(44, 62, 80, 0.90);
            padding: 18px 25px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
        }

        .header-btn {
            background: #7A0010;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 15px;
        }

        header h1 {
            width: 100%;
            text-align: center;
            margin: 10px 0 0 0;
            font-size: 28px;
            font-weight: 600;
        }

        .card {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 10px;
            max-width: 700px;
            margin: 30px auto;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            background: #8b0000;
            color: white;
            padding: 12px 18px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-size: 16px;
            flex: 1;
        }

        .btn:hover {
            background: #b30000;
        }

        .btn-red {
            background: #b30000;
        }

        .btn-red:hover {
            background: #7A0010;
        }

        .success { color: green; font-weight: bold; margin-top: 15px; }
        .error { color: red; font-weight: bold; margin-top: 15px; }

        /* ⭐ Alerte élégante */
        .alert-duplicate {
            background: #ffdddd;
            border-left: 5px solid #cc0000;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .alert-buttons {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .alert-btn {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-size: 15px;
        }

        .alert-cancel {
            background: #bbb;
        }

        .alert-continue {
            background: #cc0000;
            color: white;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<header class="admin-header">
    <a href="../index.html" class="header-btn">Menu</a>
    <a href="admin-menu.html" class="header-btn">Menu admin</a>
    <a id="retourEvent" class="header-btn">Retour à l’événement</a>
    <a id="retourJours" class="header-btn">Retour aux jours</a>
    <h1>Modifier un jour</h1>
</header>

<div class="card">

    <label>Date du jour :</label>
    <input type="date" id="date">

    <!-- ⭐ Alerte doublon -->
    <div id="alertDuplicate" class="alert-duplicate">
        ⚠️ Cette date existe déjà pour cet événement.
        <div class="alert-buttons">
            <button class="alert-btn alert-cancel" onclick="annulerModification()">Annuler</button>
            <button class="alert-btn alert-continue" onclick="confirmerModification()">Continuer quand même</button>
        </div>
    </div>

    <div class="btn-row">
        <button class="btn" onclick="modifierJour()">Enregistrer</button>
        <button class="btn btn-red" onclick="supprimerJour()">Supprimer</button>
    </div>

    <p id="feedback"></p>
</div>

<script>
const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

const jourId = new URLSearchParams(window.location.search).get("id");
const eventId = new URLSearchParams(window.location.search).get("event");

/* 🔐 Sécurité */
const user = pb.authStore.model;

if (!user) window.location.href = "../login.html";

if (user.role !== "comite" && user.role !== "responsable") {
    alert("Accès refusé");
    window.location.href = "../index.html";
}

/* Navigation */
document.getElementById("retourEvent").href =
    "admin-evenement-public-modifier.html?id=" + eventId;

document.getElementById("retourJours").href =
    "admin-evenement-public-jours.html?event=" + eventId;

/* ⭐ Générer automatiquement le nom du jour */
function nomDuJour(dateStr) {
    const date = new Date(dateStr);
    return date.toLocaleDateString("fr-FR", { weekday: "long" });
}

/* Charger le jour */
let jourActuel = null;

async function loadJour() {
    jourActuel = await pb.collection("planning_jours").getOne(jourId);

    document.getElementById("date").value = jourActuel.date;
}

loadJour();

/* ⭐ Gestion de l’alerte */
let modificationData = null;

function annulerModification() {
    document.getElementById("alertDuplicate").style.display = "none";
    modificationData = null;
}

function confirmerModification() {
    document.getElementById("alertDuplicate").style.display = "none";
    if (modificationData) envoyerModification(modificationData);
}

/* ⭐ Modifier */
async function modifierJour() {
    const feedback = document.getElementById("feedback");
    feedback.textContent = "";

    const nouvelleDate = document.getElementById("date").value;

    if (!nouvelleDate) {
        feedback.textContent = "Veuillez choisir une date.";
        feedback.className = "error";
        return;
    }

    const data = {
        date: nouvelleDate,
        nom_jour: nomDuJour(nouvelleDate)
    };

    /* Si la date n’a pas changé → pas besoin de vérifier */
    if (nouvelleDate === jourActuel.date) {
        envoyerModification(data);
        return;
    }

    /* 🔎 Vérifier doublon (intervalle fiable) */
    const dateMin = nouvelleDate + " 00:00:00";
    const dateMax = nouvelleDate + " 23:59:59";

    const deja = await pb.collection("planning_jours").getFullList({
        filter: `planning_event="${eventId}" && id != "${jourId}" && date >= "${dateMin}" && date <= "${dateMax}"`
    });

    if (deja.length > 0) {
        modificationData = data;
        document.getElementById("alertDuplicate").style.display = "block";
        return;
    }

    envoyerModification(data);
}

/* ⭐ Envoi réel */
async function envoyerModification(data) {
    const feedback = document.getElementById("feedback");

    try {
        await pb.collection("planning_jours").update(jourId, data);

        feedback.textContent = "Modifications enregistrées !";
        feedback.className = "success";

    } catch (error) {
        console.error(error);
        feedback.textContent = "Erreur lors de l’enregistrement.";
        feedback.className = "error";
    }
}

/* Supprimer */
async function supprimerJour() {
    if (!confirm("Supprimer ce jour ?")) return;

    await pb.collection("planning_jours").delete(jourId);

    window.location.href =
        "admin-evenement-public-jours.html?event=" + eventId;
}
</script>

</body>
</html>
