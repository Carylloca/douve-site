<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouveau poste – Admin</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "DM Sans", sans-serif;
            background-image: url("../img/page-admin-evenement-public-postes-nouveau.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header.admin-header {
            background: rgba(44, 62, 80, 0.90);
            padding: 18px 25px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
        }

        .header-btn {
            background: #7A0010;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 15px;
        }

        header h1 {
            width: 100%;
            text-align: center;
            margin: 10px 0 0 0;
            font-size: 28px;
            font-weight: 600;
        }

        .card {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 10px;
            max-width: 700px;
            margin: 30px auto;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        textarea {
            resize: vertical;
            height: 120px;
        }

        .responsables-box {
            background: rgba(255,255,255,0.95);
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 12px;
            cursor: pointer;
            margin-top: 10px;
        }

        .responsables-header {
            font-weight: bold;
        }

        .responsables-list {
            display: none;
            margin-top: 10px;
            border-top: 1px solid #ccc;
            padding-top: 10px;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px 10px;
        }

        .responsables-list label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: normal;
        }

        .btn {
            background: #8b0000;
            color: white;
            padding: 12px 18px;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            font-size: 16px;
            width: 100%;
            margin-top: 20px;
        }

        .btn:hover {
            background: #b30000;
        }

        .success { color: green; font-weight: bold; margin-top: 15px; }
        .error { color: red; font-weight: bold; margin-top: 15px; }
    </style>
</head>

<body>

<header class="admin-header">
    <a href="../index.html" class="header-btn">Menu</a>
    <a href="admin-menu.html" class="header-btn">Menu admin</a>
    <a id="retourEvent" class="header-btn">Retour à l’événement</a>
    <a id="retourPostes" class="header-btn">Postes de l’événement</a>
    <h1>Nouveau poste</h1>
</header>

<div class="card">

    <label>Titre du poste :</label>
    <input type="text" id="titre" required>

    <label>Description :</label>
    <textarea id="description"></textarea>

    <!-- ❌ Bloc TIERS supprimé -->

    <label>Responsables :</label>
    <div id="responsablesBox" class="responsables-box">
        <div class="responsables-header">Sélectionner les responsables ▼</div>
        <div class="responsables-list" id="responsablesList"></div>
    </div>

    <button class="btn" onclick="creerPoste()">Enregistrer</button>

    <p id="feedback"></p>
</div>

<script>
const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");
const eventId = new URLSearchParams(window.location.search).get("event");

document.getElementById("retourEvent").href =
    "admin-evenement-public-dashboard.html?id=" + eventId;

document.getElementById("retourPostes").href =
    "admin-evenement-public-postes.html?event=" + eventId;

document.getElementById("responsablesBox").addEventListener("click", (e) => {
    if (e.target.tagName === "INPUT") return;
    const list = document.getElementById("responsablesList");
    list.style.display = (list.style.display === "grid") ? "none" : "grid";
});

async function loadResponsables() {
    const companions = await pb.collection("companions").getFullList({ sort: "nom" });
    const list = document.getElementById("responsablesList");

    companions.forEach(c => {
        const item = document.createElement("label");
        item.innerHTML = `
            <input type="checkbox" value="${c.id}">
            ${c.nom} ${c.prenom}
        `;
        list.appendChild(item);
    });
}

async function creerPoste() {
    const feedback = document.getElementById("feedback");
    feedback.textContent = "";

    const responsables = Array.from(
        document.querySelectorAll("#responsablesList input:checked")
    ).map(cb => cb.value);

    const data = {
        titre: document.getElementById("titre").value,
        description: document.getElementById("description").value,
        responsable: responsables,
        manifestation: eventId
    };

    try {
        await pb.collection("planning_postes").create(data);
        feedback.textContent = "Poste enregistré !";
        feedback.className = "success";

        setTimeout(() => {
            window.location.href =
                "admin-evenement-public-postes.html?event=" + eventId;
        }, 800);

    } catch (error) {
        console.error(error);
        feedback.textContent = "Erreur lors de l’enregistrement.";
        feedback.className = "error";
    }
}

loadResponsables();
</script>

</body>
</html>
