<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des événements publics – Admin</title>

    <link rel="icon" type="image/png" href="../favicon.png">

    <!-- PocketBase centralisé -->
    <script src="../js/pocketbase.umd.js"></script>
    <script src="../js/hebergement_pb.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: url("../img/page-admin-evenement-public.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        header {
            background: rgba(0, 0, 0, 0.85);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        .left-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #5A000C;
        }

        h2 {
            text-align: center;
            color: white;
            margin: 0;
            text-shadow: 0 0 10px black;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 30px 0;
        }

        .panel {
            width: 95%;
            max-width: 1200px;
            margin: 20px auto;
            background: rgba(255,255,255,0.92);
            padding: 25px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table th, table td {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        table th {
            background: #eee;
        }

        .actions button {
            margin-right: 5px;
        }
    </style>
</head>

<body>

<div class="overlay">

<header>
    <div class="left-buttons">
        <a href="admin-menu.html" class="btn">Menu admin</a>
    </div>

    <h2>Gestion des événements publics</h2>

    <div class="left-buttons">
        <a href="admin-evenement-public-nouveau.html" class="btn">+ Nouvel événement public</a>
    </div>
</header>

<div class="panel">

    <h3>Liste des événements publics</h3>

    <table>
        <thead>
            <tr>
                <th>Titre</th>
                <th>Responsables</th>
                <th>Date</th>
                <th>Description</th>
                <th style="width:150px;">Actions</th>
            </tr>
        </thead>
        <tbody id="tableEvenements"></tbody>
    </table>

</div>
</div>

<script>
const pb = new PocketBase(window.PB_URL);

async function loadEvenements() {
    try {
        const evenements = await pb.collection("planning_events").getFullList({
            expand: "responsable",
            sort: "date_debut"
        });

        const tbody = document.getElementById("tableEvenements");
        tbody.innerHTML = "";

        evenements.forEach(ev => {
            const tr = document.createElement("tr");

            let responsables = "—";
            if (Array.isArray(ev.expand?.responsable)) {
                responsables = ev.expand.responsable
                    .map(r => r.nom + " " + r.prenom)
                    .join(", ");
            }

            const date = ev.date_debut
                ? new Date(ev.date_debut).toLocaleDateString("fr-CH")
                : "—";

            tr.innerHTML = `
                <td>${ev.titre}</td>
                <td>${responsables}</td>
                <td>${date}</td>
                <td>${ev.description || ""}</td>
                <td class="actions">
                    <button class="btn" onclick="editEvenement('${ev.id}')">Modifier</button>
                    <button class="btn" style="background:#b00020;" onclick="deleteEvenement('${ev.id}')">Supprimer</button>
                </td>
            `;

            tbody.appendChild(tr);
        });

    } catch (err) {
        alert("Erreur lors du chargement des événements publics.");
        console.error(err);
    }
}

function editEvenement(id) {
    window.location.href = "admin-evenement-public-modifier.html?id=" + id;
}

async function deleteEvenement(id) {
    if (!confirm("Supprimer cet événement public ?")) return;

    try {
        await pb.collection("planning_events").delete(id);
        loadEvenements();
    } catch (err) {
        alert("Erreur lors de la suppression.");
        console.error(err);
    }
}

loadEvenements();
</script>

</body>
</html>
