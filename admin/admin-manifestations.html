<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Manifestations</title>

    <style>
        /* ======== IMAGE DE FOND PERSONNALISABLE ======== */
        body {
            margin: 0;
            padding: 0;
            background-image: url("img/page-admin-manifestations.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        /* ======== OVERLAY ======== */
        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* ======== TITRE ======== */
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            text-shadow: 0 0 10px black;
        }

        /* ======== BOUTONS ======== */
        .btn {
            display: inline-block;
            padding: 10px 16px;
            background: #7A0010; /* Bordeaux */
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover {
            background: #5A000C;
        }

        .btn-back {
            display: block;
            width: fit-content;
            margin: 0 auto 30px auto;
        }

        .btn-create {
            display: block;
            width: fit-content;
            margin: 0 auto 30px auto;
        }

        .btn-delete {
            background: #d50000;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }

        .btn-delete:hover {
            background: #9b0000;
        }

        /* ======== CARTE MANIFESTATION ======== */
        .manifest-card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 10px;
            padding: 20px;
            margin: 15px auto;
            max-width: 600px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .manifest-card strong {
            font-size: 18px;
        }

        .btn-modifier {
            background: #7A0010;
            padding: 8px 12px;
            border-radius: 6px;
            color: white;
            text-decoration: none;
            margin-right: 10px;
            font-weight: bold;
        }

        .btn-modifier:hover {
            background: #5A000C;
        }
    </style>
</head>

<body>
    <div class="overlay">
        <h1>Gestion des manifestations</h1>

        <!-- Bouton retour au menu -->
        <a href="admin-menu.html" class="btn btn-back">← Retour au menu</a>

        <!-- Bouton nouvelle manifestation -->
        <a href="admin-manifestation-nouveau.html" class="btn btn-create">+ Nouvelle manifestation</a>

        <div id="manifestations">
            <p style="color:white;">Chargement...</p>
        </div>
    </div>

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <!-- Auth + API -->
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>

    <!-- Lancement -->
    <script>
        loadAdminManifestations = async function () {
            const container = document.getElementById("manifestations");
            container.innerHTML = "<p style='color:white;'>Chargement...</p>";

            try {
                const records = await pb.collection("manifestations").getFullList({
                    sort: "-date"
                });

                container.innerHTML = "";

                records.forEach(m => {
                    const div = document.createElement("div");
                    div.className = "manifest-card";

                    div.innerHTML = `
                        <strong>${m.title}</strong><br>
                        Date : ${m.date}<br>
                        Places max : ${m.places_max || "—"}<br>
                        Date limite : ${m.date_limite || "—"}<br><br>

                        <a href="admin-manifestation-modifier.html?id=${m.id}" class="btn-modifier">Modifier</a>
                        <button onclick="deleteManifestation('${m.id}')" class="btn-delete">Supprimer</button>
                    `;

                    container.appendChild(div);
                });

            } catch (err) {
                container.innerHTML = "<p style='color:white;'>Erreur lors du chargement.</p>";
                console.error(err);
            }
        };

        loadAdminManifestations();
    </script>
</body>
</html>
