<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Menu</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("../img/page-admin-menu.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        /* ⭐ Fond plus sombre */
        .overlay {
            background: rgba(0, 0, 0, 0.65); /* avant 0.35 */
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* ⭐ Header */
        header {
            width: 100%;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.55);
            box-shadow: 0 3px 8px rgba(0,0,0,0.4);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10;
        }

        .header-left a {
            margin-right: 15px;
            padding: 10px 15px;
            background: #7A0010;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
        }

        .header-left a:hover {
            background: #5A000C;
        }

        .logout-btn {
            padding: 10px 15px;
            background: #444;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            border: none;
        }

        .logout-btn:hover {
            background: #222;
        }

        h1 {
            text-align: center;
            color: white;
            margin-top: 120px;
            margin-bottom: 40px;
            text-shadow: 0 0 10px black;
            font-size: 32px;
        }

        .btn {
            display: block;
            width: 260px;
            margin: 15px auto;
            padding: 15px 20px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
            font-size: 18px;
            transition: 0.2s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.4);
        }

        .btn:hover {
            background: #5A000C;
        }
    </style>
</head>

<body>

    <!-- ⭐ HEADER ADMIN -->
    <header>
        <div class="header-left">
            <a href="../index.html">🏠 Menu</a>
            <!-- ❌ Bouton Menu admin supprimé -->
        </div>

        <button class="logout-btn" onclick="logout()">⏻ Déconnexion</button>
    </header>

    <div class="overlay">

        <h1>Menu Administrateur</h1>

        <!-- ⭐ Activités -->
        <a href="admin-manifestations.html" class="btn">📘 Activités</a>

        <!-- ⭐ Événements publics -->
        <a href="admin-evenement-public-dashboard.html" class="btn">📅 Événements publics</a>

        <!-- ⭐ Gestion du Bon Laron -->
        <a href="admin-chalet-liste.html" class="btn">🧾 Gestion du Bon Laron</a>

        <!-- ⭐ Gestion des compagnons -->
        <a href="admin-compagnons.html" class="btn">👥 Gestion des compagnons</a>

        <!-- ❌ Gestion des postes supprimé -->
    </div>

    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
    <script src="../js/auth.js"></script>

    <script>
        requireComite();
    </script>
</body>
</html>
