<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Menu</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("../img/page-admin-menu.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            text-shadow: 0 0 10px black;
            font-size: 32px;
        }

        .btn {
            display: block;
            width: 260px;
            margin: 15px auto;
            padding: 15px 20px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
            font-size: 18px;
            transition: 0.2s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.4);
        }

        .btn:hover {
            background: #5A000C;
        }

        .btn-grey {
            background: #555;
        }

        .btn-grey:hover {
            background: #333;
        }

        .btn-logout {
            background: #444;
        }

        .btn-logout:hover {
            background: #222;
        }
    </style>
</head>

<body>
    <div class="overlay">
        <h1>Menu Administrateur</h1>

        <!-- ⭐ Menu principal -->
        <a href="../index.html" class="btn btn-grey">🏠 Menu principal</a>

        <!-- ⭐ Activités (ancien Manifestations) -->
        <a href="admin-manifestations.html" class="btn">📘 Activités</a>

        <!-- ⭐ Événements publics -->
        <a href="admin-evenement-public-dashboard.html" class="btn">📅 Événements publics</a>

        <!-- ⭐ Gestion du Bon Laron -->
        <a href="admin-chalet-liste.html" class="btn">🧾 Gestion du Bon Laron</a>

        <!-- ⭐ Gestion des compagnons -->
        <a href="admin-compagnons.html" class="btn">👥 Gestion des compagnons</a>

        <!-- ⭐ Gestion des postes -->
        <a href="admin-stand-postes.html" class="btn">🛠️ Gestion des postes</a>

        <!-- ⭐ Déconnexion -->
        <button onclick="logout()" class="btn btn-logout">⏻ Déconnexion</button>
    </div>

    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
    <script src="../js/auth.js"></script>

    <script>
        requireComite();
    </script>
</body>
</html>
