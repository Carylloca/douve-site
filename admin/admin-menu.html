<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Menu</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("../img/page-admin-menu.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            overflow: hidden; /* supprime tout ascenseur */
        }

        /* ⭐ Fond moins sombre */
        .overlay {
            background: rgba(0, 0, 0, 0.15);
            height: calc(100vh - 70px);
            padding: 40px 20px;
            padding-top: 140px;
            box-sizing: border-box;
        }

        /* ⭐ Header original mais titre plus voyant */
        header {
            width: 100%;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.35); /* header moins sombre */
            box-shadow: 0 3px 8px rgba(0,0,0,0.4);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10;
            box-sizing: border-box;
        }

        /* ⭐ Titre plus clair et plus lisible */
        .header-title {
            flex: 1;
            text-align: center;
            color: #ffffff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 12px rgba(0,0,0,0.9); /* renforce la lisibilité */
            margin-right: 60px;
        }

        .header-left a {
            margin-right: 15px;
            padding: 10px 15px;
            background: #7A0010;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
            white-space: nowrap;
        }

        .header-left a:hover {
            background: #5A000C;
        }

        .logout-btn {
            padding: 10px 15px;
            background: #444;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            white-space: nowrap;
        }

        .logout-btn:hover {
            background: #222;
        }

        .btn {
            display: block;
            width: 260px;
            margin: 15px auto;
            padding: 15px 20px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
            font-size: 18px;
            transition: 0.2s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.4);
        }

        .btn:hover {
            background: #5A000C;
        }
    </style>
</head>

<body>

    <!-- ⭐ HEADER AVEC TITRE PLUS VOYANT -->
    <header>
        <div class="header-left">
            <a href="../index.html">🏠 Menu</a>
        </div>

        <div class="header-title">Menu Administrateur</div>

        <button class="logout-btn" onclick="logout()">⏻ Déconnexion</button>
    </header>

    <div class="overlay">

        <!-- ❌ Titre supprimé ici -->

        <a href="admin-manifestations.html" class="btn">📘 Activités</a>
        <a href="admin-evenement-public-dashboard.html" class="btn">📅 Événements publics</a>
        <a href="admin-chalet-liste.html" class="btn">🧾 Gestion du Bon Laron</a>
        <a href="admin-compagnons.html" class="btn">👥 Gestion des compagnons</a>

    </div>

    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
    <script src="../js/auth.js"></script>

    <script>
        requireComite();
    </script>
</body>
</html>
