<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier un créneau – Admin</title>
    <link rel="icon" type="image/png" href="../favicon.png">

    <!-- PocketBase centralisé -->
    <script src="../js/pocketbase.umd.js"></script>
    <script src="../js/hebergement_pb.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "DM Sans", sans-serif;
            background-image: url("../img/page-admin-evenement-public-creneau-modifier.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header.admin-header {
            background: rgba(44, 62, 80, 0.90);
            padding: 18px 25px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
        }

        .header-btn {
            background: #7A0010;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 15px;
        }

        header h1 {
            width: 100%;
            text-align: center;
            margin: 10px 0 0 0;
            font-size: 28px;
            font-weight: 600;
        }

        .card {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 10px;
            max-width: 500px;
            margin: 30px auto;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        .time-row {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 15px;
        }

        .time-inner {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .time-select {
            width: 80px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        .time-sep {
            font-size: 20px;
            font-weight: bold;
        }

        .poste-list {
            margin-top: 10px;
            padding: 10px;
            background: #f7f7f7;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .poste-item {
            margin: 5px 0;
        }

        .btn {
            background: #8b0000;
            color: white;
            padding: 12px 18px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-size: 16px;
            width: 100%;
        }

        .btn:hover {
            background: #b30000;
        }

        .btn-small {
            background: #7A0010;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-small:hover {
            background: #a00015;
        }

        .success { color: green; font-weight: bold; margin-top: 15px; }
        .error { color: red; font-weight: bold; margin-top: 15px; }
    </style>
</head>

<body>

<header class="admin-header">
    <a href="../index.html" class="header-btn">Menu</a>
    <a href="admin-menu.html" class="header-btn">Menu admin</a>
    <a id="retourPlanning" class="header-btn">Retour au planning</a>
    <h1>Modifier un créneau</h1>
</header>

<div class="card">

    <h2 id="jourTitre" style="text-align:center; margin-top:0;"></h2>

    <div class="time-row">
        <div>
            <label>Heure de début :</label>
            <div class="time-inner">
                <select id="h_debut" class="time-select"></select>
                <span class="time-sep">:</span>
                <select id="m_debut" class="time-select">
                    <option>00</option>
                    <option>15</option>
                    <option>30</option>
                    <option>45</option>
                </select>
            </div>
        </div>

        <div>
            <label>Heure de fin :</label>
            <div class="time-inner">
                <select id="h_fin" class="time-select"></select>
                <span class="time-sep">:</span>
                <select id="m_fin" class="time-select">
                    <option>00</option>
                    <option>15</option>
                    <option>30</option>
                    <option>45</option>
                </select>
            </div>
        </div>
    </div>

    <label>Postes :</label>
    <div id="postesContainer" class="poste-list">
        <button onclick="toggleTous()" class="btn-small" style="margin-bottom:10px;">Tous</button>
    </div>

    <div style="display:flex; gap:15px; margin-top:20px;">
        <button class="btn" style="flex:1;" onclick="modifierCreneau()">Enregistrer</button>
        <button class="btn" style="flex:1;" onclick="memoriserEtDupliquer()">Mémoriser et Dupliquer</button>
    </div>

    <p id="feedback"></p>
</div>

<script>
const pb = new PocketBase(window.PB_URL);

const params = new URLSearchParams(window.location.search);
const eventId = params.get("event");
const creneauId = params.get("id");
const jourId = params.get("jour");

let creneauOriginal = null;

/* Sécurité */
const user = pb.authStore.model;
if (!user) window.location.href = "../login.html";
if (user.role !== "comite" && user.role !== "responsable") {
    alert("Accès refusé");
    window.location.href = "../index.html";
}

/* Navigation */
document.getElementById("retourPlanning").href =
    "admin-evenement-public-jour-details.html?id=" + jourId + "&event=" + eventId;

/* Remplir heures */
function remplirHeures() {
    const selects = [document.getElementById("h_debut"), document.getElementById("h_fin")];
    selects.forEach(sel => {
        for (let h = 0; h < 24; h++) {
            const hh = h.toString().padStart(2, "0");
            sel.innerHTML += `<option>${hh}</option>`;
        }
    });
}
remplirHeures();

/* Charger les postes */
async function chargerPostes(posteActuel) {
    const postes = await pb.collection("planning_postes").getFullList({
        filter: `manifestation = "${eventId}"`,
        sort: "titre"
    });

    const container = document.getElementById("postesContainer");

    postes.forEach(p => {
        container.innerHTML += `
            <div class="poste-item">
                <label>
                    <input type="checkbox" class="posteCheck" value="${p.id}" ${p.id === posteActuel ? "checked" : ""}>
                    ${p.titre}
                </label>
            </div>
        `;
    });
}

/* Bouton Tous */
function toggleTous() {
    const checks = document.querySelectorAll(".posteCheck");
    const allChecked = [...checks].every(c => c.checked);
    checks.forEach(c => c.checked = !allChecked);
}

/* Charger le créneau */
async function chargerCreneau() {
    creneauOriginal = await pb.collection("planning_creneaux").getOne(creneauId, {
        expand: "planning_jour,poste"
    });

    const [hDeb, mDeb] = creneauOriginal.heure_debut.split(":");
    const [hFin, mFin] = creneauOriginal.heure_fin.split(":");

    document.getElementById("h_debut").value = hDeb;
    document.getElementById("m_debut").value = mDeb;
    document.getElementById("h_fin").value = hFin;
    document.getElementById("m_fin").value = mFin;

    document.getElementById("jourTitre").textContent =
        new Date(creneauOriginal.expand.planning_jour.date)
            .toLocaleDateString("fr-FR", { weekday:"long", day:"numeric", month:"long" });

    await chargerPostes(creneauOriginal.poste);
}
chargerCreneau();

/* Modifier */
async function modifierCreneau(dupliquer = false) {
    const feedback = document.getElementById("feedback");
    feedback.textContent = "";
    feedback.className = "";

    const heureDebut = document.getElementById("h_debut").value + ":" + document.getElementById("m_debut").value;
    const heureFin = document.getElementById("h_fin").value + ":" + document.getElementById("m_fin").value;

    const postes = [...document.querySelectorAll(".posteCheck:checked")].map(c => c.value);

    if (postes.length === 0) {
        feedback.textContent = "Veuillez sélectionner un poste.";
        feedback.className = "error";
        return;
    }

    const depasseMinuit = heureFin < heureDebut;

    try {
        await pb.collection("planning_creneaux").delete(creneauId);

        for (const posteId of postes) {

            if (!depasseMinuit) {
                await pb.collection("planning_creneaux").create({
                    planning_jour: creneauOriginal.planning_jour,
                    heure_debut: heureDebut,
                    heure_fin: heureFin,
                    poste: posteId
                });
            } else {
                await pb.collection("planning_creneaux").create({
                    planning_jour: creneauOriginal.planning_jour,
                    heure_debut: heureDebut,
                    heure_fin: "23:59",
                    poste: posteId
                });

                const jour = creneauOriginal.expand.planning_jour;
                const d = new Date(jour.date);
                d.setDate(d.getDate() + 1);
                const dateSuivante = d.toISOString().split("T")[0];

                let jourSuivant = null;
                try {
                    jourSuivant = await pb.collection("planning_jours").getFirstListItem(
                        `planning_event = "${eventId}" && date = "${dateSuivante}"`
                    );
                } catch (e) {}

                if (jourSuivant) {
                    await pb.collection("planning_creneaux").create({
                        planning_jour: jourSuivant.id,
                        heure_debut: "00:00",
                        heure_fin: heureFin,
                        poste: posteId
                    });
                }
            }
        }

        feedback.textContent = "Modifications enregistrées.";
        feedback.className = "success";

        setTimeout(() => {
            if (dupliquer) {
                window.location.href =
                    "admin-evenement-public-creneau-modifier.html?id=" + creneauId +
                    "&jour=" + jourId +
                    "&event=" + eventId;
            } else {
                window.location.href =
                    "admin-evenement-public-jour-details.html?id=" + jourId +
                    "&event=" + eventId;
            }
        }, 800);

    } catch (error) {
        console.error(error);
        feedback.textContent = "Erreur lors de la modification.";
        feedback.className = "error";
    }
}

/* DUPLICATION AUTOMATIQUE */
async function memoriserEtDupliquer() {
    localStorage.setItem("dup_h_debut", document.getElementById("h_debut").value);
    localStorage.setItem("dup_m_debut", document.getElementById("m_debut").value);
    localStorage.setItem("dup_h_fin", document.getElementById("h_fin").value);
    localStorage.setItem("dup_m_fin", document.getElementById("m_fin").value);

    const postes = [...document.querySelectorAll(".posteCheck:checked")].map(c => c.value);
    localStorage.setItem("dup_postes", JSON.stringify(postes));

    await modifierCreneau(true);
}

/* RECHARGEMENT AUTO */
function rechargerDuplication() {
    const hDeb = localStorage.getItem("dup_h_debut");
    const mDeb = localStorage.getItem("dup_m_debut");
    const hFin = localStorage.getItem("dup_h_fin");
    const mFin = localStorage.getItem("dup_m_fin");
    const postes = JSON.parse(localStorage.getItem("dup_postes") || "[]");

    if (hDeb) document.getElementById("h_debut").value = hDeb;
    if (mDeb) document.getElementById("m_debut").value = mDeb;
    if (hFin) document.getElementById("h_fin").value = hFin;
    if (mFin) document.getElementById("m_fin").value = mFin;

    postes.forEach(id => {
        const checkbox = document.querySelector(`.posteCheck[value="${id}"]`);
        if (checkbox) checkbox.checked = true;
    });

    localStorage.removeItem("dup_h_debut");
    localStorage.removeItem("dup_m_debut");
    localStorage.removeItem("dup_h_fin");
    localStorage.removeItem("dup_m_fin");
    localStorage.removeItem("dup_postes");
}

setTimeout(rechargerDuplication, 300);
</script>

</body>
</html>
