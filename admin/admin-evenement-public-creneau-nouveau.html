<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouveau créneau – Admin</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "DM Sans", sans-serif;
            background-image: url("../img/page-admin-evenement-public-creneau-nouveau.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header.admin-header {
            background: rgba(44, 62, 80, 0.90);
            padding: 18px 25px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
        }

        .header-btn {
            background: #7A0010;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 15px;
        }

        header h1 {
            width: 100%;
            text-align: center;
            margin: 10px 0 0 0;
            font-size: 28px;
            font-weight: 600;
        }

        .card {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 10px;
            max-width: 700px;
            margin: 30px auto;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        .btn {
            background: #8b0000;
            color: white;
            padding: 12px 18px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-size: 16px;
            width: 100%;
            margin-top: 20px;
        }

        .btn:hover {
            background: #b30000;
        }

        .success { color: green; font-weight: bold; margin-top: 15px; }
        .error { color: red; font-weight: bold; margin-top: 15px; }
    </style>
</head>

<body>

<header class="admin-header">
    <a href="../index.html" class="header-btn">Menu</a>
    <a href="admin-menu.html" class="header-btn">Menu admin</a>
    <a id="retourPlanning" class="header-btn">Retour au planning</a>
    <h1>Nouveau créneau</h1>
</header>

<div class="card">

    <label>Heure de début :</label>
    <input type="time" id="heure_debut" required>

    <label>Heure de fin :</label>
    <input type="time" id="heure_fin" required>

    <label>Poste :</label>
    <input type="text" id="poste" placeholder="Ex : Bar, Sécurité…" required>

    <button class="btn" onclick="creerCreneau()">Enregistrer</button>

    <p id="feedback"></p>
</div>

<script>
const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

const params = new URLSearchParams(window.location.search);
const eventId = params.get("event");
const jourId = params.get("jour");

/* Sécurité */
const user = pb.authStore.model;
if (!user) window.location.href = "../login.html";
if (user.role !== "comite" && user.role !== "responsable") {
    alert("Accès refusé");
    window.location.href = "../index.html";
}

/* Navigation */
document.getElementById("retourPlanning").href =
    "admin-evenement-public-planning.html?event=" + eventId;

/* Utilitaire : format date YYYY-MM-DD → +1 jour */
function addOneDay(dateStr) {
    const d = new Date(dateStr);
    d.setDate(d.getDate() + 1);
    return d.toISOString().split("T")[0];
}

/* Création du créneau avec découpage automatique si dépasse minuit */
async function creerCreneau() {
    const feedback = document.getElementById("feedback");
    feedback.textContent = "";
    feedback.className = "";

    const heureDebut = document.getElementById("heure_debut").value;
    const heureFin = document.getElementById("heure_fin").value;
    const poste = document.getElementById("poste").value.trim();

    if (!heureDebut || !heureFin || !poste) {
        feedback.textContent = "Veuillez remplir tous les champs.";
        feedback.className = "error";
        return;
    }

    const depasseMinuit = heureFin < heureDebut;

    try {
        if (!depasseMinuit) {
            // Créneau normal
            await pb.collection("planning_creneaux").create({
                planning_jour: jourId,
                heure_debut: heureDebut,
                heure_fin: heureFin,
                poste: poste
            });
        } else {
            // Créneau 1 : jour actuel (jusqu'à 23:59)
            await pb.collection("planning_creneaux").create({
                planning_jour: jourId,
                heure_debut: heureDebut,
                heure_fin: "23:59",
                poste: poste
            });

            // Récupérer le jour actuel pour connaître sa date
            const jour = await pb.collection("planning_jours").getOne(jourId);
            const dateSuivante = addOneDay(jour.date);

            // Chercher le jour suivant dans le même événement
            let jourSuivant = null;
            try {
                jourSuivant = await pb.collection("planning_jours").getFirstListItem(
                    `planning_event = "${eventId}" && date = "${dateSuivante}"`
                );
            } catch (e) {
                // Aucun jour suivant trouvé : on informe mais on ne bloque pas la création du premier créneau
                console.warn("Jour suivant introuvable pour la date", dateSuivante);
            }

            if (jourSuivant) {
                // Créneau 2 : jour suivant (00:00 → heureFin)
                await pb.collection("planning_creneaux").create({
                    planning_jour: jourSuivant.id,
                    heure_debut: "00:00",
                    heure_fin: heureFin,
                    poste: poste
                });
            } else {
                alert("Attention : le créneau dépasse minuit mais aucun jour suivant n'existe pour cette date. Seule la partie jusqu'à 23:59 a été créée.");
            }
        }

        feedback.textContent = "Créneau enregistré.";
        feedback.className = "success";

        setTimeout(() => {
            window.location.href =
                "admin-evenement-public-planning.html?event=" + eventId;
        }, 800);

    } catch (error) {
        console.error(error);
        feedback.textContent = "Erreur lors de l’enregistrement du créneau.";
        feedback.className = "error";
    }
}
</script>

</body>
</html>
