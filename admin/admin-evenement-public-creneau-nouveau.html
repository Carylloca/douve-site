<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouveau créneau – Admin</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "DM Sans", sans-serif;
            background-image: url("../img/page-admin-evenement-public-creneau-nouveau.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header.admin-header {
            background: rgba(44, 62, 80, 0.90);
            padding: 18px 25px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
        }

        .header-btn {
            background: #7A0010;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 15px;
        }

        header h1 {
            width: 100%;
            text-align: center;
            margin: 10px 0 0 0;
            font-size: 28px;
            font-weight: 600;
        }

        .card {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 10px;
            max-width: 700px;
            margin: 30px auto;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        .time-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .time-select {
            width: 80px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        .time-sep {
            font-size: 20px;
            font-weight: bold;
        }

        .poste-list {
            margin-top: 10px;
            padding: 10px;
            background: #f7f7f7;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .poste-item {
            margin: 5px 0;
        }

        .btn {
            background: #8b0000;
            color: white;
            padding: 12px 18px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-size: 16px;
            width: 100%;
            margin-top: 20px;
        }

        .btn:hover {
            background: #b30000;
        }

        .success { color: green; font-weight: bold; margin-top: 15px; }
        .error { color: red; font-weight: bold; margin-top: 15px; }
    </style>
</head>

<body>

<header class="admin-header">
    <a href="../index.html" class="header-btn">Menu</a>
    <a href="admin-menu.html" class="header-btn">Menu admin</a>
    <a id="retourPlanning" class="header-btn">Retour au planning</a>
    <h1>Nouveau créneau</h1>
</header>

<div class="card">

    <h2 id="jourTitre" style="text-align:center; margin-top:0;"></h2>

    <label>Heure de début :</label>
    <div class="time-row">
        <select id="h_debut" class="time-select"></select>
        <span class="time-sep">:</span>
        <select id="m_debut" class="time-select">
            <option>00</option>
            <option>15</option>
            <option>30</option>
            <option>45</option>
        </select>
    </div>

    <label>Heure de fin :</label>
    <div class="time-row">
        <select id="h_fin" class="time-select"></select>
        <span class="time-sep">:</span>
        <select id="m_fin" class="time-select">
            <option>00</option>
            <option>15</option>
            <option>30</option>
            <option>45</option>
        </select>
    </div>

    <label>Postes :</label>
    <button onclick="toggleTous()" style="margin-bottom:10px;">Tous</button>
    <div id="postesContainer" class="poste-list"></div>

    <button class="btn" onclick="creerCreneau()">Enregistrer</button>

    <p id="feedback"></p>
</div>

<script>
const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

const params = new URLSearchParams(window.location.search);
const eventId = params.get("event");
const jourId = params.get("jour");

/* Sécurité */
const user = pb.authStore.model;
if (!user) window.location.href = "../login.html";
if (user.role !== "comite" && user.role !== "responsable") {
    alert("Accès refusé");
    window.location.href = "../index.html";
}

/* Navigation */
document.getElementById("retourPlanning").href =
    "admin-evenement-public-planning.html?event=" + eventId;

/* Remplir les heures */
function remplirHeures() {
    const selects = [document.getElementById("h_debut"), document.getElementById("h_fin")];
    selects.forEach(sel => {
        for (let h = 0; h < 24; h++) {
            const hh = h.toString().padStart(2, "0");
            sel.innerHTML += `<option>${hh}</option>`;
        }
    });
}
remplirHeures();

/* Charger le jour */
async function chargerJour() {
    const jour = await pb.collection("planning_jours").getOne(jourId);
    const date = new Date(jour.date);
    const nom = date.toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long" });
    document.getElementById("jourTitre").textContent = nom;
}
chargerJour();

/* Charger les postes */
async function chargerPostes() {
    const postes = await pb.collection("planning_postes").getFullList({
        filter: `manifestation = "${eventId}"`,
        sort: "titre"
    });

    const container = document.getElementById("postesContainer");
    container.innerHTML = "";

    postes.forEach(p => {
        container.innerHTML += `
            <div class="poste-item">
                <label>
                    <input type="checkbox" class="posteCheck" value="${p.titre}">
                    ${p.titre}
                </label>
            </div>
        `;
    });
}
chargerPostes();

/* Bouton Tous */
function toggleTous() {
    const checks = document.querySelectorAll(".posteCheck");
    const allChecked = [...checks].every(c => c.checked);
    checks.forEach(c => c.checked = !allChecked);
}

/* Utilitaire : +1 jour */
function addOneDay(dateStr) {
    const d = new Date(dateStr);
    d.setDate(d.getDate() + 1);
    return d.toISOString().split("T")[0];
}

/* Création */
async function creerCreneau() {
    const feedback = document.getElementById("feedback");
    feedback.textContent = "";
    feedback.className = "";

    const heureDebut = document.getElementById("h_debut").value + ":" + document.getElementById("m_debut").value;
    const heureFin = document.getElementById("h_fin").value + ":" + document.getElementById("m_fin").value;

    const postes = [...document.querySelectorAll(".posteCheck:checked")].map(c => c.value);

    if (postes.length === 0) {
        feedback.textContent = "Veuillez sélectionner au moins un poste.";
        feedback.className = "error";
        return;
    }

    const depasseMinuit = heureFin < heureDebut;

    try {
        for (const poste of postes) {

            if (!depasseMinuit) {
                await pb.collection("planning_creneaux").create({
                    planning_jour: jourId,
                    heure_debut: heureDebut,
                    heure_fin: heureFin,
                    poste: poste
                });
            } else {
                await pb.collection("planning_creneaux").create({
                    planning_jour: jourId,
                    heure_debut: heureDebut,
                    heure_fin: "23:59",
                    poste: poste
                });

                const jour = await pb.collection("planning_jours").getOne(jourId);
                const dateSuivante = addOneDay(jour.date);

                let jourSuivant = null;
                try {
                    jourSuivant = await pb.collection("planning_jours").getFirstListItem(
                        `planning_event = "${eventId}" && date = "${dateSuivante}"`
                    );
                } catch (e) {}

                if (jourSuivant) {
                    await pb.collection("planning_creneaux").create({
                        planning_jour: jourSuivant.id,
                        heure_debut: "00:00",
                        heure_fin: heureFin,
                        poste: poste
                    });
                }
            }
        }

        feedback.textContent = "Créneaux enregistrés.";
        feedback.className = "success";

        setTimeout(() => {
            window.location.href =
                "admin-evenement-public-planning.html?event=" + eventId;
        }, 800);

    } catch (error) {
        console.error(error);
        feedback.textContent = "Erreur lors de l’enregistrement.";
        feedback.className = "error";
    }
}
</script>

</body>
</html>
