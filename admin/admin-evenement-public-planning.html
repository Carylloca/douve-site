<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Planning – Admin</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "DM Sans", sans-serif;
            background-image: url("../img/page-admin-evenement-public-planning.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* 🔥 Header centré */
        header.admin-header {
            background: rgba(44, 62, 80, 0.90);
            height: 70px;
            padding: 0 20px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
        }

        .header-left,
        .header-right {
            width: 33%;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .header-title {
            width: 34%;
            text-align: center;
            margin: 0;
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        .header-btn {
            background: #7A0010;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 15px;
        }

        .card {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 10px;
            max-width: 1000px;
            margin: 30px auto;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        th {
            background: #eee;
            text-align: left;
        }

        .btn {
            background: #8b0000;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }

        .btn:hover {
            background: #b30000;
        }

        .btn-red {
            background: #b30000;
        }

        .btn-red:hover {
            background: #7A0010;
        }

        .top-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 20px;
            font-weight: bold;
            margin-top: 25px;
            margin-bottom: 10px;
        }

        /* Filtres par postes */
        #filtrePostes {
            margin: 10px 0 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        #filtrePostes label {
            font-size: 14px;
        }

        .filtre-poste {
            accent-color: #7A0010;
        }
    </style>
</head>

<body>

<header class="admin-header">

    <div class="header-left">
        <a href="../index.html" class="header-btn">Menu</a>
        <a href="admin-menu.html" class="header-btn">Menu admin</a>
        <a id="retourEvent" class="header-btn">Retour à l’événement</a>
    </div>

    <h1 class="header-title">Planning de l’événement</h1>

    <div class="header-right"></div>

</header>

<div class="card">

    <!-- BLOC 1 : Liste des jours -->
    <div class="top-actions">
        <a id="btnNewJour" class="btn">+ Nouveau jour</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="joursTable"></tbody>
    </table>

    <!-- BLOC 2 : Créneaux du jour sélectionné -->
    <div id="creneauxSection" style="display:none;">
        <div class="subtitle" id="titreJour"></div>

        <!-- Filtres par postes -->
        <div id="filtrePostes"></div>

        <div class="top-actions">
            <button class="btn" onclick="ouvrirNouveauCreneau()">+ Nouveau créneau</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Heure</th>
                    <th>Poste</th>
                    <th>Assigné</th>
                    <th>Inscrits</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="creneauxTable"></tbody>
        </table>
    </div>

</div>

<script>
const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

const eventId = new URLSearchParams(window.location.search).get("event");
let jourSelectionne = null;
let postesFiltres = [];
let creneauxCourants = [];

/* Sécurité */
const user = pb.authStore.model;
if (!user) window.location.href = "../login.html";
if (user.role !== "comite" && user.role !== "responsable") {
    alert("Accès refusé");
    window.location.href = "../index.html";
}

/* Navigation */
document.getElementById("retourEvent").href =
    "admin-evenement-public-dashboard.html?id=" + eventId;

document.getElementById("btnNewJour").href =
    "admin-evenement-public-jour-nouveau.html?event=" + eventId;

/* Format date FR */
function formatDateFr(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString("fr-FR", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric"
    });
}

/* Charger les jours */
async function loadJours() {
    const jours = await pb.collection("planning_jours").getFullList({
        filter: `planning_event = "${eventId}"`,
        sort: "date"
    });

    const tbody = document.getElementById("joursTable");
    tbody.innerHTML = "";

    jours.forEach(j => {
        tbody.innerHTML += `
            <tr>
                <td>${formatDateFr(j.date)}</td>
                <td>
                    <button class="btn" onclick="voirCreneaux('${j.id}', '${j.date}')">Voir créneaux</button>
                    <a class="btn" href="admin-evenement-public-jour-details.html?id=${j.id}&event=${eventId}">Détails</a>
                    <button class="btn btn-red" onclick="supprimerJour('${j.id}')">Supprimer</button>
                </td>
            </tr>
        `;
    });
}

/* Voir les créneaux d’un jour */
async function voirCreneaux(jourId, date) {
    jourSelectionne = jourId;

    document.getElementById("titreJour").textContent = formatDateFr(date);
    document.getElementById("creneauxSection").style.display = "block";

    const creneaux = await pb.collection("planning_creneaux").getFullList({
        filter: `planning_jour = "${jourId}"`,
        expand: "poste,compagnon_assigne",
        sort: "heure_debut"
    });

    creneauxCourants = creneaux;

    // Générer les filtres de postes
    const postes = [...new Set(creneaux.map(c => c.expand?.poste?.titre).filter(Boolean))];
    const filtreDiv = document.getElementById("filtrePostes");
    filtreDiv.innerHTML = "";

    if (postes.length > 0) {
        postes.forEach(p => {
            const id = "poste_" + p.replace(/\W+/g, "_");
            filtreDiv.innerHTML += `
                <label for="${id}">
                    <input type="checkbox" id="${id}" class="filtre-poste" value="${p}" checked>
                    ${p}
                </label>
            `;
        });
        postesFiltres = [...postes];
        document.querySelectorAll(".filtre-poste").forEach(cb => {
            cb.addEventListener("change", filtrerCreneaux);
        });
    } else {
        filtreDiv.innerHTML = "<em>Aucun poste pour ce jour.</em>";
        postesFiltres = [];
    }

    afficherCreneaux();
}

/* Met à jour la liste des postes filtrés et réaffiche */
function filtrerCreneaux() {
    const cochés = Array.from(document.querySelectorAll(".filtre-poste:checked"))
        .map(cb => cb.value);
    postesFiltres = cochés;
    afficherCreneaux();
}

/* Afficher les créneaux (en tenant compte des filtres) */
async function afficherCreneaux() {
    const tbody = document.getElementById("creneauxTable");
    tbody.innerHTML = "";

    for (const c of creneauxCourants) {
        const posteTitre = c.expand?.poste?.titre || null;

        if (postesFiltres.length > 0 && posteTitre && !postesFiltres.includes(posteTitre)) {
            continue;
        }

        const assign = c.expand?.compagnon_assigne
            ? c.expand.companon_assigne.nom + " " + c.expand.companon_assigne.prenom
            : "—";

        // Nombre de personnes inscrites pour ce créneau
        let totalInscrits = 0;
        try {
            const dispo = await pb.collection("planning_disponibilites").getFullList({
                filter: `planning_creneau = "${c.id}"`
            });
            totalInscrits = dispo.length;
        } catch (e) {
            console.error("Erreur chargement disponibilités pour créneau", c.id, e);
        }

        tbody.innerHTML += `
            <tr>
                <td>${c.heure_debut} → ${c.heure_fin}</td>

                <td>
                    ${(!posteTitre || posteTitre === "-aucun-")
                        ? "Pas de préférence"
                        : posteTitre}
                </td>

                <td>${assign}</td>
                <td>${totalInscrits}</td>

                <td>
                    <a class="btn" href="admin-evenement-public-creneau-modifier.html?id=${c.id}&jour=${jourSelectionne}&event=${eventId}">Modifier</a>
                    <button class="btn" onclick="dupliquerCreneau('${c.id}')">Dupliquer</button>
                    <button class="btn btn-red" onclick="supprimerCreneau('${c.id}')">Supprimer</button>
                </td>
            </tr>
        `;
    }
}

/* Nouveau créneau */
function ouvrirNouveauCreneau() {
    if (!jourSelectionne) return;
    window.location.href =
        "admin-evenement-public-creneau-nouveau.html?event=" + eventId +
        "&jour=" + jourSelectionne;
}

/* Suppression jour */
async function supprimerJour(id) {
    if (!confirm("Supprimer ce jour ?")) return;
    await pb.collection("planning_jours").delete(id);
    loadJours();
}

/* Suppression créneau */
async function supprimerCreneau(id) {
    if (!confirm("Supprimer ce créneau ?")) return;
    await pb.collection("planning_creneaux").delete(id);
    if (jourSelectionne) {
        const jour = await pb.collection("planning_jours").getOne(jourSelectionne);
        voirCreneaux(jourSelectionne, jour.date);
    }
}

/* DUPLIQUER UN CRÉNEAU */
async function dupliquerCreneau(id) {
    if (!confirm("Dupliquer ce créneau ?")) return;

    const c = await pb.collection("planning_creneaux").getOne(id, {
        expand: "planning_jour"
    });

    const heureDebut = c.heure_debut;
    const heureFin = c.heure_fin;
    const poste = c.poste;
    const compagnon = c.companon_assigne || null;
    const jourId = c.planning_jour;

    const depasseMinuit = heureFin < heureDebut;

    function addOneDay(dateStr) {
        const d = new Date(dateStr);
        d.setDate(d.getDate() + 1);
        return d.toISOString().split("T")[0];
    }

    try {
        if (!depasseMinuit) {
            await pb.collection("planning_creneaux").create({
                planning_jour: jourId,
                heure_debut: heureDebut,
                heure_fin: heureFin,
                poste: poste,
                compagnon_assigne: compagnon
            });
        } else {
            await pb.collection("planning_creneaux").create({
                planning_jour: jourId,
                heure_debut: heureDebut,
                heure_fin: "23:59",
                poste: poste,
                compagnon_assigne: compagnon
            });

            const jour = c.expand.planning_jour;
            const dateSuivante = addOneDay(jour.date);

            let jourSuivant = null;
            try {
                jourSuivant = await pb.collection("planning_jours").getFirstListItem(
                    `planning_event = "${eventId}" && date = "${dateSuivante}"`
                );
            } catch (e) {}

            if (jourSuivant) {
                await pb.collection("planning_creneaux").create({
                    planning_jour: jourSuivant.id,
                    heure_debut: "00:00",
                    heure_fin: heureFin,
                    poste: poste,
                    compagnon_assigne: compagnon
                });
            } else {
                alert("Attention : aucun jour suivant n'existe. Seule la partie jusqu'à 23:59 a été dupliquée.");
            }
        }

        alert("Créneau dupliqué !");
        const jour = await pb.collection("planning_jours").getOne(jourSelectionne);
        voirCreneaux(jourSelectionne, jour.date);

    } catch (error) {
        console.error(error);
        alert("Erreur lors de la duplication.");
    }
}

loadJours();
</script>

</body>
</html>
