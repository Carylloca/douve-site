<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouveau jour – Admin</title>
    <link rel="icon" type="image/png" href="../favicon.png">

    <!-- PocketBase centralisé -->
    <script src="../js/pocketbase.umd.js"></script>
    <script src="../js/hebergement_pb.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "DM Sans", sans-serif;
            background-image: url("../img/page-admin-evenement-public-jour-nouveau.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header.admin-header {
            background: rgba(44, 62, 80, 0.90);
            padding: 18px 25px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
        }

        .header-btn {
            background: #7A0010;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 15px;
        }

        header h1 {
            width: 100%;
            text-align: center;
            margin: 10px 0 0 0;
            font-size: 28px;
            font-weight: 600;
        }

        .card {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 10px;
            max-width: 500px;
            margin: 30px auto;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            position: relative;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        .btn {
            background: #8b0000;
            color: white;
            padding: 12px 18px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-size: 16px;
            width: 100%;
            margin-top: 20px;
        }

        .btn:hover {
            background: #b30000;
        }

        .success { color: green; font-weight: bold; margin-top: 15px; }
        .error { color: red; font-weight: bold; margin-top: 15px; }

        .jours-list {
            margin-top: 20px;
            padding: 12px;
            background: #f7f7f7;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .jours-list div {
            margin: 4px 0;
        }

        .alert-duplicate {
            background: #ffdddd;
            border-left: 5px solid #cc0000;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .alert-buttons {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .alert-btn {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-size: 15px;
        }

        .alert-cancel {
            background: #bbb;
        }

        .alert-continue {
            background: #cc0000;
            color: white;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<header class="admin-header">
    <a href="../index.html" class="header-btn">Menu</a>
    <a href="admin-menu.html" class="header-btn">Menu admin</a>
    <a id="retourEvent" class="header-btn">Retour à l’événement</a>
    <a id="retourJours" class="header-btn">Retour aux jours</a>
    <h1>Nouveau jour</h1>
</header>

<div class="card">

    <label>Date du jour :</label>
    <input type="date" id="date" required>

    <div id="joursExistants" class="jours-list">
        <strong>Jours déjà créés :</strong>
        <div id="listeJours"></div>
    </div>

    <div id="alertDuplicate" class="alert-duplicate">
        ⚠️ Cette date existe déjà pour cet événement.
        <div class="alert-buttons">
            <button class="alert-btn alert-cancel" onclick="annulerCreation()">Annuler</button>
            <button class="alert-btn alert-continue" onclick="confirmerCreation()">Continuer quand même</button>
        </div>
    </div>

    <button class="btn" onclick="creerJour()">Enregistrer</button>

    <p id="feedback"></p>
</div>

<script>
const pb = new PocketBase(window.PB_URL);

const eventId = new URLSearchParams(window.location.search).get("event");

/* 🔐 Sécurité */
const user = pb.authStore.model;

if (!user) window.location.href = "../login.html";

if (user.role !== "comite" && user.role !== "responsable") {
    alert("Accès refusé");
    window.location.href = "../index.html";
}

/* Navigation */
document.getElementById("retourEvent").href =
    "admin-evenement-public-dashboard.html?id=" + eventId;

document.getElementById("retourJours").href =
    "admin-evenement-public-jours.html?event=" + eventId;

/* ⭐ Générer automatiquement le nom du jour */
function nomDuJour(dateStr) {
    const date = new Date(dateStr);
    return date.toLocaleDateString("fr-FR", { weekday: "long" });
}

/* ⭐ Charger les jours existants */
async function chargerJoursExistants() {
    const liste = document.getElementById("listeJours");
    liste.innerHTML = "Chargement...";

    try {
        const jours = await pb.collection("planning_jours").getFullList({
            filter: `planning_event="${eventId}"`,
            sort: "date"
        });

        if (jours.length === 0) {
            liste.innerHTML = "<em>Aucun jour créé pour cet événement.</em>";
            return;
        }

        liste.innerHTML = "";

        jours.forEach(j => {
            const d = new Date(j.date);
            const txt = d.toLocaleDateString("fr-FR", {
                weekday: "long",
                day: "numeric",
                month: "long"
            });

            liste.innerHTML += `<div>• ${txt}</div>`;
        });

    } catch (e) {
        liste.innerHTML = "<em>Erreur lors du chargement.</em>";
    }
}

chargerJoursExistants();

/* ⭐ Gestion de l’alerte */
let creationData = null;

function annulerCreation() {
    document.getElementById("alertDuplicate").style.display = "none";
    creationData = null;
}

function confirmerCreation() {
    document.getElementById("alertDuplicate").style.display = "none";
    if (creationData) envoyerCreation(creationData);
}

/* ⭐ Enregistrer */
async function creerJour() {
    const feedback = document.getElementById("feedback");
    feedback.textContent = "";

    const date = document.getElementById("date").value;

    if (!date) {
        feedback.textContent = "Veuillez choisir une date.";
        feedback.className = "error";
        return;
    }

    const data = {
        planning_event: eventId,
        date: date,
        nom_jour: nomDuJour(date)
    };

    const dateMin = date + " 00:00:00";
    const dateMax = date + " 23:59:59";

    const deja = await pb.collection("planning_jours").getFullList({
        filter: `planning_event="${eventId}" && date >= "${dateMin}" && date <= "${dateMax}"`
    });

    if (deja.length > 0) {
        creationData = data;
        document.getElementById("alertDuplicate").style.display = "block";
        return;
    }

    envoyerCreation(data);
}

/* ⭐ Création réelle */
async function envoyerCreation(data) {
    const feedback = document.getElementById("feedback");

    try {
        await pb.collection("planning_jours").create(data);

        feedback.textContent = "Jour enregistré !";
        feedback.className = "success";

        setTimeout(() => {
            window.location.href =
                "admin-evenement-public-jours.html?event=" + eventId;
        }, 800);

    } catch (error) {
        console.error(error);
        feedback.textContent = "Erreur lors de l’enregistrement.";
        feedback.className = "error";
    }
}
</script>

</body>
</html>
