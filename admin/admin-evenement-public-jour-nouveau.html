<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouveau jour – Admin</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "DM Sans", sans-serif;
            background-image: url("../img/page-admin-evenement-public-jour-nouveau.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header.admin-header {
            background: rgba(44, 62, 80, 0.90);
            padding: 18px 25px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
        }

        .header-btn {
            background: #7A0010;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 15px;
        }

        header h1 {
            width: 100%;
            text-align: center;
            margin: 10px 0 0 0;
            font-size: 28px;
            font-weight: 600;
        }

        .card {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 10px;
            max-width: 500px;
            margin: 30px auto;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        .btn {
            background: #8b0000;
            color: white;
            padding: 12px 18px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-size: 16px;
            width: 100%;
            margin-top: 20px;
        }

        .btn:hover {
            background: #b30000;
        }

        .success { color: green; font-weight: bold; margin-top: 15px; }
        .error { color: red; font-weight: bold; margin-top: 15px; }
        .warning { color: #b36b00; font-weight: bold; margin-top: 15px; }
    </style>
</head>

<body>

<header class="admin-header">
    <a href="../index.html" class="header-btn">Menu</a>
    <a href="admin-menu.html" class="header-btn">Menu admin</a>
    <a id="retourEvent" class="header-btn">Retour à l’événement</a>
    <a id="retourJours" class="header-btn">Retour aux jours</a>
    <h1>Nouveau jour</h1>
</header>

<div class="card">

    <label>Date du jour :</label>
    <input type="date" id="date" required>

    <button class="btn" onclick="creerJour()">Enregistrer</button>

    <p id="feedback"></p>
</div>

<script>
const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

const eventId = new URLSearchParams(window.location.search).get("event");

/* 🔐 Sécurité */
const user = pb.authStore.model;

if (!user) {
    window.location.href = "../login.html";
}

if (user.role !== "comite" && user.role !== "responsable") {
    alert("Accès refusé");
    window.location.href = "../index.html";
}

/* Navigation */
document.getElementById("retourEvent").href =
    "admin-evenement-public-dashboard.html?id=" + eventId;

document.getElementById("retourJours").href =
    "admin-evenement-public-jours.html?event=" + eventId;

/* ⭐ Générer automatiquement le nom du jour */
function nomDuJour(dateStr) {
    const date = new Date(dateStr);
    return date.toLocaleDateString("fr-FR", { weekday: "long" });
}

/* ⭐ Vérifier si un jour existe déjà */
async function jourExiste(dateStr) {
    // Normalisation de la date en YYYY-MM-DD
    const date = new Date(dateStr);
    const iso = date.toISOString().split("T")[0];

    try {
        const j = await pb.collection("planning_jours").getFirstListItem(
            `planning_event="${eventId}" && date="${iso}"`
        );
        return j;
    } catch (e) {
        return null;
    }
}

/* Enregistrer */
async function creerJour() {
    const feedback = document.getElementById("feedback");
    feedback.textContent = "";
    feedback.className = "";

    const date = document.getElementById("date").value;

    if (!date) {
        feedback.textContent = "Veuillez choisir une date.";
        feedback.className = "error";
        return;
    }

    /* 🔍 Vérifier si le jour existe déjà */
    const existe = await jourExiste(date);

    if (existe) {
        const nom = existe.nom_jour || nomDuJour(date);

        const confirmation = confirm(
            `⚠️ Le jour "${nom}" (${date}) existe déjà dans cet événement.\n\nVoulez-vous vraiment l'ajouter à nouveau ?`
        );

        if (!confirmation) {
            feedback.textContent = "Création annulée.";
            feedback.className = "warning";
            return;
        }
    }

    const data = {
        planning_event: eventId,
        date: date,
        nom_jour: nomDuJour(date)
    };

    try {
        await pb.collection("planning_jours").create(data);

        feedback.textContent = "Jour enregistré !";
        feedback.className = "success";

        setTimeout(() => {
            window.location.href =
                "admin-evenement-public-jours.html?event=" + eventId;
        }, 800);

    } catch (error) {
        console.error(error);
        feedback.textContent = "Erreur lors de l’enregistrement.";
        feedback.className = "error";
    }
}
</script>

</body>
</html>
