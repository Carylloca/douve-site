<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier un compagnon</title>
    <link rel="icon" type="image/png" href="../favicon.png">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("../img/page-admin-compagnons.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 40px 20px;
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 10px black;
        }

        .top-buttons {
            text-align: center;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            margin: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background: #5A000C;
        }

        .card {
            width: 40%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            color: black;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
            position: relative;
        }

        .photo-block {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            max-width: 40%;
        }

        .photo-frame {
            width: 100%;
            max-width: 280px;
            aspect-ratio: 1 / 1;
            border: 3px solid #7A0010;
            border-radius: 10px;
            background: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 7px;
            display: none;
        }

        #photo {
            width: 100%;
            max-width: 180px;
            overflow: hidden;
            color: transparent;
        }

        #photo::-webkit-file-upload-button,
        #photo::file-selector-button {
            visibility: hidden;
        }

        #photo::before {
            content: "Choisir un fichier";
            display: inline-block;
            background: #7A0010;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            text-align: center;
        }

        label {
            font-weight: bold;
            color: #7A0010;
            margin-top: 10px;
            display: block;
        }

        input, select {
            width: 85%;
            padding: 7px;
            margin-top: 4px;
            border-radius: 6px;
            border: 1px solid #aaa;
            font-size: 15px;
            box-sizing: border-box;
        }

        input[type="date"] {
            width: 85% !important;
        }

        .line {
            display: flex;
            gap: 6px;
            justify-content: flex-start;
            margin-bottom: 10px;
        }

        .line > div {
            flex: 0 0 auto;
        }

        /* ALIGNEMENT PARFAIT DE LA LIGNE DATE + ROLE */
        .role-fix > div:first-child {
            width: 235px;
        }

        .full {
            width: 55%;
        }

        @media (max-width: 900px) {
            .photo-block {
                position: relative;
                right: 0;
                margin: 0 auto 20px auto;
                align-items: center;
                max-width: 60%;
            }

            .card {
                width: 90%;
                padding-top: 330px;
            }
        }

        @media (max-width: 600px) {
            .photo-block {
                max-width: 80%;
            }

            .card {
                padding-top: 300px;
            }
        }
    </style>
</head>

<body>
    <div class="overlay">

        <h1>Modifier un compagnon</h1>

        <div class="top-buttons">
            <a href="../index.html" class="btn">Menu</a>
            <a href="../compagnon-details.html?id=" class="btn" id="retourBtn">Retour</a>
        </div>

        <div class="card">

            <div class="photo-block">
                <div class="photo-frame">
                    <img id="photoPreview" class="photo-preview">
                </div>
                <input type="file" id="photo" accept="image/*">
            </div>

            <div class="line">
                <div>
                    <label>Nom :</label>
                    <input type="text" id="nom">
                </div>
                <div>
                    <label>Prénom :</label>
                    <input type="text" id="prenom">
                </div>
            </div>

            <div class="line">
                <div>
                    <label>Initiales :</label>
                    <input type="text" id="initiales">
                </div>
                <div>
                    <label>Fonction :</label>
                    <input type="text" id="fonction">
                </div>
            </div>

            <label>Adresse :</label>
            <input type="text" id="adresse" class="full">

            <div class="line">
                <div>
                    <label>N° postal :</label>
                    <input type="text" id="npa">
                </div>
                <div>
                    <label>Lieu :</label>
                    <input type="text" id="lieu">
                </div>
            </div>

            <div class="line">
                <div>
                    <label>Email :</label>
                    <input type="email" id="email_public">
                </div>
                <div>
                    <label>Téléphone :</label>
                    <input type="text" id="telephone">
                </div>
            </div>

            <div class="line">
                <div>
                    <label>Email professionnel :</label>
                    <input type="email" id="email_prof">
                </div>
                <div>
                    <label>Téléphone professionnel :</label>
                    <input type="text" id="telephone_prof">
                </div>
            </div>

            <!-- LIGNE DATE + ROLE (alignée parfaitement) -->
            <div class="line role-fix">
                <div>
                    <label>Date de naissance :</label>
                    <input type="date" id="date_naissance">
                </div>
                <div>
                    <label>Rôle :</label>
                    <select id="role">
                        <option value="compagnon">Compagnon</option>
                        <option value="comite">Comité</option>
                    </select>
                </div>
            </div>

            <div class="line">
                <div>
                    <label>Conjoint - nom :</label>
                    <input type="text" id="conjoint_nom">
                </div>
                <div>
                    <label>Conjoint - prénom :</label>
                    <input type="text" id="conjoint_prenom">
                </div>
            </div>

            <div style="text-align:center; margin-top:20px;">
                <button class="btn" onclick="sauvegarder()">Enregistrer</button>
                <a href="admin-compagnons.html" class="btn">Annuler</a>
            </div>

        </div>
    </div>

    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <script>
        const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

        if (!pb.authStore.isValid) {
            window.location.href = "../login.html";
        }

        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        document.getElementById("retourBtn").href = "../compagnon-details.html?id=" + id;

        async function charger() {
            try {
                const c = await pb.collection("companions").getOne(id);

                document.getElementById("nom").value = c.nom;
                document.getElementById("prenom").value = c.prenom;
                document.getElementById("initiales").value = c.initiales || "";
                document.getElementById("fonction").value = c.fonction || "";
                document.getElementById("adresse").value = c.adresse || "";
                document.getElementById("npa").value = c.npa || "";
                document.getElementById("lieu").value = c.lieu || "";
                document.getElementById("email_public").value = c.email_public || "";
                document.getElementById("telephone").value = c.telephone || "";
                document.getElementById("telephone_prof").value = c.telephone_prof || "";
                document.getElementById("email_prof").value = c.email_prof || "";

                if (c.date_naissance) {
                    document.getElementById("date_naissance").value = c.date_naissance.split(" ")[0];
                }

                document.getElementById("conjoint_prenom").value = c.conjoint_prenom || "";
                document.getElementById("conjoint_nom").value = c.conjoint_nom || "";

                document.getElementById("role").value = c.role || "compagnon";

                if (c.photo) {
                    const url = pb.files.getUrl(c, c.photo);
                    const preview = document.getElementById("photoPreview");
                    preview.src = url;
                    preview.style.display = "block";
                }

            } catch (err) {
                console.error(err);
                alert("Erreur lors du chargement.");
            }
        }

        charger();

        async function sauvegarder() {
            const formData = new FormData();

            formData.append("nom", document.getElementById("nom").value);
            formData.append("prenom", document.getElementById("prenom").value);
            formData.append("initiales", document.getElementById("initiales").value);
            formData.append("fonction", document.getElementById("fonction").value);
            formData.append("adresse", document.getElementById("adresse").value);
            formData.append("npa", document.getElementById("npa").value);
            formData.append("lieu", document.getElementById("lieu").value);
            formData.append("email_public", document.getElementById("email_public").value);
            formData.append("telephone", document.getElementById("telephone").value);

            const dn = document.getElementById("date_naissance").value;
            if (dn) formData.append("date_naissance", dn + " 23:30:00");

            formData.append("conjoint_prenom", document.getElementById("conjoint_prenom").value);
            formData.append("conjoint_nom", document.getElementById("conjoint_nom").value);
            formData.append("telephone_prof", document.getElementById("telephone_prof").value);
            formData.append("email_prof", document.getElementById("email_prof").value);

            formData.append("role", document.getElementById("role").value);

            const fileInput = document.getElementById("photo");
            if (fileInput.files.length > 0) {
                formData.append("photo", fileInput.files[0]);
            }

            try {
                await pb.collection("companions").update(id, formData);
                alert("Modifications enregistrées !");
                window.location.href = "../compagnon-details.html?id=" + id;
            } catch (err) {
                console.error(err);
                alert("Erreur lors de la sauvegarde.");
            }
        }
    </script>

</body>
</html>
