<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier un compagnon</title>
    <link rel="icon" type="image/png" href="../favicon.png">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("../img/page-admin-compagnons.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 40px 20px;
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 10px black;
        }

        .top-buttons {
            text-align: center;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            margin: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background: #5A000C;
        }

        .card {
            width: 40%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            color: black;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
            position: relative;
        }

        .photo-block {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            max-width: 40%;
        }

        .photo-frame {
            width: 100%;
            max-width: 280px;
            aspect-ratio: 1 / 1;
            border: 3px solid #7A0010;
            border-radius: 10px;
            background: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 7px;
            display: none;
        }

        #photo {
            width: 100%;
            max-width: 180px;
            overflow: hidden;
            color: transparent;
        }

        #photo::-webkit-file-upload-button,
        #photo::file-selector-button {
            visibility: hidden;
        }

        #photo::before {
            content: "Choisir un fichier";
            display: inline-block;
            background: #7A0010;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            text-align: center;
        }

        label {
            font-weight: bold;
            color: #7A0010;
            margin-top: 10px;
            display: block;
        }

        input, select {
            width: 85%;
            padding: 7px;
            margin-top: 4px;
            border-radius: 6px;
            border: 1px solid #aaa;
            font-size: 15px;
            box-sizing: border-box;
        }

        input[type="date"] {
            width: 85% !important;
        }

        .line {
            display: flex;
            gap: 6px;
            justify-content: flex-start;
            margin-bottom: 10px;
        }

        .line > div {
            flex: 0 0 auto;
        }

        .full {
            width: 55%;
        }

        @media (max-width: 900px) {
            .photo-block {
                position: relative;
                right: 0;
                margin: 0 auto 20px auto;
                align-items: center;
                max-width: 60%;
            }

            .card {
                width: 90%;
                padding-top: 330px;
            }
        }

        @media (max-width: 600px) {
            .photo-block {
                max-width: 80%;
            }

            .card {
                padding-top: 300px;
            }
        }
    </style>
</head>

<body>
    <div class="overlay">

        <h1>Modifier un compagnon</h1>

        <div class="top-buttons">
            <a href="../index.html" class="btn">Menu</a>
            <a href="../compagnon-details.html?id=" class="btn" id="retourBtn">Retour</a>
        </div>

        <div class="card">

            <div class="photo-block">
                <div class="photo-frame">
                    <img id="photoPreview" class="photo-preview">
                </div>
                <input type="file" id="photo" accept="image/*">
            </div>

            <div class="line">
                <div>
                    <label>Nom :</label>
                    <input type="text" id="nom">
                </div>
                <div>
                    <label>Prénom :</label>
                    <input type="text" id="prenom">
                </div>
            </div>

            <div class="line">
                <div>
                    <label>Initiales :</label>
                    <input type="text" id="initiales">
                </div>
                <div>
                    <label>Fonction :</label>
                    <input type="text" id="fonction">
                </div>
            </div>

            <label>Adresse :</label>
            <input type="text" id="adresse" class="full">

            <div class="line">
                <div>
                    <label>N° postal :</label>
                    <input type="text" id="npa">
                </div>
                <div>
                    <label>Lieu :</label>
                    <input type="text" id="lieu">
                </div>
            </div>

            <div class="line">
                <div>
                    <label>Email :</label>
                    <input type="email" id="email_public">
                </div>
                <div>
                    <label>Téléphone :</label>
                    <input type="text" id="telephone">
                </div>
            </div>

            <div class="line">
                <div>
                    <label>Email professionnel :</label>
                    <input type="email" id="email_prof">
                </div>
                <div>
                    <label>Téléphone professionnel :</label>
                    <input type="text" id="telephone_prof">
                </div>
            </div>
