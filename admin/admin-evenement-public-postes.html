<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Postes de l’événement – Admin</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "DM Sans", sans-serif;
            background-image: url("../img/page-admin-evenement-public-postes.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header.admin-header {
            background: rgba(44, 62, 80, 0.90);
            padding: 18px 25px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
        }

        .header-btn {
            background: #7A0010;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 15px;
        }

        header h1 {
            width: 100%;
            text-align: center;
            margin: 10px 0 0 0;
            font-size: 28px;
            font-weight: 600;
        }

        .card {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 10px;
            max-width: 900px;
            margin: 30px auto;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        th {
            background: #eee;
            text-align: left;
        }

        .btn {
            background: #8b0000;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }

        .btn:hover {
            background: #b30000;
        }

        .btn-red {
            background: #b30000;
        }

        .btn-red:hover {
            background: #7A0010;
        }

        .top-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<header class="admin-header">
    <a href="../index.html" class="header-btn">Menu</a>
    <a href="admin-menu.html" class="header-btn">Menu admin</a>
    <a id="retourEvent" class="header-btn">Retour à l’événement</a>
    <h1>Postes de l’événement</h1>
</header>

<div class="card">

    <div class="top-actions">
        <a id="btnNew" class="btn">+ Nouveau poste</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Poste</th>
                <th>Responsables</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="postesTable"></tbody>
    </table>

</div>

<script>
const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");
const eventId = new URLSearchParams(window.location.search).get("event");

document.getElementById("retourEvent").href =
    "admin-evenement-public-dashboard.html?id=" + eventId;

document.getElementById("btnNew").href =
    "admin-evenement-public-postes-nouveau.html?event=" + eventId;

async function loadPostes() {
    const postes = await pb.collection("planning_postes").getFullList({
        filter: `manifestation = "${eventId}"`,
        expand: "responsable"
    });

    const tbody = document.getElementById("postesTable");
    tbody.innerHTML = "";

    postes.forEach(p => {
        const resp = p.expand?.responsable?.map(r => r.nom).join(", ") || "-";

        tbody.innerHTML += `
            <tr>
                <td>${p.titre}</td>
                <td>${resp}</td>
                <td>
                    <a class="btn" href="admin-evenement-public-poste-modifier.html?id=${p.id}&event=${eventId}">Modifier</a>
                    <button class="btn btn-red" onclick="supprimer('${p.id}')">Supprimer</button>
                </td>
            </tr>
        `;
    });
}

async function supprimer(id) {
    if (!confirm("Supprimer ce poste ?")) return;
    await pb.collection("planning_postes").delete(id);
    loadPostes();
}

loadPostes();
</script>

</body>
</html>
