<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Liste des inscrits</title>

    <link rel="icon" type="image/png" href="../favicon.png">

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- SheetJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("../img/page-admin-inscrits.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: "DM Sans", sans-serif;
        }

        /* HEADER FIXE */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
            justify-content: space-between;
        }

        .header-left,
        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .header-title {
            color: white;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 0 0 10px black;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 120px 20px 40px 20px;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 5px;
            text-shadow: 0 0 10px black;
        }

        #totalInscrits {
            text-align: center;
            color: #fff7c2;
            font-size: 18px;
            margin-bottom: 15px;
        }

        /* BOUTONS */
        .btn {
            padding: 8px 12px;
            border-radius: 6px;
            background: #7b0f23;
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #9c1a33;
        }

        .btn-delete {
            background: #d50000 !important;
        }

        .btn-delete:hover {
            background: #9b0000 !important;
        }

        /* TABLEAU */
        table {
            width: 100%;
            max-width: 900px;
            margin: 20px auto;
            border-collapse: collapse;
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #7b0f23;
            color: white;
            cursor: pointer;
        }

        tr:hover {
            background: #f2f2f2;
        }
    </style>
</head>

<body>

<!-- HEADER FIXE -->
<div class="header">
    <div class="header-left">
        <a href="../index.html" class="btn">🏠 Menu</a>
        <a href="admin-manifestations.html" class="btn">📋 Liste des manifestations</a>
    </div>

    <div class="header-title">Liste des inscrits</div>

    <div class="header-right">
        <button class="btn" onclick="logout()">⏻ Déconnexion</button>
    </div>
</div>

<div class="overlay">

    <h1 id="manifestTitle">Liste des inscrits</h1>
    <div id="totalInscrits"></div>

    <div style="text-align:center; margin-bottom:10px;">
        <button class="btn" onclick="exportPDF()">Export PDF</button>
        <button class="btn" onclick="exportExcel()">Export Excel</button>
    </div>

    <table>
        <thead>
            <tr>
                <th onclick="sortTable('nom')">Nom</th>
                <th onclick="sortTable('prenom')">Prénom</th>
                <th onclick="sortTable('email')">Email</th>
                <th onclick="sortTable('nb_personnes')">Nb pers.</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="inscritsBody"></tbody>
    </table>
</div>

<!-- PocketBase -->
<script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
<script src="../js/auth.js"></script>

<script>
    requireComite();

    let manifestation = null;
    let inscrits = [];
    let filtered = [];
    let sortDirection = 1;

    const url = new URL(window.location.href);
    const manifestationId = url.searchParams.get("id");

    if (!manifestationId) {
        document.body.innerHTML = "<p style='color:white;'>Aucune manifestation sélectionnée.</p>";
    }

    async function loadInscrits() {
        const tbody = document.getElementById("inscritsBody");
        tbody.innerHTML = "<tr><td colspan='5'>Chargement...</td></tr>";

        try {
            manifestation = await pb.collection("manifestations").getOne(manifestationId);

            const d = new Date(manifestation.date);
            const dateAff = d.toLocaleDateString("fr-CH");
            const heureAff = manifestation.date.split(" ")[1].slice(0,5);

            document.getElementById("manifestTitle").textContent =
                `Inscrits – ${manifestation.title} le ${dateAff} à ${heureAff}`;

            inscrits = await pb.collection("inscriptions").getFullList({
                filter: `manifestation = "${manifestationId}"`,
                expand: "companion"
            });

            filtered = inscrits;

            updateTotal();
            displayTable();

        } catch (err) {
            console.error(err);
            tbody.innerHTML = "<tr><td colspan='5'>Erreur de chargement</td></tr>";
        }
    }

    function updateTotal() {
        const totalPersonnes = filtered.reduce((sum, i) => sum + (i.nb_personnes || 1), 0);

        document.getElementById("totalInscrits").innerHTML =
            `Total inscrits : ${filtered.length}<br>
             Total personnes : <strong>${totalPersonnes}</strong>`;
    }

    function displayTable() {
        const tbody = document.getElementById("inscritsBody");
        tbody.innerHTML = "";

        filtered.forEach(i => {
            const c = i.expand?.companion;

            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${c?.nom || "-"}</td>
                <td>${c?.prenom || "-"}</td>
                <td>${c?.email || "-"}</td>
                <td>${i.nb_personnes || 1}</td>
                <td>
                    <button class="btn-delete" onclick="deleteInscrit('${i.id}')">Supprimer</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    function sortTable(field) {
        sortDirection *= -1;

        filtered.sort((a, b) => {
            const ca = a.expand?.companion;
            const cb = b.expand?.companion;

            if (field === "nb_personnes") {
                return ((a.nb_personnes || 1) - (b.nb_personnes || 1)) * sortDirection;
            }

            return (ca?.[field] || "").localeCompare(cb?.[field] || "") * sortDirection;
        });

        displayTable();
    }

    async function deleteInscrit(id) {
        if (!confirm("Supprimer cet inscrit ?")) return;

        try {
            await pb.collection("inscriptions").delete(id);
            loadInscrits();
        } catch (err) {
            alert("Erreur lors de la suppression.");
            console.error(err);
        }
    }

    function formatFileName() {
        const cleanTitle = manifestation.title
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
            .replace(/[^a-zA-Z0-9]/g, "_");

        return `${cleanTitle}_${manifestation.date}`;
    }

    function exportPDF() {
        if (filtered.length === 0) return;

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        let y = 10;

        doc.text(`Manifestation : ${manifestation.title}`, 10, y); y += 8;
        doc.text(`Date : ${manifestation.date}`, 10, y); y += 12;

        filtered.forEach(i => {
            const c = i.expand?.companion;
            doc.text(
                `${c?.nom || "-"} ${c?.prenom || "-"} – ${c?.email || "-"} – ${i.nb_personnes || 1} pers.`,
                10,
                y
            );
            y += 8;
        });

        doc.save(formatFileName() + ".pdf");
    }

    function exportExcel() {
        if (filtered.length === 0) return;

        const data = filtered.map(i => {
            const c = i.expand?.companion;
            return {
                Nom: c?.nom || "-",
                Prénom: c?.prenom || "-",
                Email: c?.email || "-",
                "Nb personnes": i.nb_personnes || 1
            };
        });

        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Inscrits");

        XLSX.writeFile(wb, formatFileName() + ".xlsx");
    }

    function logout() {
        pb.authStore.clear();
        window.location.href = "../index.html";
    }

    loadInscrits();
</script>

</body>
</html>
