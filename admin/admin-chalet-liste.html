<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Liste des Réservations du Chalet</title>

    <link rel="icon" type="image/png" href="../favicon.png">

    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <!-- PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <!-- Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: url("../img/page-admin-chalet.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        /* HEADER PREMIUM */
        header {
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        .header-left {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
            text-shadow: 0 0 10px black;
        }

        .btn {
            background: #7A0010;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #5a000c;
        }

        /* Layout */
        .layout {
            display: flex;
            justify-content: center;
            gap: 25px;
            max-width: 1200px;
            margin: 20px auto;
        }

        #calendar {
            width: 350px;
            background: rgba(255,255,255,0.90);
            padding: 15px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }

        .panel {
            flex: 1;
            background: rgba(255,255,255,0.90);
            padding: 25px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            position: relative;
        }

        /* Bouton nouvelle réservation */
        .new-btn {
            position: absolute;
            right: 25px;
            top: 25px;
            background: #7A0010;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
        }

        .new-btn:hover {
            background: #5a000c;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #7A0010;
            color: white;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }

        th.desc-col {
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        td.desc-col {
            text-align: left;
            width: 40%;
        }

        td.date-col {
            width: 90px;
        }

        tr:hover {
            background: #f0f0f0;
            cursor: pointer;
        }

        .open-icon {
            cursor: pointer;
            margin-right: 6px;
            font-size: 16px;
        }

        .status-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 6px;
        }

        @media (max-width: 900px) {
            .layout {
                flex-direction: column;
                align-items: center;
            }
            #calendar, .panel {
                width: 90%;
            }
        }
    </style>
</head>

<body>

<header>
    <div class="header-left">
        <a class="btn" href="../index.html">Menu</a>
        <a class="btn" href="admin-menu.html">Menu admin</a>
    </div>

    <h1>Liste des Réservations – Chalet Le Bon Laron</h1>

    <div class="header-right">
        <button class="btn" onclick="exportPDF()">PDF</button>
        <button class="btn" onclick="exportExcel()">Excel</button>
    </div>
</header>

<div class="layout">

    <div id="calendar"></div>

    <div class="panel">
        <button class="new-btn" onclick="window.location.href='admin-chalet.html'">+ Nouvelle réservation</button>

        <h3>Liste complète des réservations</h3>

        <table id="reservationsTable">
            <thead>
                <tr>
                    <th class="desc-col">Description</th>
                    <th>Type</th>
                    <th>Compagnon</th>
                    <th class="date-col">Début</th>
                    <th class="date-col">Fin</th>
                </tr>
            </thead>
            <tbody id="reservationsBody"></tbody>
        </table>
    </div>

</div>

<script>
    const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");
    let reservationsList = [];

    /* Couleurs des statuts */
    const statusColors = {
        "réservation en cours": "#1E90FF",
        "confirmée": "#32CD32",
        "terminée": "#8B4513",
        "annulée": "#B22222"
    };

    /* Icônes par type */
    const typeIcons = {
        "Interne 🍷🍽️": "🍷🍽️",
        "Interne 👤": "👤",
        "Nettoyage": "🧹",
        "Frairie": "🧑‍🤝‍🧑",
        "Externe": "↗️",
        "Travaux": "🛠️"
    };

    function formatDate(d) {
        return d.substring(8,10) + "." + d.substring(5,7) + "." + d.substring(0,4);
    }

    function populateTable() {
        const tbody = document.getElementById("reservationsBody");
        tbody.innerHTML = "";

        reservationsList.forEach(r => {
            const shortDesc = r.description
                ? r.description.substring(0, 80) + (r.description.length > 80 ? "…" : "")
                : "-";

            tbody.innerHTML += `
                <tr data-id="${r.id}">
                    <td class="desc-col">
                        <span class="status-dot" style="background:${statusColors[r.status]}"></span>
                        <span class="open-icon" onclick="openRes('${r.id}')">🔍</span>
                        ${shortDesc}
                    </td>
                    <td>${typeIcons[r.type] || ""} ${r.type}</td>
                    <td>${r.companionName || "-"}</td>
                    <td class="date-col">${formatDate(r.startDate)}</td>
                    <td class="date-col">${formatDate(r.endDate)}</td>
                </tr>
            `;
        });
    }

    function openRes(id) {
        window.location.href = "admin-chalet.html?id=" + id;
    }

    /* Double‑clic */
    document.addEventListener("dblclick", e => {
        const row = e.target.closest("tr[data-id]");
        if (row) openRes(row.dataset.id);
    });

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        const rows = reservationsList.map(r => [
            r.description || "-",
            r.type,
            r.companionName || "-",
            formatDate(r.startDate),
            formatDate(r.endDate)
        ]);

        doc.text("Liste des réservations du chalet", 14, 15);

        doc.autoTable({
            head: [["Description", "Type", "Compagnon", "Début", "Fin"]],
            body: rows,
            startY: 25
        });

        doc.save("chalet_reservations.pdf");
    }

    function exportExcel() {
        const rows = reservationsList.map(r => ({
            Description: r.description || "-",
            Type: r.type,
            Compagnon: r.companionName || "-",
            Début: formatDate(r.startDate),
            Fin: formatDate(r.endDate)
        }));

        const worksheet = XLSX.utils.json_to_sheet(rows);
        const workbook = XLSX.utils.book_new();

        XLSX.utils.book_append_sheet(workbook, worksheet, "Réservations");

        XLSX.writeFile(workbook, "chalet_reservations.xlsx");
    }

    document.addEventListener("DOMContentLoaded", async function () {

        const events = await pb.collection("chalet_reservations").getFullList({
            expand: "compagnon"
        });

        reservationsList = events.map(r => ({
            id: r.id,
            type: r.type,
            status: r.status,
            startDate: r.startDate,
            endDate: r.endDate,
            description: r.description,
            companionName: r.expand?.compagnon
                ? r.expand.compagnon.nom + " " + r.expand.compagnon.prenom
                : null
        }));

        /* 🔥 Mise à jour automatique des statuts */
        const today = new Date().toISOString().substring(0, 10);

        for (const r of reservationsList) {
            if (r.endDate < today && r.status !== "annulée" && r.status !== "terminée") {
                await pb.collection("chalet_reservations").update(r.id, {
                    status: "terminée"
                });
                r.status = "terminée";
            }
        }

        /* 🔥 Tri automatique par date de début */
        reservationsList.sort((a, b) => new Date(a.startDate) - new Date(b.startDate));

        populateTable();

        /* CALENDRIER */
        const calendarEl = document.getElementById("calendar");

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: "dayGridMonth",
            locale: "fr",
            height: 450,
            displayEventTime: false,
            events: reservationsList.map(r => ({
                id: r.id,
                title: `${typeIcons[r.type] || ""} ` +
                       r.description.substring(0, 40) +
                       (r.description.length > 40 ? "…" : ""),
                start: r.startDate,
                end: r.endDate,
                backgroundColor: statusColors[r.status] || "#555"
            }))
        });

        calendar.render();
    });
</script>


</body>
</html>
