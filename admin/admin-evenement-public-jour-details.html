<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Détails du jour – Admin</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "DM Sans", sans-serif;
            background-image: url("../img/page-admin-evenement-public-jour-details.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header.admin-header {
            background: rgba(44, 62, 80, 0.90);
            padding: 18px 25px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
        }

        .header-btn {
            background: #7A0010;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 15px;
        }

        header h1 {
            width: 100%;
            text-align: center;
            margin: 10px 0 0 0;
            font-size: 28px;
            font-weight: 600;
        }

        .card {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 10px;
            max-width: 700px;
            margin: 30px auto;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .info {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .creneau-list {
            background: #f7f7f7;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-top: 20px;
        }

        .creneau-item {
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn {
            background: #8b0000;
            color: white;
            padding: 12px 18px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-size: 16px;
            flex: 1;
        }

        .btn:hover {
            background: #b30000;
        }

        .btn-red {
            background: #b30000;
        }

        .btn-red:hover {
            background: #7A0010;
        }

        .empty {
            font-style: italic;
            color: #555;
        }
    </style>
</head>

<body>

<header class="admin-header">
    <a href="../index.html" class="header-btn">Menu</a>
    <a href="admin-menu.html" class="header-btn">Menu admin</a>
    <a id="retourEvent" class="header-btn">Retour à l’événement</a>
    <a id="retourJours" class="header-btn">Retour aux jours</a>
    <h1>Détails du jour</h1>
</header>

<div class="card">

    <div class="info">
        <strong>Date :</strong> <span id="dateTxt"></span><br>
        <strong>Jour :</strong> <span id="nomJourTxt"></span>
    </div>

    <h3>Créneaux du jour :</h3>
    <div id="listeCreneaux" class="creneau-list">
        Chargement...
    </div>

    <div class="btn-row">
        <button class="btn" id="btnAjouter">Ajouter un créneau</button>
        <button class="btn btn-red" onclick="supprimerJour()">Supprimer ce jour</button>
    </div>

</div>

<script>
const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

const jourId = new URLSearchParams(window.location.search).get("id");
const eventId = new URLSearchParams(window.location.search).get("event");

/* 🔐 Sécurité */
const user = pb.authStore.model;
if (!user) window.location.href = "../login.html";
if (user.role !== "comite" && user.role !== "responsable") {
    alert("Accès refusé");
    window.location.href = "../index.html";
}

/* Navigation */
document.getElementById("retourEvent").href =
    "admin-evenement-public-dashboard.html?id=" + eventId;

document.getElementById("retourJours").href =
    "admin-evenement-public-jours.html?event=" + eventId;

/* ⭐ Générer automatiquement le nom du jour */
function nomDuJour(dateStr) {
    const date = new Date(dateStr);
    return date.toLocaleDateString("fr-FR", { weekday: "long" });
}

/* Charger le jour */
let jourActuel = null;

async function loadJour() {
    jourActuel = await pb.collection("planning_jours").getOne(jourId);

    document.getElementById("dateTxt").textContent =
        new Date(jourActuel.date).toLocaleDateString("fr-FR", {
            day: "numeric", month: "long", year: "numeric"
        });

    document.getElementById("nomJourTxt").textContent =
        nomDuJour(jourActuel.date);

    loadCreneaux();
}

/* Charger les créneaux */
async function loadCreneaux() {
    const zone = document.getElementById("listeCreneaux");
    zone.innerHTML = "Chargement...";

    const creneaux = await pb.collection("planning_creneaux").getFullList({
        filter: `jour="${jourId}"`,
        sort: "heure_debut"
    });

    if (creneaux.length === 0) {
        zone.innerHTML = "<p class='empty'>Aucun créneau pour ce jour.</p>";
        return;
    }

    zone.innerHTML = "";

    creneaux.forEach(c => {
        const debut = c.heure_debut.substring(0,5);
        const fin = c.heure_fin.substring(0,5);

        zone.innerHTML += `
            <div class="creneau-item">
                <strong>${debut} – ${fin}</strong><br>
                Poste : ${c.poste || "Non défini"}<br>
                <a href="admin-evenement-public-creneau-modifier.html?id=${c.id}&jour=${jourId}&event=${eventId}">
                    Modifier
                </a>
            </div>
        `;
    });
}

/* Ajouter un créneau */
document.getElementById("btnAjouter").onclick = () => {
    window.location.href =
        `admin-evenement-public-creneau-nouveau.html?jour=${jourId}&event=${eventId}`;
};

/* Supprimer */
async function supprimerJour() {
    if (!confirm("Supprimer ce jour et tous ses créneaux ?")) return;

    await pb.collection("planning_jours").delete(jourId);

    window.location.href =
        "admin-evenement-public-jours.html?event=" + eventId;
}

/* Initialisation */
loadJour();
</script>

</body>
</html>
