<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouvel événement public – Admin</title>
    <link rel="icon" type="image/png" href="../favicon.png">

    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "DM Sans", sans-serif;
            background-image: url("../img/page-admin-evenement-public-nouveau.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 20px;
        }

        h1 {
            color: white;
            text-shadow: 0 2px 6px rgba(0,0,0,0.6);
        }

        .card {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 10px;
            max-width: 700px;
            margin: auto;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        textarea {
            resize: vertical;
            height: 120px;
        }

        .btn {
            display: inline-block;
            background: #8b0000;
            color: white;
            padding: 12px 18px;
            border-radius: 6px;
            text-decoration: none;
            margin-top: 20px;
            cursor: pointer;
            border: none;
            font-size: 16px;
        }

        .btn:hover {
            background: #b30000;
        }

        /* Bloc RESPONSABLES */
        .responsables-box {
            background: rgba(255,255,255,0.9);
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        .responsables-header {
            font-weight: bold;
        }

        .responsables-list {
            display: none;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }

        .responsables-list label {
            display: block;
            margin-bottom: 6px;
        }

        .success {
            color: green;
            font-weight: bold;
            margin-top: 15px;
        }

        .error {
            color: red;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<h1>Nouvel événement public</h1>

<div class="card">

    <label>Nom de l’événement :</label>
    <input type="text" id="titre" required>

    <!-- ⭐ BLOC RESPONSABLES -->
    <label>Responsables :</label>
    <div id="responsablesBox" class="responsables-box">
        <div class="responsables-header">Sélectionner les responsables ▼</div>
        <div class="responsables-list" id="responsablesList"></div>
    </div>

    <label>Description :</label>
    <textarea id="description"></textarea>

    <label>Date de début :</label>
    <input type="date" id="date_debut">

    <label>Date de fin :</label>
    <input type="date" id="date_fin">

    <button class="btn" onclick="creerEvenement()">Créer l’événement public</button>

    <p id="feedback"></p>
</div>

<script>
    const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

    // 🔒 Protection d’accès
    if (!pb.authStore.isValid) {
        window.location.href = "../login.html";
    }

    // ⭐ Charger les compagnons pour la liste des responsables
    async function loadResponsables() {
        try {
            const companions = await pb.collection("companions").getFullList({
                sort: "nom"
            });

            const list = document.getElementById("responsablesList");

            companions.forEach(c => {
                const item = document.createElement("label");
                item.innerHTML = `
                    <input type="checkbox" name="responsables" value="${c.id}">
                    ${c.nom} ${c.prenom}
                `;
                list.appendChild(item);
            });

        } catch (error) {
            console.error("Erreur chargement responsables :", error);
        }
    }

    loadResponsables();

    // ⭐ Ouvrir / fermer le bloc
    document.getElementById("responsablesBox").addEventListener("click", () => {
        const list = document.getElementById("responsablesList");
        list.style.display = list.style.display === "block" ? "none" : "block";
    });

    // ⭐ Création de l’événement
    async function creerEvenement() {
        const feedback = document.getElementById("feedback");
        feedback.textContent = "";

        const responsables = Array.from(
            document.querySelectorAll("input[name='responsables']:checked")
        ).map(cb => cb.value);

        const data = {
            titre: document.getElementById("titre").value,
            description_longue: document.getElementById("description").value,
            date_debut: document.getElementById("date_debut").value,
            date_fin: document.getElementById("date_fin").value,
            type: "public",
            responsables: responsables
        };

        try {
            await pb.collection("planning_events").create(data);

            feedback.textContent = "Événement public créé avec succès !";
            feedback.className = "success";

        } catch (error) {
            console.error(error);
            feedback.textContent = "Erreur lors de la création.";
            feedback.className = "error";
        }
    }
</script>

</body>
</html>
