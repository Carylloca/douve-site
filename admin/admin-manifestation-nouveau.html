<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Nouvelle manifestation</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../favicon.png">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("../img/page-admin-manifestation-nouveau.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            text-shadow: 0 0 10px black;
        }

        .btn {
            display: block;
            width: fit-content;
            margin: 0 auto 30px auto;
            padding: 12px 20px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover {
            background: #5A000C;
        }

        form {
            background: rgba(255, 255, 255, 0.92);
            padding: 25px;
            border-radius: 10px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        textarea {
            height: 120px;
        }

        .checkbox-list label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
            font-size: 15px;
        }

        .btn-submit {
            margin-top: 20px;
            width: 100%;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="overlay">
        <h1>Créer une nouvelle manifestation</h1>

        <div style="text-align:center;">
            <a href="admin-menu.html" class="btn">← Retour au menu</a>
            <button class="btn" onclick="logout()">⏻ Déconnexion</button>
        </div>

        <form id="manifestForm">
            <label>Titre</label>
            <input type="text" id="title" required>

            <label>Description</label>
            <textarea id="description"></textarea>

            <label>Date</label>
            <input type="date" id="date" required>

            <label>Heure</label>
            <input type="time" id="heure" required>

            <label>Date limite d'inscription</label>
            <input type="date" id="date_limite">

            <label>Places maximum</label>
            <input type="number" id="places_max" min="1">

            <label>Responsables</label>
            <div id="responsables" class="checkbox-list"></div>

            <button type="submit" class="btn btn-submit">Créer la manifestation</button>
        </form>
    </div>

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <!-- Auth -->
    <script src="../js/auth.js"></script>

    <script>
        // 🔒 Sécurisation admin
        requireComite();

        // Charger la liste des compagnons sous forme de cases à cocher
        async function loadResponsables() {
            const container = document.getElementById("responsables");
            container.innerHTML = "<p style='color:white;'>Chargement...</p>";

            try {
                const companions = await pb.collection("companions").getFullList({
                    sort: "nom"
                });

                container.innerHTML = "";

                companions.forEach(c => {
                    const wrapper = document.createElement("label");

                    const checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.value = c.id;

                    const text = document.createElement("span");
                    text.textContent = `${c.nom} – ${c.prenom} (${c.initiales})`;

                    wrapper.appendChild(checkbox);
                    wrapper.appendChild(text);

                    container.appendChild(wrapper);
                });

            } catch (err) {
                console.error(err);
                container.innerHTML = "<p style='color:red;'>Erreur de chargement</p>";
            }
        }

        loadResponsables();

        // Création de la manifestation
        document.getElementById("manifestForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const user = pb.authStore.model;

            // Vérifier comité
            if (user.collectionName !== "users") {
                alert("Seuls les membres du comité peuvent créer une manifestation.");
                return;
            }

            // Récupérer les responsables cochés
            const responsables = Array.from(
                document.querySelectorAll("#responsables input[type='checkbox']:checked")
            ).map(cb => cb.value);

            if (responsables.length === 0) {
                alert("Veuillez sélectionner au moins un responsable.");
                return;
            }

            // Récupérer date + heure
            const date = document.getElementById("date").value;
            const heure = document.getElementById("heure").value;

            // Fusionner date + heure → format ISO PocketBase
            const dateTime = `${date} ${heure}`;

            const data = {
                title: document.getElementById("title").value.trim(),
                description: document.getElementById("description").value.trim(),
                date: dateTime, // <-- NOUVEAU : date + heure
                date_limite: document.getElementById("date_limite").value || null,
                places_max: document.getElementById("places_max").value || null,
                created_by: user.id,
                responsables: responsables
            };

            try {
                await pb.collection("manifestations").create(data);
                alert("Manifestation créée !");
                window.location.href = "admin-manifestations.html";
            } catch (err) {
                console.error(err);
                alert("Erreur lors de la création : " + (err?.message || "Vérifiez les champs obligatoires."));
            }
        });
    </script>
</body>
</html>
