<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Nouvelle manifestation</title>

    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../css/style.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("../img/page-admin-manifestation-nouveau.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: "DM Sans", sans-serif;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 20px 10px;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 12px;
            text-shadow: 0 0 10px black;
            font-size: 26px;
        }

        .btn {
            margin-bottom: 8px;
            display: inline-block;
        }

        form {
            background: rgba(255, 255, 255, 0.92);
            padding: 12px 18px;
            border-radius: 8px;
            max-width: 560px;
            margin: 0 auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .row {
            display: flex;
            align-items: center;
            margin: 4px 0;
        }

        .row label {
            width: 22%;
            text-align: left;
            padding-right: 8px;
            font-size: 14px;
            font-weight: bold;
            line-height: 1.1;
        }

        .row input,
        .row textarea,
        .row select {
            width: 78%;
            padding: 6px 7px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        textarea {
            height: 80px;
        }

        .row-inline {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 78%;
        }

        #responsables {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px 4px;
            margin-top: 2px;
        }

        .responsable-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            padding: 1px 0;
            white-space: nowrap;
        }

        .responsable-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
        }

        .responsable-item span {
            flex: 1;
            text-align: left;
            padding-left: 2px;
        }

        .btn-submit {
            margin-top: 12px;
            width: 100%;
            padding: 10px;
        }
    </style>
</head>

<body>
<div class="overlay">

    <h1>Créer une nouvelle manifestation</h1>

    <!-- 🔥 BLOC EXACTEMENT COMME AVANT (VERTICAL) -->
    <a href="../index.html" class="btn">Menu</a>
    <a href="admin-menu.html" class="btn">Menu admin</a>
    <a href="../compagnons.html" class="btn">Liste des manifestations</a>

    <form id="manifestForm">

        <div class="row">
            <label>Titre</label>
            <input type="text" id="title" required>
        </div>

        <div class="row">
            <label>Description</label>
            <textarea id="description"></textarea>
        </div>

        <div class="row">
            <label>Date & Heure</label>
            <div class="row-inline">
                <input type="date" id="date" required>
                <input type="time" id="heure" required>
            </div>
        </div>

        <div class="row">
            <label>Date limite</label>
            <input type="date" id="date_limite">
        </div>

        <div class="row">
            <label>Places max</label>
            <input type="number" id="places_max" min="1">
        </div>

        <div class="row" style="align-items:flex-start;">
            <label style="padding-top:4px;">Responsables</label>
            <div id="responsables"></div>
        </div>

        <button type="submit" class="btn btn-submit">Créer la manifestation</button>

    </form>
</div>

<script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
<script src="../js/auth.js"></script>

<script>
    requireComite();

    async function loadResponsables() {
        const container = document.getElementById("responsables");
        container.innerHTML = "<p>Chargement...</p>";

        try {
            const companions = await pb.collection("companions").getFullList({ sort: "nom" });
            container.innerHTML = "";

            companions.forEach(c => {
                const div = document.createElement("div");
                div.className = "responsable-item";

                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.value = c.id;

                const label = document.createElement("span");
                label.textContent = `${c.nom} ${c.prenom} (${c.initiales})`;

                div.appendChild(checkbox);
                div.appendChild(label);
                container.appendChild(div);
            });

        } catch (err) {
            container.innerHTML = "<p style='color:red;'>Erreur de chargement</p>";
        }
    }

    loadResponsables();

    document.getElementById("manifestForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const user = pb.authStore.model;

        let responsables = Array.from(
            document.querySelectorAll("#responsables input[type='checkbox']:checked")
        ).map(cb => cb.value);

        if (responsables.length === 0) {
            responsables = [user.id];
        }

        const date = document.getElementById("date").value;
        const heure = document.getElementById("heure").value;
        const dateFinale = `${date} ${heure}:00`;

        let places = document.getElementById("places_max").value.trim();
        places = places === "" ? null : Number(places);

        const data = {
            title: document.getElementById("title").value.trim(),
            description: document.getElementById("description").value.trim(),
            date: dateFinale,
            date_limite: document.getElementById("date_limite").value || null,
            places_max: places,
            created_by: user.id,
            responsables: responsables
        };

        try {
            await pb.collection("manifestations").create(data);
            alert("Manifestation créée !");
            window.location.href = "admin-manifestations.html";

        } catch (err) {
            alert("Erreur lors de la création : " + (err?.message || "Vérifiez les champs."));
        }
    });
</script>

</body>
</html>
