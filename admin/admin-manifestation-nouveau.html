<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Nouvelle manifestation</title>

    <link rel="stylesheet" href="../css/style.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("../img/page-admin-manifestation-nouveau.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: "DM Sans", sans-serif;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            text-shadow: 0 0 10px black;
            font-family: "DM Sans", sans-serif;
        }

        form {
            background: rgba(255, 255, 255, 0.92);
            padding: 25px;
            border-radius: 10px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-family: "DM Sans", sans-serif;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            font-family: "DM Sans", sans-serif;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
            font-family: "DM Sans", sans-serif;
        }

        textarea {
            height: 120px;
        }

        /* Champ heure compact */
        #heure_wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 5px;
        }

        .heure-select {
            width: 90px;
            padding: 10px;
            font-size: 18px;
            font-family: "DM Sans", sans-serif;
            text-align: center;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .heure-sep {
            font-size: 22px;
            font-weight: bold;
            color: #7b0f23;
        }

        /* Responsables */
        .responsable-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 6px 0;
            font-size: 16px;
            font-family: "DM Sans", sans-serif;
        }

        .responsable-item input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
        }

        .btn-submit {
            margin-top: 20px;
            width: 100%;
            text-align: center;
        }
    </style>
</head>

<body>
<div class="overlay">
    <h1>Créer une nouvelle manifestation</h1>

    <a href="admin-menu.html" class="btn">← Retour au menu</a>

    <form id="manifestForm">

        <label>Titre</label>
        <input type="text" id="title" required>

        <label>Description</label>
        <textarea id="description"></textarea>

        <label>Date</label>
        <input type="date" id="date" required>

        <label>Heure</label>
        <div id="heure_wrapper">
            <select id="heure_h" class="heure-select" required>
                <script>
                    for (let h = 0; h < 24; h++) {
                        const hh = String(h).padStart(2, "0");
                        document.write(`<option value="${hh}">${hh}</option>`);
                    }
                </script>
            </select>

            <span class="heure-sep">:</span>

            <select id="heure_m" class="heure-select" required>
                <option value="00">00</option>
                <option value="15">15</option>
                <option value="30">30</option>
                <option value="45">45</option>
            </select>
        </div>

        <label>Date limite d'inscription</label>
        <input type="date" id="date_limite">

        <label>Places maximum</label>
        <input type="number" id="places_max" min="1">

        <label>Responsables</label>
        <div id="responsables"></div>

        <button type="submit" class="btn btn-submit">Créer la manifestation</button>
    </form>
</div>

<!-- PocketBase -->
<script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

<!-- Auth -->
<script src="../js/auth.js"></script>

<script>
    requireComite();

    async function loadResponsables() {
        const container = document.getElementById("responsables");
        container.innerHTML = "<p>Chargement...</p>";

        try {
            const companions = await pb.collection("companions").getFullList({
                sort: "nom"
            });

            container.innerHTML = "";

            companions.forEach(c => {
                const div = document.createElement("div");
                div.className = "responsable-item";

                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.value = c.id;

                const label = document.createElement("span");
                label.textContent = `${c.nom} ${c.prenom} (${c.initiales})`;

                div.appendChild(checkbox);
                div.appendChild(label);

                container.appendChild(div);
            });

        } catch (err) {
            console.error(err);
            container.innerHTML = "<p style='color:red;'>Erreur de chargement</p>";
        }
    }

    loadResponsables();

    document.getElementById("manifestForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const user = pb.authStore.model;

        /* --- RESPONSABLES --- */
        const responsables = Array.from(
            document.querySelectorAll("#responsables input[type='checkbox']:checked")
        ).map(cb => cb.value);

        if (responsables.length === 0) {
            alert("Veuillez sélectionner au moins un responsable.");
            return;
        }

        /* --- DATE + HEURE --- */
        const date = document.getElementById("date").value;
        const hh = document.getElementById("heure_h").value;
        const mm = document.getElementById("heure_m").value;

        if (!date || !hh || !mm) {
            alert("Veuillez sélectionner une date et une heure.");
            return;
        }

        const dateFinale = `${date} ${hh}:${mm}`;

/* --- PLACES MAX --- */
let places = document.getElementById("places_max").value.trim();
places = places === "" ? null : Number(places);

if (places !== null && isNaN(places)) {
    alert("Le nombre de places est invalide.");
    return;
}

const data = {
    title: document.getElementById("title").value.trim(),
    description: document.getElementById("description").value.trim(),
    date: dateFinale,
    date_limite: document.getElementById("date_limite").value || null,
    places_max: places,
    created_by: user.id,
    responsables: responsables
};

        try {
            await pb.collection("manifestations").create(data);
            alert("Manifestation créée !");
            window.location.href = "admin-manifestations.html";

        } catch (err) {
            console.error(err);
            alert("Erreur lors de la création : " + (err?.message || "Vérifiez les champs."));
        }
    });
</script>


</body>
</html>
