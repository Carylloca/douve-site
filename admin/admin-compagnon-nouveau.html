<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter un compagnon</title>
    <link rel="icon" type="image/png" href="../favicon.png">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("../img/page-admin-compagnons.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 40px 20px;
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 10px black;
        }

        .card {
            width: 40%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            color: black;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
            position: relative;
        }

        /* PHOTO EN HAUT À DROITE */
        .photo-block {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .photo-frame {
            width: 280px;
            height: 280px;
            border: 3px solid #7A0010;
            border-radius: 10px;
            background: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 7px;
            display: none;
        }

        #photo {
            width: 180px;
            overflow: hidden;
            color: transparent;
        }

        #photo::-webkit-file-upload-button,
        #photo::file-selector-button {
            visibility: hidden;
        }

        #photo::before {
            content: "Choisir un fichier";
            display: inline-block;
            background: #7A0010;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }

        label {
            font-weight: bold;
            color: #7A0010;
            margin-top: 10px;
            display: block;
        }

        input {
            width: 85%;
            padding: 7px;
            margin-top: 4px;
            border-radius: 6px;
            border: 1px solid #aaa;
            font-size: 15px;
            box-sizing: border-box;
        }

        input[type="date"] {
            width: 85% !important;
        }

        .line {
            display: flex;
            gap: 6px;
            justify-content: flex-start;
            margin-bottom: 10px;
        }

        .line > div {
            flex: 0 0 auto;
        }

        .full {
            width: 55%;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            margin-top: 20px;
            margin-right: 10px;
            cursor: pointer;
        }

        .btn:hover {
            background: #5A000C;
        }
    </style>
</head>

<body>
    <div class="overlay">
        <h1>Ajouter un compagnon</h1>

        <div class="card">

            <!-- PHOTO -->
            <div class="photo-block">
                <div class="photo-frame">
                    <img id="photoPreview" class="photo-preview">
                </div>
                <input type="file" id="photo" accept="image/*">
            </div>

            <!-- FORMULAIRE IDENTIQUE À LA PAGE MODIFIER -->

            <div class="line">
                <div>
                    <label>Nom :</label>
                    <input type="text" id="nom">
                </div>
                <div>
                    <label>Prénom :</label>
                    <input type="text" id="prenom">
                </div>
            </div>

            <div class="line">
                <div>
                    <label>Initiales :</label>
                    <input type="text" id="initiales">
                </div>
                <div>
                    <label>Fonction :</label>
                    <input type="text" id="fonction">
                </div>
            </div>

            <label>Adresse :</label>
            <input type="text" id="adresse" class="full">

            <div class="line">
                <div>
                    <label>N° postal :</label>
                    <input type="text" id="npa">
                </div>
                <div>
                    <label>Lieu :</label>
                    <input type="text" id="lieu">
                </div>
            </div>

            <div class="line">
                <div>
                    <label>Email (connexion) :</label>
                    <input type="email" id="email_public" required>
                </div>
                <div>
                    <label>Téléphone :</label>
                    <input type="text" id="telephone">
                </div>
            </div>

            <div class="line">
                <div>
                    <label>Email professionnel :</label>
                    <input type="email" id="email_prof">
                </div>
                <div>
                    <label>Téléphone professionnel :</label>
                    <input type="text" id="telephone_prof">
                </div>
            </div>

            <label>Date de naissance :</label>
            <input type="date" id="date_naissance">

            <div class="line">
                <div>
                    <label>Conjoint - nom :</label>
                    <input type="text" id="conjoint_nom">
                </div>
                <div>
                    <label>Conjoint - prénom :</label>
                    <input type="text" id="conjoint_prenom">
                </div>
            </div>

            <button class="btn" onclick="ajouterCompagnon()">Créer le compagnon</button>
            <a href="admin-compagnons.html" class="btn">Annuler</a>

        </div>
    </div>

    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <script>
        const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

        if (!pb.authStore.isValid) {
            window.location.href = "../login.html";
        }

        // Aperçu photo
        document.getElementById("photo").addEventListener("change", function() {
            const file = this.files[0];
            if (file) {
                const preview = document.getElementById("photoPreview");
                preview.src = URL.createObjectURL(file);
                preview.style.display = "block";
            }
        });

        async function ajouterCompagnon() {
            const formData = new FormData();

            // Email Auth + Email public
            const email = document.getElementById("email_public").value;
            formData.append("email", email);
            formData.append("email_public", email);

            // Mot de passe temporaire basé sur le NPA
            const npa = document.getElementById("npa").value;
            const tempPassword = "Douve" + npa;

            formData.append("password", tempPassword);
            formData.append("passwordConfirm", tempPassword);

            // Champs classiques
            formData.append("nom", document.getElementById("nom").value);
            formData.append("prenom", document.getElementById("prenom").value);
            formData.append("initiales", document.getElementById("initiales").value);
            formData.append("fonction", document.getElementById("fonction").value);
            formData.append("adresse", document.getElementById("adresse").value);
            formData.append("npa", npa);
            formData.append("lieu", document.getElementById("lieu").value);
            formData.append("telephone", document.getElementById("telephone").value);
            formData.append("email_prof", document.getElementById("email_prof").value);
            formData.append("telephone_prof", document.getElementById("telephone_prof").value);

            const dn = document.getElementById("date_naissance").value;
            if (dn) formData.append("date_naissance", dn + " 23:30:00");

            formData.append("conjoint_nom", document.getElementById("conjoint_nom").value);
            formData.append("conjoint_prenom", document.getElementById("conjoint_prenom").value);

            // Photo
            const fileInput = document.getElementById("photo");
            if (fileInput.files.length > 0) {
                formData.append("photo", fileInput.files[0]);
            }

            try {
                await pb.collection("companions").create(formData);
                alert("Compagnon créé avec succès !");
                window.location.href = "admin-compagnons.html";
            } catch (err) {
                console.error(err);
                alert("Erreur lors de la création du compagnon.");
            }
        }
    </script>

</body>
</html>
