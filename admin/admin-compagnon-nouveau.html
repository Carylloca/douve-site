<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter un compagnon</title>
    <link rel="icon" type="image/png" href="../favicon.png">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("../img/page-admin-compagnons.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        header {
            background: rgba(0, 0, 0, 0.85);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        .left-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #5A000C;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 40px 20px;
            color: white;
        }

        .card {
            width: 40%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            color: black;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
            position: relative;
        }

        .photo-block {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 30%;
            min-width: 150px;
            max-width: 280px;
        }

        .photo-frame {
            width: 100%;
            aspect-ratio: 1 / 1;
            border: 3px solid #7A0010;
            border-radius: 10px;
            background: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 7px;
            display: none;
        }

        .photo-upload-btn {
            width: 100%;
            text-align: center;
            background: #7A0010;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-size: clamp(12px, 1.5vw, 16px);
        }

        .photo-upload-btn:hover {
            background: #5A000C;
        }

        label {
            font-weight: bold;
            color: #7A0010;
            margin-top: 10px;
            display: block;
        }

        input, select {
            width: 85%;
            padding: 7px;
            margin-top: 4px;
            border-radius: 6px;
            border: 1px solid #aaa;
            font-size: 15px;
            box-sizing: border-box;
        }

        .line {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }

        .full {
            width: 55%;
        }

        @media (max-width: 900px) {
            .photo-block {
                position: relative;
                margin: 0 auto 20px auto;
                width: 50%;
                max-width: 250px;
            }

            .card {
                width: 90%;
                padding-top: 350px;
            }
        }

        @media (max-width: 600px) {
            .photo-block {
                width: 70%;
                max-width: 220px;
            }

            .card {
                padding-top: 300px;
            }
        }
    </style>
</head>

<body>

<header>
    <div class="left-buttons">
        <a href="../index.html" class="btn">🏠 Menu</a>
        <a href="admin-menu.html" class="btn">📋 Accueil admin</a>
    </div>
    <h2>Ajouter un compagnon</h2>
    <button class="btn" onclick="logout()">⏻ Déconnexion</button>
</header>

<div class="overlay">

    <div class="card">

        <!-- PHOTO -->
        <div class="photo-block">
            <div class="photo-frame">
                <img id="photoPreview" class="photo-preview">
                <span id="photoPlaceholder">Aucune image</span>
            </div>

            <input type="file" id="photoInput" accept="image/*" style="display:none;">
            <button class="photo-upload-btn" onclick="document.getElementById('photoInput').click()">📷 Charger une image</button>
        </div>

        <!-- FORMULAIRE -->
        <div class="line">
            <div>
                <label>Nom :</label>
                <input type="text" id="nom">
            </div>
            <div>
                <label>Prénom :</label>
                <input type="text" id="prenom">
            </div>
        </div>

        <div class="line">
            <div>
                <label>Initiales :</label>
                <input type="text" id="initiales">
            </div>
            <div>
                <label>Fonction :</label>
                <input type="text" id="fonction">
            </div>
        </div>

        <label>Adresse :</label>
        <input type="text" id="adresse" class="full">

        <div class="line">
            <div>
                <label>N° postal :</label>
                <input type="text" id="npa">
            </div>
            <div>
                <label>Lieu :</label>
                <input type="text" id="lieu">
            </div>
        </div>

        <div class="line">
            <div>
                <label>Email (connexion) :</label>
                <input type="email" id="email_public" required>
            </div>
            <div>
                <label>Téléphone :</label>
                <input type="text" id="telephone">
            </div>
        </div>

        <div class="line">
            <div>
                <label>Email professionnel :</label>
                <input type="email" id="email_prof">
            </div>
            <div>
                <label>Téléphone professionnel :</label>
                <input type="text" id="telephone_prof">
            </div>
        </div>

        <div class="line">
            <div>
                <label>Date de naissance :</label>
                <input type="date" id="date_naissance">
            </div>

            <div>
                <label>Rôle :</label>
                <select id="role">
                    <option value="compagnon" selected>Compagnon</option>
                    <option value="comite">Comité</option>
                    <option>Dame de Coeur</option>
                </select>
            </div>
        </div>

        <div class="line">
            <div>
                <label>Conjoint - nom :</label>
                <input type="text" id="conjoint_nom">
            </div>
            <div>
                <label>Conjoint - prénom :</label>
                <input type="text" id="conjoint_prenom">
            </div>
        </div>

        <button class="btn" onclick="ajouterCompagnon()">Créer le compagnon</button>
        <a href="admin-compagnons.html" class="btn">Annuler</a>

    </div>
</div>

<!-- PocketBase -->
<script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

<!-- Auth -->
<script src="../js/auth.js"></script>

<script>
    requireComite();

    const pb = new PocketBase(window.PB_URL);

    document.getElementById("photoInput").addEventListener("change", function () {
        const file = this.files[0];
        const preview = document.getElementById("photoPreview");
        const placeholder = document.getElementById("photoPlaceholder");

        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = "block";
            placeholder.style.display = "none";
        }
    });

    async function ajouterCompagnon() {
        const formData = new FormData();

        const email = document.getElementById("email_public").value;
        const npa = document.getElementById("npa").value;
        const tempPassword = "Douve" + npa;

        formData.append("email", email);
        formData.append("email_public", email);
        formData.append("password", tempPassword);
        formData.append("passwordConfirm", tempPassword);

        formData.append("nom", document.getElementById("nom").value);
        formData.append("prenom", document.getElementById("prenom").value);
        formData.append("initiales", document.getElementById("initiales").value);
        formData.append("fonction", document.getElementById("fonction").value);
        formData.append("adresse", document.getElementById("adresse").value);
        formData.append("npa", npa);
        formData.append("lieu", document.getElementById("lieu").value);
        formData.append("telephone", document.getElementById("telephone").value);
        formData.append("email_prof", document.getElementById("email_prof").value);
        formData.append("telephone_prof", document.getElementById("telephone_prof").value);

        const dn = document.getElementById("date_naissance").value;
        if (dn) formData.append("date_naissance", dn + " 23:30:00");

        formData.append("conjoint_nom", document.getElementById("conjoint_nom").value);
        formData.append("conjoint_prenom", document.getElementById("conjoint_prenom").value);

        formData.append("role", document.getElementById("role").value);

        const fileInput = document.getElementById("photoInput");
        if (fileInput.files.length > 0) {
            formData.append("photo", fileInput.files[0]);
        }

        try {
            await pb.collection("companions").create(formData);
            alert("Compagnon créé avec succès !");
            window.location.href = "admin-compagnons.html";
        } catch (err) {
            console.error(err);
            alert("Erreur lors de la création du compagnon.");
        }
    }

    function logout() {
        pb.authStore.clear();
        window.location.href = "../index.html";
    }
</script>

</body>
</html>
