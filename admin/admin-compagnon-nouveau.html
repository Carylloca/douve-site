<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter un compagnon</title>
    <link rel="icon" type="image/png" href="../favicon.png">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("../img/page-admin-compagnons.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 40px 20px;
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 10px black;
        }

        /* Bloc principal harmonisé */
        .card {
            width: 40%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            color: black;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
            position: relative;
        }

        /* Bloc photo identique */
        .photo-block {
            position: absolute;
            top: 15px;
            right: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .photo-preview {
            width: 280px;
            height: 280px;
            object-fit: cover;
            border-radius: 10px;
            border: 3px solid #7A0010;
            margin-bottom: 12px;
            display: none;
        }

        /* Bouton fichier stylisé + suppression du texte parasite */
        #photo {
            width: 280px;
            overflow: hidden;
            color: transparent;
        }

        #photo::-webkit-file-upload-button,
        #photo::file-selector-button {
            visibility: hidden;
        }

        #photo::before {
            content: "Choisir un fichier";
            display: inline-block;
            background: #7A0010;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }

        label {
            font-weight: bold;
            color: #7A0010;
            margin-top: 10px;
            display: block;
        }

        /* Champs harmonisés */
        input, select {
            width: 85%;
            padding: 7px;
            margin-top: 4px;
            border-radius: 6px;
            border: 1px solid #aaa;
            font-size: 15px;
            box-sizing: border-box;
        }

        /* Date même largeur */
        input[type="date"] {
            width: 85% !important;
        }

        /* Adresse raccourcie */
        .full {
            width: 55%;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            margin-top: 20px;
            margin-right: 10px;
            cursor: pointer;
        }

        .btn:hover {
            background: #5A000C;
        }
    </style>
</head>

<body>
    <div class="overlay">
        <h1>Ajouter un compagnon</h1>

        <div class="card">

            <!-- PHOTO -->
            <div class="photo-block">
                <img id="photoPreview" class="photo-preview">
                <input type="file" id="photo" accept="image/*">
            </div>

            <label>Nom :</label>
            <input type="text" id="nom">

            <label>Prénom :</label>
            <input type="text" id="prenom">

            <label>Initiales :</label>
            <input type="text" id="initiales">

            <label>Fonction :</label>
            <input type="text" id="fonction">

            <label>Adresse :</label>
            <input type="text" id="adresse" class="full">

            <label>N° postal :</label>
            <input type="text" id="npa">

            <label>Lieu :</label>
            <input type="text" id="lieu">

            <label>Email :</label>
            <input type="email" id="email_public">

            <label>Téléphone :</label>
            <input type="text" id="telephone">

            <label>Date de naissance :</label>
            <input type="date" id="date_naissance">

            <label>Conjoint - prénom :</label>
            <input type="text" id="conjoint_prenom">

            <label>Conjoint - nom :</label>
            <input type="text" id="conjoint_nom">

            <label>Téléphone professionnel :</label>
            <input type="text" id="telephone_prof">

            <label>Email professionnel :</label>
            <input type="email" id="email_prof">

            <button class="btn" onclick="ajouterCompagnon()">Créer le compagnon</button>
            <a href="admin-compagnons.html" class="btn">Annuler</a>

        </div>
    </div>

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <script>
        const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

        if (!pb.authStore.isValid) {
            window.location.href = "../login.html";
        }

        // Affichage de la photo en aperçu
        document.getElementById("photo").addEventListener("change", function() {
            const file = this.files[0];
            if (file) {
                const preview = document.getElementById("photoPreview");
                preview.src = URL.createObjectURL(file);
                preview.style.display = "block";
            }
        });

        async function ajouterCompagnon() {
            const formData = new FormData();

            formData.append("nom", document.getElementById("nom").value);
            formData.append("prenom", document.getElementById("prenom").value);
            formData.append("initiales", document.getElementById("initiales").value);
            formData.append("fonction", document.getElementById("fonction").value);
            formData.append("adresse", document.getElementById("adresse").value);
            formData.append("npa", document.getElementById("npa").value);
            formData.append("lieu", document.getElementById("lieu").value);
            formData.append("email_public", document.getElementById("email_public").value);
            formData.append("telephone", document.getElementById("telephone").value);

            const dn = document.getElementById("date_naissance").value;
            if (dn) formData.append("date_naissance", dn + " 23:30:00");

            formData.append("conjoint_prenom", document.getElementById("conjoint_prenom").value);
            formData.append("conjoint_nom", document.getElementById("conjoint_nom").value);
            formData.append("telephone_prof", document.getElementById("telephone_prof").value);
            formData.append("email_prof", document.getElementById("email_prof").value);

            const fileInput = document.getElementById("photo");
            if (fileInput.files.length > 0) {
                formData.append("photo", fileInput.files[0]);
            }

            try {
                await pb.collection("companions").create(formData);
                alert("Compagnon créé !");
                window.location.href = "admin-compagnons.html";
            } catch (err) {
                console.error(err);
                alert("Erreur lors de la création.");
            }
        }
    </script>

</body>
</html>
