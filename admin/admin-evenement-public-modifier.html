<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier un événement public – Admin</title>

    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: url("../img/page-admin-evenement-public-modifier.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        header {
            background: rgba(0, 0, 0, 0.85);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        .left-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #5A000C;
        }

        h2 {
            text-align: center;
            color: white;
            margin: 0;
            text-shadow: 0 0 10px black;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 30px 0;
        }

        .panel {
            width: 600px;
            margin: 20px auto;
            background: rgba(255,255,255,0.92);
            padding: 25px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }

        label {
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        textarea {
            height: 120px;
            resize: vertical;
        }
    </style>
</head>

<body>

<div class="overlay">

<header>
    <div class="left-buttons">
        <a href="admin-evenement-public.html" class="btn">Retour</a>
    </div>

    <h2>Modifier un événement public</h2>

    <div class="left-buttons">
        <button class="btn" id="btnDelete" style="background:#444;">Supprimer</button>
    </div>
</header>

<div class="panel">

    <h3>Informations de l’événement public</h3>

    <label>Nom de l’événement :</label>
    <input type="text" id="nom">

    <label>Responsable :</label>
    <select id="responsable"></select>

    <label>Description :</label>
    <textarea id="description"></textarea>

    <label>Date de début :</label>
    <input type="date" id="date_debut">

    <label>Date de fin :</label>
    <input type="date" id="date_fin">

    <button class="btn" id="btnSave" style="width:100%; margin-top:10px;">Enregistrer les modifications</button>

</div>
</div>

<script>
const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

// Récupération de l'ID dans l'URL
const urlParams = new URLSearchParams(window.location.search);
const eventId = urlParams.get("id");

if (!eventId) {
    alert("Aucun événement sélectionné.");
    window.location.href = "admin-evenement-public.html";
}

// Charger les responsables (compagnons)
async function loadResponsables(selectedId = null) {
    const list = await pb.collection("compagnons").getFullList({ sort: "nom" });
    const sel = document.getElementById("responsable");
    sel.innerHTML = "";

    list.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.id;
        opt.textContent = c.nom;
        if (c.id === selectedId) opt.selected = true;
        sel.appendChild(opt);
    });
}

// Charger les données de l’événement
async function loadEvenement() {
    try {
        const ev = await pb.collection("manifestations").getOne(eventId);

        document.getElementById("nom").value = ev.nom || "";
        document.getElementById("description").value = ev.description || "";
        document.getElementById("date_debut").value = ev.date_debut || "";
        document.getElementById("date_fin").value = ev.date_fin || "";

        await loadResponsables(ev.responsable);

    } catch (err) {
        alert("Erreur lors du chargement.");
        console.error(err);
    }
}

// Sauvegarder les modifications
document.getElementById("btnSave").onclick = async function () {
    try {
        await pb.collection("manifestations").update(eventId, {
            nom: document.getElementById("nom").value,
            description: document.getElementById("description").value,
            responsable: document.getElementById("responsable").value,
            date_debut: document.getElementById("date_debut").value,
            date_fin: document.getElementById("date_fin").value
        });

        alert("Modifications enregistrées !");
        window.location.href = "admin-evenement-public.html";

    } catch (err) {
        alert("Erreur lors de l’enregistrement.");
        console.error(err);
    }
};

// Supprimer l’événement
document.getElementById("btnDelete").onclick = async function () {
    if (!confirm("Supprimer cet événement public ?")) return;

    try {
        await pb.collection("manifestations").delete(eventId);
        alert("Événement supprimé.");
        window.location.href = "admin-evenement-public.html";

    } catch (err) {
        alert("Erreur lors de la suppression.");
        console.error(err);
    }
};

loadEvenement();
</script>

</body>
</html>
