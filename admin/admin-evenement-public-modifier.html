<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier un événement public</title>

    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url("../img/page-admin-evenement-public-nouveau.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        header {
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        .btn {
            background: #7A0010;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
        }

        .panel {
            width: 600px;
            margin: 30px auto;
            background: rgba(255,255,255,0.92);
            padding: 25px;
            border-radius: 12px;
        }

        label {
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        textarea {
            height: 120px;
        }

        .responsables-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<header>
    <a href="admin-evenement-public-dashboard.html" class="btn">Retour</a>
    <h2>Modifier un événement public</h2>
    <div></div>
</header>

<div class="panel">

    <label>Nom de l’événement :</label>
    <input type="text" id="titre">

    <label>Responsables :</label>
    <div id="responsablesList" class="responsables-list"></div>

    <label>Description :</label>
    <textarea id="description"></textarea>

    <label>Date de début :</label>
    <input type="date" id="date_debut">

    <label>Date de fin :</label>
    <input type="date" id="date_fin">

    <button class="btn" id="btnSave" style="width:100%; margin-top:10px;">Enregistrer les modifications</button>

    <p id="feedback"></p>

</div>

<script>
const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");
const eventId = new URLSearchParams(window.location.search).get("id");

let responsablesExistants = [];

async function loadResponsables() {
    const list = await pb.collection("companions").getFullList({ sort: "nom" });
    const container = document.getElementById("responsablesList");

    list.forEach(c => {
        const div = document.createElement("label");
        div.innerHTML = `
            <input type="checkbox" value="${c.id}">
            ${c.nom} ${c.prenom}
        `;
        container.appendChild(div);
    });
}

async function loadEvent() {
    const ev = await pb.collection("planning_events").getOne(eventId, {
        expand: "responsable"
    });

    document.getElementById("titre").value = ev.titre;
    document.getElementById("description").value = ev.description;
    document.getElementById("date_debut").value = ev.date_debut;
    document.getElementById("date_fin").value = ev.date_fin;

    responsablesExistants = ev.responsable || [];

    document.querySelectorAll("#responsablesList input").forEach(cb => {
        if (responsablesExistants.includes(cb.value)) {
            cb.checked = true;
        }
    });
}

document.getElementById("btnSave").onclick = async function () {
    const responsables = Array.from(
        document.querySelectorAll("#responsablesList input:checked")
    ).map(cb => cb.value);

    const data = {
        titre: document.getElementById("titre").value,
        description: document.getElementById("description").value,
        description_longue: document.getElementById("description").value,
        date_debut: document.getElementById("date_debut").value,
        date_fin: document.getElementById("date_fin").value,
        responsable: responsables
    };

    try {
        await pb.collection("planning_events").update(eventId, data);
        document.getElementById("feedback").textContent = "Modifications enregistrées !";
        document.getElementById("feedback").style.color = "green";
    } catch (err) {
        console.error(err);
        document.getElementById("feedback").textContent = "Erreur lors de l’enregistrement.";
        document.getElementById("feedback").style.color = "red";
    }
};

(async () => {
    await loadResponsables();
    await loadEvent();
})();
</script>

</body>
</html>
