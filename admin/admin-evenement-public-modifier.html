<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier un événement public – Admin</title>
    <link rel="icon" type="image/png" href="../favicon.png">

    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "DM Sans", sans-serif;
            background-image: url("../img/page-admin-evenement-public-nouveau.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header.admin-header {
            background: rgba(44, 62, 80, 0.90);
            padding: 18px 25px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .header-btn {
            background: #7A0010;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        header.admin-header h1 {
            flex: 1;
            text-align: center;
            margin: 0;
            font-size: 28px;
            font-weight: 600;
        }

        .card {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 10px;
            max-width: 700px;
            margin: 30px auto;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        textarea {
            resize: vertical;
            height: 120px;
        }

        .dates-row {
            display: flex;
            gap: 20px;
        }

        .dates-row div {
            flex: 1;
        }

        .responsables-box {
            background: rgba(255,255,255,0.95);
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 12px;
            cursor: pointer;
            margin-top: 10px;
        }

        .responsables-header {
            font-weight: bold;
        }

        .responsables-list {
            display: none;
            margin-top: 10px;
            border-top: 1px solid #ccc;
            padding-top: 10px;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px 10px;
        }

        .responsables-list label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: normal;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.0;
            padding: 2px 0;
        }

        /* --- BOUTONS --- */
        .btn {
            background: #8b0000;
            color: white;
            padding: 12px 18px;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            font-size: 16px;
            text-align: center;
            flex: 1;
        }

        .btn:hover {
            background: #b30000;
        }

        .btn-red {
            background: #b30000;
        }

        .btn-red:hover {
            background: #7A0010;
        }

        /* --- ALIGNEMENT DES BOUTONS --- */
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .btn-row {
                flex-direction: column;
            }
        }

        .success { color: green; font-weight: bold; margin-top: 15px; }
        .error { color: red; font-weight: bold; margin-top: 15px; }
    </style>
</head>

<body>

<header class="admin-header">
    <div class="header-buttons">
        <a href="../index.html" class="header-btn">Menu</a>
        <a href="admin-menu.html" class="header-btn">Menu admin</a>
        <a href="admin-evenement-public-dashboard.html" class="header-btn">Liste événements publics</a>
    </div>
    <h1>Modifier un événement public</h1>
</header>

<div class="card">

    <label>Nom de l’événement :</label>
    <input type="text" id="titre" required>

    <label>Responsables :</label>
    <div id="responsablesBox" class="responsables-box">
        <div class="responsables-header">Sélectionner les responsables ▼</div>
        <div class="responsables-list" id="responsablesList"></div>
    </div>

    <label>Description :</label>
    <textarea id="description"></textarea>

    <label>État :</label>
    <select id="etat">
        <option value="edition">En édition</option>
        <option value="finalise">Finalisé</option>
    </select>

    <div class="dates-row">
        <div>
            <label>Date de début :</label>
            <input type="date" id="date_debut">
        </div>
        <div>
            <label>Date de fin :</label>
            <input type="date" id="date_fin">
        </div>
    </div>

    <!-- BOUTONS ALIGNÉS -->
    <div class="btn-row">
        <button class="btn" onclick="modifierEvenement()">Enregistrer</button>
        <button class="btn" onclick="dupliquerEvenement()">Dupliquer</button>
        <button class="btn btn-red" onclick="supprimerEvenement()">Supprimer</button>
    </div>

    <p id="feedback"></p>
</div>

<script>
const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");
const eventId = new URLSearchParams(window.location.search).get("id");

if (!pb.authStore.isValid) {
    window.location.href = "../login.html";
}

let responsablesExistants = [];

async function loadResponsables() {
    const companions = await pb.collection("companions").getFullList({ sort: "nom" });
    const list = document.getElementById("responsablesList");

    companions.forEach(c => {
        const item = document.createElement("label");
        item.innerHTML = `
            <input type="checkbox" value="${c.id}">
            ${c.nom} ${c.prenom}
        `;
        list.appendChild(item);
    });
}

async function loadEvent() {
    const ev = await pb.collection("planning_events").getOne(eventId, {
        expand: "responsable"
    });

    document.getElementById("titre").value = ev.titre;
    document.getElementById("description").value = ev.description;
    document.getElementById("etat").value = ev.etat || "edition";
    document.getElementById("date_debut").value = ev.date_debut;
    document.getElementById("date_fin").value = ev.date_fin;

    responsablesExistants = ev.responsable || [];

    document.querySelectorAll("#responsablesList input").forEach(cb => {
        if (responsablesExistants.includes(cb.value)) {
            cb.checked = true;
        }
    });
}

document.getElementById("responsablesBox").addEventListener("click", (e) => {
    if (e.target.tagName === "INPUT") return;

    const list = document.getElementById("responsablesList");
    list.style.display = (list.style.display === "grid") ? "none" : "grid";
});

async function modifierEvenement() {
    const feedback = document.getElementById("feedback");
    feedback.textContent = "";

    const responsables = Array.from(
        document.querySelectorAll("#responsablesList input:checked")
    ).map(cb => cb.value);

    const data = {
        titre: document.getElementById("titre").value,
        description: document.getElementById("description").value,
        description_longue: document.getElementById("description").value,
        etat: document.getElementById("etat").value,
        date_debut: document.getElementById("date_debut").value,
        date_fin: document.getElementById("date_fin").value,
        responsable: responsables
    };

    try {
        await pb.collection("planning_events").update(eventId, data);
        feedback.textContent = "Modifications enregistrées !";
        feedback.className = "success";

    } catch (error) {
        console.error(error);
        feedback.textContent = "Erreur lors de l’enregistrement.";
        feedback.className = "error";
    }
}

async function supprimerEvenement() {
    if (!confirm("Supprimer définitivement cet événement ?")) return;

    try {
        await pb.collection("planning_events").delete(eventId);
        window.location.href = "admin-evenement-public-dashboard.html";
    } catch (err) {
        alert("Erreur lors de la suppression.");
        console.error(err);
    }
}

async function dupliquerEvenement() {
    const ev = await pb.collection("planning_events").getOne(eventId);

    const data = {
        titre: ev.titre + " (copie)",
        description: ev.description,
        description_longue: ev.description_longue,
        etat: ev.etat,
        date_debut: ev.date_debut,
        date_fin: ev.date_fin,
        responsable: ev.responsable
    };

    const newEvent = await pb.collection("planning_events").create(data);

    window.location.href = "admin-evenement-public-modifier.html?id=" + newEvent.id;
}

(async () => {
    await loadResponsables();
    await loadEvent();
})();
</script>

</body>
</html>
