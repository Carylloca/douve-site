<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Gestion du Bon Laron</title>

    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: url("../img/page-admin-chalet.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        header {
            background: rgba(0, 0, 0, 0.85);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        .left-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #5A000C;
        }

        h2 {
            text-align: center;
            color: white;
            margin: 0;
            text-shadow: 0 0 10px black;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.20);
            min-height: 100vh;
            padding: 30px 0;
        }

        .panel {
            width: 600px;
            margin: 20px auto;
            background: rgba(255,255,255,0.92);
            padding: 25px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            border-left: 10px solid transparent;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 25px;
        }

        .full {
            grid-column: span 2;
        }

        @media (max-width: 700px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full {
                grid-column: span 1;
            }
        }

        label { font-weight: bold; }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button.action {
            background: #7A0010;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            margin-right: 10px;
        }

        button.action:hover { background: #5a000c; }

        #deleteBtn { background: #444; }
    </style>
</head>

<body>

<header>
    <div class="left-buttons">
        <a href="../index.html" class="btn">🏠 Menu</a>
        <a href="admin-menu.html" class="btn">📋 Accueil admin</a>
        <a href="admin-chalet-liste.html" class="btn">📋 Liste des réservations</a>
    </div>

    <h2>Admin – Gestion du Bon Laron</h2>

    <button class="btn" onclick="logout()">⏻ Déconnexion</button>
</header>

<div class="overlay">

    <div class="panel" id="panel">
        <h3 style="text-align:center;">Nouvelle / Modifier une réservation</h3>

        <div class="form-grid">

            <div class="full">
                <label>Status</label>
                <select id="status" onchange="updateStatusColor()">
                    <option value="réservation en cours">Réservation en cours</option>
                    <option value="confirmée">Confirmée</option>
                    <option value="terminée">Terminée</option>
                    <option value="annulée">Annulée</option>
                </select>
            </div>

            <div>
                <label>Type</label>
                <select id="type">
                    <option value="Interne 🍷🍽️">Interne 🍷🍽️</option>
                    <option value="Interne 👤">Interne 👤</option>
                    <option value="Nettoyage">Nettoyage</option>
                    <option value="Frairie">Frairie</option>
                    <option value="Externe">Externe</option>
                    <option value="Travaux">Travaux</option>
                </select>
            </div>

            <div>
                <label>Compagnon (si interne)</label>
                <select id="compagnon"></select>
            </div>

            <div class="full">
                <label>Description (obligatoire)</label>
                <textarea id="description"></textarea>
            </div>

            <div>
                <label>Date début</label>
                <input type="date" id="startDate">
            </div>

            <div>
                <label>Date fin</label>
                <input type="date" id="endDate">
            </div>

            <div>
                <label>Électricité – début</label>
                <input type="number" id="electricityStart">
            </div>

            <div>
                <label>Électricité – fin</label>
                <input type="number" id="electricityEnd">
            </div>

            <div>
                <label>Gaz – début</label>
                <input type="number" id="gasStart">
            </div>

            <div>
                <label>Gaz – fin</label>
                <input type="number" id="gasEnd">
            </div>

            <div class="full">
                <label>Fichiers (images, PDF…)</label>
                <input type="file" id="files" multiple>
            </div>

            <div class="full" style="text-align:center; margin-top:10px;">
                <button class="action" type="button" onclick="saveReservation()">Enregistrer</button>
                <button class="action" type="button" id="deleteBtn" onclick="deleteReservation()" style="display:none;">Supprimer</button>
            </div>

        </div>
    </div>

</div>

<!-- Auth -->
<script src="../js/auth.js"></script>

<script>
requireComite();

let currentEventId = null;
let reservation = null;

/* ---------------------------------------------------------
   UTILITAIRE : raccourcir le nom d’un fichier
--------------------------------------------------------- */
function shortenFilename(name, max = 40) {
    return name.length > max ? name.substring(0, max) + "…" : name;
}

/* ---------------------------------------------------------
   COULEUR DU STATUT
--------------------------------------------------------- */
function updateStatusColor() {
    const panel = document.getElementById("panel");
    const statusValue = document.getElementById("status").value;

    const colors = {
        "réservation en cours": "#1E90FF",
        "confirmée": "#32CD32",
        "terminée": "#8B4513",
        "annulée": "#B22222"
    };

    panel.style.borderLeftColor = colors[statusValue] || "transparent";
}

/* ---------------------------------------------------------
   CHARGER LISTE COMPAGNONS
--------------------------------------------------------- */
async function loadCompagnons() {
    const list = await pb.collection("companions").getFullList();
    const select = document.getElementById("compagnon");
    select.innerHTML = "<option value=''>Aucun</option>";

    list.forEach(c => {
        select.innerHTML += `<option value="${c.id}">${c.nom} ${c.prenom}</option>`;
    });
}

/* ---------------------------------------------------------
   SUPPRESSION IMMÉDIATE D’UN FICHIER (ADMIN)
--------------------------------------------------------- */
async function deleteFileAdmin(filename) {
    if (!confirm("Voulez-vous vraiment supprimer ce fichier ?")) return;

    // Retirer localement
    reservation.files = reservation.files.filter(f => f !== filename);

    // Préparer FormData pour mise à jour immédiate
    const formData = new FormData();

    // Champs requis
    formData.append("status", reservation.status);
    formData.append("type", reservation.type);
    formData.append("compagnon", reservation.companion || "");
    formData.append("startDate", reservation.startDate);
    formData.append("endDate", reservation.endDate);
    formData.append("description", reservation.description);
    formData.append("electricityStart", reservation.electricityStart ?? "");
    formData.append("electricityEnd", reservation.electricityEnd ?? "");
    formData.append("gasStart", reservation.gasStart ?? "");
    formData.append("gasEnd", reservation.gasEnd ?? "");
    if (reservation.created_by) {
        formData.append("created_by", reservation.created_by);
    }

    // Ajouter les fichiers restants
    reservation.files.forEach(f => {
        formData.append("files", f);
    });

    try {
        await pb.collection("chalet_reservations").update(currentEventId, formData);
        showExistingFilesAdmin();
        alert("Fichier supprimé.");
    } catch (e) {
        console.error(e);
        alert("Erreur PocketBase : " + JSON.stringify(e.data));
    }
}

/* ---------------------------------------------------------
   AFFICHAGE DES FICHIERS AVEC VIGNETTES + SUPPRESSION
--------------------------------------------------------- */
function showExistingFilesAdmin() {
    const container = document.getElementById("existingFilesAdmin");
    container.innerHTML = "";

    if (reservation.files && reservation.files.length > 0) {
        container.innerHTML = "<h4>Fichiers existants :</h4>";

        reservation.files.forEach(f => {
            const url = pb.files.getUrl(reservation, f);

            const wrapper = document.createElement("div");
            wrapper.className = "file-preview";

            const left = document.createElement("div");
            left.className = "file-left";

            let preview;
            if (f.match(/\.(png|jpg|jpeg|webp|gif)$/i)) {
                preview = document.createElement("img");
                preview.src = url;
            } else {
                preview = document.createElement("span");
                preview.textContent = "📄";
                preview.style.fontSize = "32px";
            }

            const link = document.createElement("a");
            link.href = url;
            link.target = "_blank";
            link.textContent = shortenFilename(f);

            left.appendChild(preview);
            left.appendChild(link);

            const btn = document.createElement("button");
            btn.className = "delete-file";
            btn.textContent = "Supprimer";
            btn.onclick = () => deleteFileAdmin(f);

            wrapper.appendChild(left);
            wrapper.appendChild(btn);

            container.appendChild(wrapper);
        });
    }
}

/* ---------------------------------------------------------
   SAUVEGARDE (AJOUT DE NOUVEAUX FICHIERS)
--------------------------------------------------------- */
async function saveReservation() {
    const description = document.getElementById("description").value.trim();
    if (!description) {
        alert("La description est obligatoire.");
        return;
    }

    const formData = new FormData();

    formData.append("status", document.getElementById("status").value);
    formData.append("type", document.getElementById("type").value);
    formData.append("compagnon", document.getElementById("compagnon").value || "");
    formData.append("startDate", document.getElementById("startDate").value);
    formData.append("endDate", document.getElementById("endDate").value);
    formData.append("description", description);
    formData.append("electricityStart", document.getElementById("electricityStart").value || "");
    formData.append("electricityEnd", document.getElementById("electricityEnd").value || "");
    formData.append("gasStart", document.getElementById("gasStart").value || "");
    formData.append("gasEnd", document.getElementById("gasEnd").value || "");
    formData.append("created_by", pb.authStore.model?.id || "");

    // Ajouter fichiers existants
    if (reservation?.files) {
        reservation.files.forEach(f => {
            formData.append("files", f);
        });
    }

    // Ajouter nouveaux fichiers
    const newFiles = document.getElementById("files").files;
    for (let i = 0; i < newFiles.length; i++) {
        formData.append("files", newFiles[i]);
    }

    try {
        if (currentEventId) {
            await pb.collection("chalet_reservations").update(currentEventId, formData);
        } else {
            await pb.collection("chalet_reservations").create(formData);
        }

        alert("Réservation enregistrée !");
        window.location.href = "admin-chalet-liste.html";

    } catch (e) {
        console.error(e);
        alert("Erreur PocketBase : " + JSON.stringify(e.data));
    }
}

/* ---------------------------------------------------------
   SUPPRESSION DE LA RÉSERVATION
--------------------------------------------------------- */
async function deleteReservation() {
    if (!currentEventId) return;
    if (!confirm("Supprimer définitivement cette réservation ?")) return;

    await pb.collection("chalet_reservations").delete(currentEventId);
    alert("Réservation supprimée !");
    window.location.href = "admin-chalet-liste.html";
}

/* ---------------------------------------------------------
   CHARGEMENT DE LA RÉSERVATION
--------------------------------------------------------- */
async function loadReservation(id) {
    reservation = await pb.collection("chalet_reservations").getOne(id);
    currentEventId = id;

    document.getElementById("status").value = reservation.status;
    document.getElementById("type").value = reservation.type;
    document.getElementById("compagnon").value = reservation.companion || "";
    document.getElementById("startDate").value = reservation.startDate.substring(0, 10);
    document.getElementById("endDate").value = reservation.endDate.substring(0, 10);
    document.getElementById("description").value = reservation.description;

    document.getElementById("electricityStart").value = reservation.electricityStart || "";
    document.getElementById("electricityEnd").value = reservation.electricityEnd || "";
    document.getElementById("gasStart").value = reservation.gasStart || "";
    document.getElementById("gasEnd").value = reservation.gasEnd || "";

    showExistingFilesAdmin();
    updateStatusColor();

    document.getElementById("deleteBtn").style.display = "inline-block";
}

/* ---------------------------------------------------------
   INIT
--------------------------------------------------------- */
function logout() {
    pb.authStore.clear();
    window.location.href = "../index.html";
}

document.addEventListener("DOMContentLoaded", async () => {
    await loadCompagnons();
    updateStatusColor();

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (id) {
        await loadReservation(id);
    }
});
</script>

</body>
</html>
