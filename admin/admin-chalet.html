<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Liste des Réservations du Chalet</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../favicon.png">

    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <!-- PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <!-- Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: url("../img/chalet-bg.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        header {
            background: rgba(122, 0, 16, 0.85);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            backdrop-filter: blur(4px);
        }

        /* Bloc premium réduit */
        .panel, #calendar {
            width: 600px;
            margin: 30px auto;
            background: rgba(255,255,255,0.90);
            padding: 25px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #7A0010;
            color: white;
            padding: 10px;
            cursor: pointer;
            border-radius: 4px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover { background: #f0f0f0; }

        button {
            background: #7A0010;
            color: white;
            padding: 8px 12px;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            margin-left: 5px;
        }

        button:hover { background: #5a000c; }

        .top-buttons {
            width: 600px;
            margin: 20px auto;
            text-align: right;
        }
    </style>
</head>

<body>

<header>Liste des Réservations – Chalet Le Bon Laron</header>

<div class="top-buttons">
    <button onclick="window.location.href='admin-chalet.html'">⬅ Retour gestion</button>
    <button onclick="exportPDF()">PDF</button>
    <button onclick="exportExcel()">Excel</button>
</div>

<div id="calendar"></div>

<div class="panel">
    <h3>Liste complète des réservations</h3>

    <table id="reservationsTable">
        <thead>
            <tr>
                <th onclick="sortTable(0)">Type</th>
                <th onclick="sortTable(1)">Compagnon</th>
                <th onclick="sortTable(2)">Début</th>
                <th onclick="sortTable(3)">Fin</th>
            </tr>
        </thead>
        <tbody id="reservationsBody"></tbody>
    </table>
</div>

<script>
    const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");
    let reservationsList = [];

    function sortTable(col) {
        const table = document.getElementById("reservationsTable");
        let switching = true;
        let dir = "asc";

        while (switching) {
            switching = false;
            const rows = table.rows;

            for (let i = 1; i < rows.length - 1; i++) {
                let shouldSwitch = false;

                const x = rows[i].getElementsByTagName("TD")[col];
                const y = rows[i + 1].getElementsByTagName("TD")[col];

                if (dir === "asc" && x.innerHTML.toLowerCase() > y.innerHTML.toLowerCase()) {
                    shouldSwitch = true;
                } else if (dir === "desc" && x.innerHTML.toLowerCase() < y.innerHTML.toLowerCase()) {
                    shouldSwitch = true;
                }

                if (shouldSwitch) {
                    rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
                    switching = true;
                    break;
                }
            }

            if (!switching && dir === "asc") {
                dir = "desc";
                switching = true;
            }
        }
    }

    function populateTable() {
        const tbody = document.getElementById("reservationsBody");
        tbody.innerHTML = "";

        reservationsList.forEach(r => {
            tbody.innerHTML += `
                <tr>
                    <td>${r.type}</td>
                    <td>${r.compagnonName || "-"}</td>
                    <td>${r.startDate.substring(0,10)}</td>
                    <td>${r.endDate.substring(0,10)}</td>
                </tr>
            `;
        });
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        const rows = reservationsList.map(r => [
            r.type,
            r.compagnonName || "-",
            r.startDate.substring(0,10),
            r.endDate.substring(0,10)
        ]);

        doc.text("Liste des réservations du chalet", 14, 15);

        doc.autoTable({
            head: [["Type", "Compagnon", "Début", "Fin"]],
            body: rows,
            startY: 25
        });

        doc.save("chalet_reservations.pdf");
    }

    function exportExcel() {
        const rows = reservationsList.map(r => ({
            Type: r.type,
            Compagnon: r.compagnonName || "-",
            Début: r.startDate.substring(0,10),
            Fin: r.endDate.substring(0,10)
        }));

        const worksheet = XLSX.utils.json_to_sheet(rows);
        const workbook = XLSX.utils.book_new();

        XLSX.utils.book_append_sheet(workbook, worksheet, "Réservations");

        XLSX.writeFile(workbook, "chalet_reservations.xlsx");
    }

    document.addEventListener("DOMContentLoaded", async function () {
        const events = await pb.collection("chalet_reservations").getFullList({
            expand: "compagnon"
        });

        reservationsList = events.map(r => ({
            id: r.id,
            type: r.type,
            startDate: r.startDate,
            endDate: r.endDate,
            compagnonName: r.expand?.compagnon ? r.expand.compagnon.nom + " " + r.expand.compagnon.prenom : null
        }));

        populateTable();

        const calendarEl = document.getElementById("calendar");

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: "dayGridMonth",
            locale: "fr",
            events: events.map(r => ({
                id: r.id,
                title: r.type + (r.expand?.compagnon ? " – " + r.expand.compagnon.nom : ""),
                start: r.startDate,
                end: r.endDate,
                backgroundColor: {
                    "Interne": "#7A0010",
                    "Nettoyage": "#1E90FF",
                    "Frairie": "#32CD32",
                    "Externe": "#FF8C00",
                    "Travaux": "#8B4513"
                }[r.type] || "#555"
            }))
        });

        calendar.render();
    });
</script>

</body>
</html>
