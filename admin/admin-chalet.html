<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Gestion du Chalet Le Bon Laron</title>

    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }

        header {
            background: #7A0010;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        #calendar {
            max-width: 1100px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        .panel {
            max-width: 1100px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        label {
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            background: #7A0010;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #5a000c;
        }

        #deleteBtn {
            background: #444;
            margin-left: 10px;
        }
    </style>
</head>

<body>

<header>Gestion du Chalet – Admin</header>

<div id="calendar"></div>

<div class="panel">
    <h3>Nouvelle / Modifier une réservation</h3>

    <label>Type</label>
    <select id="type">
        <option value="Interne">Interne</option>
        <option value="Nettoyage">Nettoyage</option>
        <option value="Frairie">Frairie</option>
        <option value="Externe">Externe</option>
        <option value="Travaux">Travaux</option>
    </select>

    <label>Compagnon (si interne)</label>
    <select id="compagnon"></select>

    <label>Date début</label>
    <input type="date" id="startDate">

    <label>Date fin</label>
    <input type="date" id="endDate">

    <label>Description</label>
    <textarea id="description"></textarea>

    <label>Électricité – début</label>
    <input type="number" id="electricityStart">

    <label>Électricité – fin</label>
    <input type="number" id="electricityEnd">

    <label>Eau – début</label>
    <input type="number" id="waterStart">

    <label>Eau – fin</label>
    <input type="number" id="waterEnd">

    <button onclick="saveReservation()">Enregistrer</button>
    <button id="deleteBtn" onclick="deleteReservation()" style="display:none;">Supprimer</button>
</div>

<script>
    const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

    let currentEventId = null;

    // Charger les compagnons
    async function loadCompagnons() {
        const list = await pb.collection("companions").getFullList();
        const select = document.getElementById("compagnon");
        select.innerHTML = "<option value=''>Aucun</option>";

        list.forEach(c => {
            select.innerHTML += `<option value="${c.id}">${c.nom} ${c.prenom}</option>`;
        });
    }

    // Sauvegarder une réservation
    async function saveReservation() {
        const data = {
            type: document.getElementById("type").value,
            compagnon: document.getElementById("compagnon").value || null,
            startDate: document.getElementById("startDate").value,
            endDate: document.getElementById("endDate").value,
            description: document.getElementById("description").value,
            electricityStart: document.getElementById("electricityStart").value || null,
            electricityEnd: document.getElementById("electricityEnd").value || null,
            waterStart: document.getElementById("waterStart").value || null,
            waterEnd: document.getElementById("waterEnd").value || null,
            created_by: pb.authStore.model.id
        };

        if (currentEventId) {
            await pb.collection("chalet_reservations").update(currentEventId, data);
        } else {
            await pb.collection("chalet_reservations").create(data);
        }

        location.reload();
    }

    // Supprimer une réservation
    async function deleteReservation() {
        if (!currentEventId) return;

        if (confirm("Supprimer définitivement cette réservation ?")) {
            await pb.collection("chalet_reservations").delete(currentEventId);
            location.reload();
        }
    }

    // Charger une réservation dans le panneau
    async function loadReservation(id) {
        const r = await pb.collection("chalet_reservations").getOne(id);

        currentEventId = id;

        document.getElementById("type").value = r.type;
        document.getElementById("compagnon").value = r.compagnon || "";
        document.getElementById("startDate").value = r.startDate.substring(0, 10);
        document.getElementById("endDate").value = r.endDate.substring(0, 10);
        document.getElementById("description").value = r.description || "";

        document.getElementById("electricityStart").value = r.electricityStart || "";
        document.getElementById("electricityEnd").value = r.electricityEnd || "";
        document.getElementById("waterStart").value = r.waterStart || "";
        document.getElementById("waterEnd").value = r.waterEnd || "";

        document.getElementById("deleteBtn").style.display = "inline-block";
    }

    // Initialisation du calendrier
    document.addEventListener("DOMContentLoaded", async function () {
        await loadCompagnons();

        const calendarEl = document.getElementById("calendar");

        const events = await pb.collection("chalet_reservations").getFullList();

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: "dayGridMonth",
            locale: "fr",
            events: events.map(r => ({
                id: r.id,
                title: r.type,
                start: r.startDate,
                end: r.endDate,
                backgroundColor: {
                    "Interne": "#7A0010",
                    "Nettoyage": "#1E90FF",
                    "Frairie": "#32CD32",
                    "Externe": "#FF8C00",
                    "Travaux": "#8B4513"
                }[r.type] || "#555"
            })),
            eventClick: function (info) {
                loadReservation(info.event.id);
            }
        });

        calendar.render();
    });
</script>

</body>
</html>
