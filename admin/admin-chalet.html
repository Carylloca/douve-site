<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Gestion du Chalet Le Bon Laron</title>

    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }

        header {
            background: #7A0010;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        #calendar {
            max-width: 1100px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        .panel, .table-panel {
            max-width: 1100px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        label {
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            background: #7A0010;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #5a000c;
        }

        #deleteBtn {
            background: #444;
            margin-left: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #7A0010;
            color: white;
            padding: 10px;
            cursor: pointer;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f0f0f0;
        }
    </style>
</head>

<body>

<header>Gestion du Chalet – Admin</header>

<div id="calendar"></div>

<div class="panel">
    <h3>Nouvelle / Modifier une réservation</h3>

    <label>Type</label>
    <select id="type">
        <option value="Interne">Interne</option>
        <option value="Nettoyage">Nettoyage</option>
        <option value="Frairie">Frairie</option>
        <option value="Externe">Externe</option>
        <option value="Travaux">Travaux</option>
    </select>

    <label>Compagnon (si interne)</label>
    <select id="compagnon"></select>

    <label>Date début</label>
    <input type="date" id="startDate">

    <label>Date fin</label>
    <input type="date" id="endDate">

    <label>Description</label>
    <textarea id="description"></textarea>

    <label>Électricité – début</label>
    <input type="number" id="electricityStart">

    <label>Électricité – fin</label>
    <input type="number" id="electricityEnd">

    <label>Eau – début</label>
    <input type="number" id="waterStart">

    <label>Eau – fin</label>
    <input type="number" id="waterEnd">

    <button onclick="saveReservation()">Enregistrer</button>
    <button id="deleteBtn" onclick="deleteReservation()" style="display:none;">Supprimer</button>
</div>

<div class="table-panel">
    <h3>Liste des réservations</h3>

    <table id="reservationsTable">
        <thead>
            <tr>
                <th onclick="sortTable(0)">Type</th>
                <th onclick="sortTable(1)">Compagnon</th>
                <th onclick="sortTable(2)">Début</th>
                <th onclick="sortTable(3)">Fin</th>
                <th onclick="sortTable(4)">Actions</th>
            </tr>
        </thead>
        <tbody id="reservationsBody"></tbody>
    </table>
</div>

<script>
    const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

    let currentEventId = null;
    let reservationsList = [];

    async function loadCompagnons() {
        const list = await pb.collection("companions").getFullList();
        const select = document.getElementById("compagnon");
        select.innerHTML = "<option value=''>Aucun</option>";

        list.forEach(c => {
            select.innerHTML += `<option value="${c.id}">${c.nom} ${c.prenom}</option>`;
        });
    }

    async function saveReservation() {
        const data = {
            type: document.getElementById("type").value,
            compagnon: document.getElementById("compagnon").value || null,
            startDate: document.getElementById("startDate").value,
            endDate: document.getElementById("endDate").value,
            description: document.getElementById("description").value,
            electricityStart: document.getElementById("electricityStart").value || null,
            electricityEnd: document.getElementById("electricityEnd").value || null,
            waterStart: document.getElementById("waterStart").value || null,
            waterEnd: document.getElementById("waterEnd").value || null,
            created_by: pb.authStore.model.id
        };

        if (currentEventId) {
            await pb.collection("chalet_reservations").update(currentEventId, data);
        } else {
            await pb.collection("chalet_reservations").create(data);
        }

        location.reload();
    }

    async function deleteReservation() {
        if (!currentEventId) return;

        if (confirm("Supprimer définitivement cette réservation ?")) {
            await pb.collection("chalet_reservations").delete(currentEventId);
            location.reload();
        }
    }

    async function loadReservation(id) {
        const r = await pb.collection("chalet_reservations").getOne(id);

        currentEventId = id;

        document.getElementById("type").value = r.type;
        document.getElementById("compagnon").value = r.compagnon || "";
        document.getElementById("startDate").value = r.startDate.substring(0, 10);
        document.getElementById("endDate").value = r.endDate.substring(0, 10);
        document.getElementById("description").value = r.description || "";

        document.getElementById("electricityStart").value = r.electricityStart || "";
        document.getElementById("electricityEnd").value = r.electricityEnd || "";
        document.getElementById("waterStart").value = r.waterStart || "";
        document.getElementById("waterEnd").value = r.waterEnd || "";

        document.getElementById("deleteBtn").style.display = "inline-block";
    }

    function populateTable() {
        const tbody = document.getElementById("reservationsBody");
        tbody.innerHTML = "";

        reservationsList.forEach(r => {
            tbody.innerHTML += `
                <tr>
                    <td>${r.type}</td>
                    <td>${r.compagnonName || "-"}</td>
                    <td>${r.startDate.substring(0,10)}</td>
                    <td>${r.endDate.substring(0,10)}</td>
                    <td>
                        <button onclick="loadReservation('${r.id}')">Modifier</button>
                        <button onclick="deleteReservationFromTable('${r.id}')">Supprimer</button>
                    </td>
                </tr>
            `;
        });
    }

    async function deleteReservationFromTable(id) {
        if (confirm("Supprimer cette réservation ?")) {
            await pb.collection("chalet_reservations").delete(id);
            location.reload();
        }
    }

    function sortTable(col) {
        const table = document.getElementById("reservationsTable");
        let switching = true;
        let dir = "asc";

        while (switching) {
            switching = false;
            const rows = table.rows;

            for (let i = 1; i < rows.length - 1; i++) {
                let shouldSwitch = false;

                const x = rows[i].getElementsByTagName("TD")[col];
                const y = rows[i + 1].getElementsByTagName("TD")[col];

                if (dir === "asc" && x.innerHTML.toLowerCase() > y.innerHTML.toLowerCase()) {
                    shouldSwitch = true;
                } else if (dir === "desc" && x.innerHTML.toLowerCase() < y.innerHTML.toLowerCase()) {
                    shouldSwitch = true;
                }

                if (shouldSwitch) {
                    rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
                    switching = true;
                    break;
                }
            }

            if (!switching && dir === "asc") {
                dir = "desc";
                switching = true;
            }
        }
    }

    document.addEventListener("DOMContentLoaded", async function () {
        await loadCompagnons();

        const calendarEl = document.getElementById("calendar");

        const events = await pb.collection("chalet_reservations").getFullList({
            expand: "compagnon"
        });

        reservationsList = events.map(r => ({
            id: r.id,
            type: r.type,
            startDate: r.startDate,
            endDate: r.endDate,
            compagnonName: r.expand?.compagnon ? r.expand.compagnon.nom + " " + r.expand.compagnon.prenom : null
        }));

        populateTable();

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: "dayGridMonth",
            locale: "fr",
            events: events.map(r => ({
                id: r.id,
                title: r.type,
                start: r.startDate,
                end: r.endDate,
                backgroundColor: {
                    "Interne": "#7A0010",
                    "Nettoyage": "#1E90FF",
                    "Frairie": "#32CD32",
                    "Externe": "#FF8C00",
                    "Travaux": "#8B4513"
                }[r.type] || "#555"
            })),
            eventClick: function (info) {
                loadReservation(info.event.id);
            }
        });

        calendar.render();
    });
</script>

</body>
</html>
