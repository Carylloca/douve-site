<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Gestion du Bon Laron</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../favicon.png">

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: url("../img/page-admin-chalet.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        /* --- Barre supérieure --- */
        header {
            background: rgba(0, 0, 0, 0.85);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        .left-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #5A000C;
        }

        h2 {
            text-align: center;
            color: white;
            margin: 0;
            text-shadow: 0 0 10px black;
        }

        /* Overlay sombre */
        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 30px 0;
        }

        /* Bloc premium */
        .panel {
            width: 600px;
            margin: 20px auto;
            background: rgba(255,255,255,0.92);
            padding: 25px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            border-left: 10px solid transparent; /* Code couleur dynamique */
        }

        /* Deux colonnes */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 25px;
        }

        .full {
            grid-column: span 2;
        }

        @media (max-width: 700px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full {
                grid-column: span 1;
            }
        }

        label { font-weight: bold; }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button.action {
            background: #7A0010;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            margin-right: 10px;
        }

        button.action:hover { background: #5a000c; }

        #deleteBtn { background: #444; }
    </style>
</head>

<body>

<header>
    <div class="left-buttons">
        <a href="../index.html" class="btn">🏠 Menu</a>
        <a href="admin-menu.html" class="btn">📋 Accueil admin</a>
        <a href="admin-chalet-liste.html" class="btn">📋 Liste des réservations</a>
    </div>

    <h2>Admin – Gestion du Bon Laron</h2>

    <button class="btn" onclick="logout()">⏻ Déconnexion</button>
</header>

<div class="overlay">

    <div class="panel" id="panel">
        <h3 style="text-align:center;">Nouvelle / Modifier une réservation</h3>

        <div class="form-grid">

            <div class="full">
                <label>Status</label>
                <select id="status" onchange="updateStatusColor()">
                    <option value="Réservation en cours">Réservation en cours</option>
                    <option value="Confirmée">Confirmée</option>
                    <option value="Terminée">Terminée</option>
                    <option value="Annulée">Annulée</option>
                </select>
            </div>

            <div>
                <label>Type</label>
                <select id="type">
                    <option value="Interne">Interne</option>
                    <option value="Nettoyage">Nettoyage</option>
                    <option value="Frairie">Frairie</option>
                    <option value="Externe">Externe</option>
                    <option value="Travaux">Travaux</option>
                </select>
            </div>

            <div>
                <label>Compagnon (si interne)</label>
                <select id="compagnon"></select>
            </div>

            <div class="full">
                <label>Description</label>
                <textarea id="description"></textarea>
            </div>

            <div>
                <label>Date début</label>
                <input type="date" id="startDate">
            </div>

            <div>
                <label>Date fin</label>
                <input type="date" id="endDate">
            </div>

            <div>
                <label>Électricité – début</label>
                <input type="number" id="electricityStart">
            </div>

            <div>
                <label>Électricité – fin</label>
                <input type="number" id="electricityEnd">
            </div>

            <div>
                <label>Eau – début</label>
                <input type="number" id="waterStart">
            </div>

            <div>
                <label>Eau – fin</label>
                <input type="number" id="waterEnd">
            </div>

            <div class="full" style="text-align:center; margin-top:10px;">
                <button class="action" type="button" onclick="saveReservation()">Enregistrer</button>
                <button class="action" type="button" id="deleteBtn" onclick="deleteReservation()" style="display:none;">Supprimer</button>
            </div>

        </div>
    </div>

</div>

<script>
    const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");
    let currentEventId = null;

    function updateStatusColor() {
        const panel = document.getElementById("panel");
        const statusValue = document.getElementById("status").value;

        const colors = {
            "Réservation en cours": "#1E90FF",
            "Confirmée": "#32CD32",
            "Terminée": "#8B4513",
            "Annulée": "#B22222"
        };

        panel.style.borderLeftColor = colors[statusValue] || "transparent";
    }

    async function loadCompagnons() {
        try {
            const list = await pb.collection("companions").getFullList();
            const select = document.getElementById("compagnon");
            select.innerHTML = "<option value=''>Aucun</option>";

            list.forEach(c => {
                select.innerHTML += `<option value="${c.id}">${c.nom} ${c.prenom}</option>`;
            });
        } catch (e) {
            console.error(e);
            alert("Erreur lors du chargement des compagnons.");
        }
    }

    async function saveReservation() {
        const statusEl = document.getElementById("status");
        const typeEl = document.getElementById("type");
        const compagnonEl = document.getElementById("compagnon");
        const startDateEl = document.getElementById("startDate");
        const endDateEl = document.getElementById("endDate");
        const descriptionEl = document.getElementById("description");
        const electricityStartEl = document.getElementById("electricityStart");
        const electricityEndEl = document.getElementById("electricityEnd");
        const waterStartEl = document.getElementById("waterStart");
        const waterEndEl = document.getElementById("waterEnd");

        try {
            const data = {
                status: statusEl.value,
                type: typeEl.value,
                compagnon: compagnonEl.value || null,
                startDate: startDateEl.value,
                endDate: endDateEl.value,
                description: descriptionEl.value,
                electricityStart: electricityStartEl.value || null,
                electricityEnd: electricityEndEl.value || null,
                waterStart: waterStartEl.value || null,
                waterEnd: waterEndEl.value || null,
                created_by: pb.authStore.model ? pb.authStore.model.id : null
            };

            if (currentEventId) {
                await pb.collection("chalet_reservations").update(currentEventId, data);
            } else {
                await pb.collection("chalet_reservations").create(data);
            }

            alert("Réservation enregistrée !");
            location.reload();
        } catch (e) {
            console.error(e);
            alert("Erreur lors de l'enregistrement de la réservation.");
        }
    }

    async function deleteReservation() {
        if (!currentEventId) return;

        if (!confirm("Supprimer définitivement cette réservation ?")) return;

        try {
            await pb.collection("chalet_reservations").delete(currentEventId);
            alert("Réservation supprimée !");
            location.reload();
        } catch (e) {
            console.error(e);
            alert("Erreur lors de la suppression de la réservation.");
        }
    }

    async function loadReservation(id) {
        try {
            const r = await pb.collection("chalet_reservations").getOne(id);
            currentEventId = id;

            document.getElementById("status").value = r.status || "Réservation en cours";
            document.getElementById("type").value = r.type;
            document.getElementById("compagnon").value = r.compagnon || "";
            document.getElementById("startDate").value = r.startDate.substring(0, 10);
            document.getElementById("endDate").value = r.endDate.substring(0, 10);
            document.getElementById("description").value = r.description || "";
            document.getElementById("electricityStart").value = r.electricityStart || "";
            document.getElementById("electricityEnd").value = r.electricityEnd || "";
            document.getElementById("waterStart").value = r.waterStart || "";
            document.getElementById("waterEnd").value = r.waterEnd || "";

            document.getElementById("deleteBtn").style.display = "inline-block";
            updateStatusColor();
        } catch (e) {
            console.error(e);
            alert("Erreur lors du chargement de la réservation.");
        }
    }

    function logout() {
        pb.authStore.clear();
        window.location.href = "admin-login.html";
    }

    document.addEventListener("DOMContentLoaded", async () => {
        if (!pb.authStore.isValid) {
            window.location.href = "admin-login.html";
            return;
        }

        await loadCompagnons();
        updateStatusColor();
    });
</script>

</body>
</html>
