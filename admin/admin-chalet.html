<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Gestion du Chalet Le Bon Laron</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }

        header {
            background: #7A0010;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        #calendar {
            max-width: 1100px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        .panel {
            max-width: 1100px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        label {
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            background: #7A0010;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #5a000c;
        }
    </style>
</head>

<body>

<header>Gestion du Chalet – Admin</header>

<div id="calendar"></div>

<div class="panel">
    <h3>Nouvelle / Modifier une réservation</h3>

    <label>Type</label>
    <select id="type">
        <option value="Interne">Interne</option>
        <option value="Nettoyage">Nettoyage</option>
        <option value="Frairie">Frairie</option>
        <option value="Externe">Externe</option>
        <option value="Travaux">Travaux</option>
    </select>

    <label>Compagnon (si interne)</label>
    <select id="compagnon"></select>

    <label>Date début</label>
    <input type="date" id="startDate">

    <label>Date fin</label>
    <input type="date" id="endDate">

    <label>Description</label>
    <textarea id="description"></textarea>

    <button onclick="saveReservation()">Enregistrer</button>
</div>
