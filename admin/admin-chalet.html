<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Gestion du Chalet Le Bon Laron</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../favicon.png">

    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <!-- PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <!-- Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: url("../img/chalet-bg.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        header {
            background: rgba(122, 0, 16, 0.85);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            backdrop-filter: blur(4px);
        }

        #calendar {
            max-width: 1100px;
            margin: 30px auto;
            background: rgba(255,255,255,0.92);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(3px);
        }

        .panel, .table-panel {
            max-width: 1100px;
            margin: 20px auto;
            background: rgba(255,255,255,0.92);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(3px);
        }

        label { font-weight: bold; }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            background: #7A0010;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover { background: #5a000c; }

        #deleteBtn { background: #444; margin-left: 10px; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #7A0010;
            color: white;
            padding: 10px;
            cursor: pointer;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover { background: #f0f0f0; }
    </style>
</head>

<body>

<header>Gestion du Chalet – Admin</header>

<div id="calendar"></div>

<div style="max-width:1100px; margin:20px auto; text-align:right;">
    <button onclick="exportCalendarPDF()">Exporter PDF (global)</button>
    <button onclick="exportCalendarExcel()">Exporter Excel (global)</button>
</div>

<div class="panel">
    <h3>Nouvelle / Modifier une réservation</h3>

    <label>Type</label>
    <select id="type">
        <option value="Interne">Interne</option>
        <option value="Nettoyage">Nettoyage</option>
        <option value="Frairie">Frairie</option>
        <option value="Externe">Externe</option>
        <option value="Travaux">Travaux</option>
    </select>

    <label>Compagnon (si interne)</label>
    <select id="compagnon"></select>

    <label>Date début</label>
    <input type="date" id="startDate">

    <label>Date fin</label>
    <input type="date" id="endDate">

    <label>Description</label>
    <textarea id="description"></textarea>

    <label>Électricité – début</label>
    <input type="number" id="electricityStart">

    <label>Électricité – fin</label>
    <input type="number" id="electricityEnd">

    <label>Eau – début</label>
    <input type="number" id="waterStart">

    <label>Eau – fin</label>
    <input type="number" id="waterEnd">

    <button onclick="saveReservation()">Enregistrer</button>
    <button id="deleteBtn" onclick="deleteReservation()" style="display:none;">Supprimer</button>
</div>

<div class="table-panel">
    <h3>Liste des réservations</h3>

    <table id="reservationsTable">
        <thead>
            <tr>
                <th onclick="sortTable(0)">Type</th>
                <th onclick="sortTable(1)">Compagnon</th>
                <th onclick="sortTable(2)">Début</th>
                <th onclick="sortTable(3)">Fin</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="reservationsBody"></tbody>
    </table>
</div>

<script>
/* --- CODE JS IDENTIQUE À LA VERSION PRÉCÉDENTE (inchangé) --- */
/* Je ne le répète pas ici pour éviter un message trop long,
   mais je peux te le remettre complet si tu veux. */
</script>

</body>
</html>
