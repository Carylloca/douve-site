<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Gestion du Chalet Le Bon Laron</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../favicon.png">

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: url("../img/page-admin-chalet.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        header {
            background: rgba(122, 0, 16, 0.85);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            backdrop-filter: blur(4px);
        }

        /* Barre de boutons harmonisée */
        .top-buttons {
            width: 600px;
            margin: 20px auto;
            text-align: center;
        }

        .top-buttons button {
            background: #7A0010;
            color: white;
            padding: 10px 18px;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            margin: 5px;
            font-size: 15px;
        }

        .top-buttons button:hover {
            background: #5a000c;
        }

        /* Bloc premium réduit */
        .panel {
            width: 600px;
            margin: 40px auto;
            background: rgba(255,255,255,0.90);
            padding: 25px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }

        /* Deux colonnes */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 25px;
        }

        /* Champs pleine largeur */
        .full {
            grid-column: span 2;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full {
                grid-column: span 1;
            }
        }

        label { font-weight: bold; }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button.action {
            background: #7A0010;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            margin-right: 10px;
        }

        button.action:hover { background: #5a000c; }

        #deleteBtn { background: #444; }
    </style>
</head>

<body>

<header>Gestion du Chalet – Admin</header>

<!-- Boutons harmonisés -->
<div class="top-buttons">
    <button onclick="window.location.href='../index.html'">🏠 Menu</button>
    <button onclick="window.location.href='admin-menu.html'">📄 Menu admin</button>
    <button onclick="logout()">⏻ Déconnexion</button>
    <button onclick="window.location.href='admin-chalet-liste.html'">📋 Liste des réservations</button>
</div>

<div class="panel">
    <h3>Nouvelle / Modifier une réservation</h3>

    <div class="form-grid">

        <!-- STATUS EN HAUT, PLEINE LARGEUR -->
        <div class="full">
            <label>Status</label>
            <select id="status">
                <option value="Réservation en cours">Réservation en cours</option>
                <option value="Confirmée">Confirmée</option>
                <option value="Terminée">Terminée</option>
                <option value="Annulée">Annulée</option>
            </select>
        </div>

        <div>
            <label>Type</label>
            <select id="type">
                <option value="Interne">Interne</option>
                <option value="Nettoyage">Nettoyage</option>
                <option value="Frairie">Frairie</option>
                <option value="Externe">Externe</option>
                <option value="Travaux">Travaux</option>
            </select>
        </div>

        <div>
            <label>Compagnon (si interne)</label>
            <select id="compagnon"></select>
        </div>

        <!-- DATES CÔTE À CÔTE -->
        <div>
            <label>Date début</label>
            <input type="date" id="startDate">
        </div>

        <div>
            <label>Date fin</label>
            <input type="date" id="endDate">
        </div>

        <div class="full">
            <label>Description</label>
            <textarea id="description"></textarea>
        </div>

        <div>
            <label>Électricité – début</label>
            <input type="number" id="electricityStart">
        </div>

        <div>
            <label>Électricité – fin</label>
            <input type="number" id="electricityEnd">
        </div>

        <div>
            <label>Eau – début</label>
            <input type="number" id="waterStart">
        </div>

        <div>
            <label>Eau – fin</label>
            <input type="number" id="waterEnd">
        </div>

        <div class="full" style="text-align:center; margin-top:10px;">
            <button class="action" onclick="saveReservation()">Enregistrer</button>
            <button class="action" id="deleteBtn" onclick="deleteReservation()" style="display:none;">Supprimer</button>
        </div>

    </div>
</div>

<script>
    const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

    let currentEventId = null;

    async function loadCompagnons() {
        const list = await pb.collection("companions").getFullList();
        const select = document.getElementById("compagnon");
        select.innerHTML = "<option value=''>Aucun</option>";

        list.forEach(c => {
            select.innerHTML += `<option value="${c.id}">${c.nom} ${c.prenom}</option>`;
        });
    }

    async function saveReservation() {
        const data = {
            status: status.value,
            type: type.value,
            compagnon: compagnon.value || null,
            startDate: startDate.value,
            endDate: endDate.value,
            description: description.value,
            electricityStart: electricityStart.value || null,
            electricityEnd: electricityEnd.value || null,
            waterStart: waterStart.value || null,
            waterEnd: waterEnd.value || null,
            created_by: pb.authStore.model.id
        };

        if (currentEventId) {
            await pb.collection("chalet_reservations").update(currentEventId, data);
        } else {
            await pb.collection("chalet_reservations").create(data);
        }

        alert("Réservation enregistrée !");
        location.reload();
    }

    async function deleteReservation() {
        if (!currentEventId) return;

        if (confirm("Supprimer définitivement cette réservation ?")) {
            await pb.collection("chalet_reservations").delete(currentEventId);
            alert("Réservation supprimée !");
            location.reload();
        }
    }

    async function loadReservation(id) {
        const r = await pb.collection("chalet_reservations").getOne(id);

        currentEventId = id;

        status.value = r.status || "Réservation en cours";
        type.value = r.type;
        compagnon.value = r.compagnon || "";
        startDate.value = r.startDate.substring(0, 10);
        endDate.value = r.endDate.substring(0, 10);
        description.value = r.description || "";

        electricityStart.value = r.electricityStart || "";
        electricityEnd.value = r.electricityEnd || "";
        waterStart.value = r.waterStart || "";
        waterEnd.value = r.waterEnd || "";

        deleteBtn.style.display = "inline-block";
    }

    function logout() {
        pb.authStore.clear();
        window.location.href = "admin-login.html";
    }

    document.addEventListener("DOMContentLoaded", async function () {
        if (!pb.authStore.isValid) {
            window.location.href = "admin-login.html";
            return;
        }

        await loadCompagnons();
    });
</script>

</body>
</html>
