<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Modifier une manifestation</title>

    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../css/style.css">

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- SheetJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("../img/page-admin-manifestation-modifier.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: "DM Sans", sans-serif;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
            justify-content: space-between;
        }

        .header-left,
        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .header-title {
            color: white;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 0 0 10px black;
        }

        .overlay {
            padding: 120px 20px 40px 20px;
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
        }

        form {
            background: rgba(255, 255, 255, 0.92);
            padding: 12px 18px;
            border-radius: 8px;
            max-width: 560px;
            margin: 0 auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .row {
            display: flex;
            align-items: center;
            margin: 4px 0;
        }

        .row label {
            width: 22%;
            text-align: left;
            padding-right: 8px;
            font-size: 14px;
            font-weight: bold;
        }

        .row input,
        .row textarea {
            width: 78%;
            padding: 6px 7px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        textarea {
            height: 80px;
        }

        .row-inline {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 78%;
        }

        #responsables {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px 4px;
            margin-top: 2px;
        }

        .responsable-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            padding: 1px 0;
            white-space: nowrap;
        }

        .responsable-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
        }

        .responsable-item span {
            flex: 1;
            text-align: left;
            padding-left: 2px;
        }

        .btn-submit {
            margin-top: 12px;
            width: 100%;
            padding: 10px;
        }

        .btn-modifier {
            background: #fff7c2 !important;
            color: #7b0f23 !important;
            border: 1px solid #d8c98a;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-left">
        <a href="../index.html" class="btn">🏠 Menu</a>
        <a href="admin-menu.html" class="btn">📋 Accueil admin</a>

        <!-- ⭐ NOUVEAU BOUTON DEMANDÉ -->
        <a href="admin-manifestations.html" class="btn">↩ Retour à Gestion</a>
    </div>

    <div class="header-title">Modifier la manifestation</div>

    <div class="header-right">
        <button class="btn" onclick="logout()">⏻ Déconnexion</button>
    </div>
</div>

<div class="overlay">

    <form id="manifestForm">

        <div class="row">
            <label>Titre</label>
            <input type="text" id="title" required>
        </div>

        <div class="row">
            <label>Description</label>
            <textarea id="description"></textarea>
        </div>

        <div class="row">
            <label>Date & Heure</label>
            <div class="row-inline">
                <input type="date" id="date" required>
                <input type="time" id="heure" required>
            </div>
        </div>

        <div class="row">
            <label>Date limite</label>
            <input type="date" id="date_limite">
        </div>

        <div class="row">
            <label>Places max</label>
            <input type="number" id="places_max" min="1">
        </div>

        <div class="row" style="align-items:flex-start;">
            <label style="padding-top:4px;">Responsables</label>
            <div id="responsables"></div>
        </div>

        <button type="submit" class="btn btn-submit btn-modifier">Enregistrer les modifications</button>
    </form>
</div>

<!-- PocketBase -->
<script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

<!-- Auth (pb + logout + requireComite) -->
<script src="../js/auth.js"></script>

<script>
    requireComite();

    const url = new URL(window.location.href);
    const manifestationId = url.searchParams.get("id");

    if (!manifestationId) {
        document.body.innerHTML = "<p style='color:white;'>Aucune manifestation sélectionnée.</p>";
    }

    async function loadResponsables(selected = []) {
        const container = document.getElementById("responsables");
        container.innerHTML = "<p>Chargement...</p>";

        const companions = await pb.collection("companions").getFullList({ sort: "nom" });

        container.innerHTML = "";

        companions.forEach(c => {
            const div = document.createElement("div");
            div.className = "responsable-item";

            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.value = c.id;
            if (selected.includes(c.id)) checkbox.checked = true;

            const label = document.createElement("span");
            label.textContent = `${c.nom} ${c.prenom} (${c.initiales})`;

            div.appendChild(checkbox);
            div.appendChild(label);
            container.appendChild(div);
        });
    }

    async function loadManifestation() {
        const m = await pb.collection("manifestations").getOne(manifestationId);

        document.getElementById("title").value = m.title;
        document.getElementById("description").value = m.description || "";

        const d = new Date(m.date);
        document.getElementById("date").value = d.toISOString().split("T")[0];
        document.getElementById("heure").value = d.toTimeString().slice(0,5);

        if (m.date_limite) {
            const dl = new Date(m.date_limite);
            document.getElementById("date_limite").value = dl.toISOString().split("T")[0];
        }

        document.getElementById("places_max").value = m.places_max || "";

        await loadResponsables(m.responsables || []);
    }

    loadManifestation();

    document.getElementById("manifestForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const date = document.getElementById("date").value;
        const heure = document.getElementById("heure").value;
        const dateFinale = `${date} ${heure}:00`;

        const responsables = Array.from(
            document.querySelectorAll("#responsables input[type='checkbox']:checked")
        ).map(cb => cb.value);

        const data = {
            title: document.getElementById("title").value.trim(),
            description: document.getElementById("description").value.trim(),
            date: dateFinale,
            date_limite: document.getElementById("date_limite").value || null,
            places_max: document.getElementById("places_max").value || null,
            responsables: responsables
        };

        await pb.collection("manifestations").update(manifestationId, data);

        alert("Modifications enregistrées !");
        window.location.href = "admin-manifestations.html";
    });
</script>

</body>
</html>
