<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin – Modifier une manifestation</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../favicon.png">

    <!-- jsPDF (PDF export) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- SheetJS (Excel export) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("../img/page-admin-manifestation-modifier.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            text-shadow: 0 0 10px black;
        }

        .btn {
            display: inline-block;
            padding: 12px 20px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
            margin: 5px;
        }

        .btn:hover {
            background: #5A000C;
        }

        form {
            background: rgba(255, 255, 255, 0.92);
            padding: 25px;
            border-radius: 10px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        textarea {
            height: 120px;
        }

        select[multiple] {
            height: 120px;
        }

        .btn-submit {
            margin-top: 20px;
            width: 100%;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="overlay">
        <h1>Modifier la manifestation</h1>

        <div style="text-align:center;">
            <a href="admin-manifestations.html" class="btn">← Retour</a>
            <button class="btn" onclick="exportPDF()">Export PDF</button>
            <button class="btn" onclick="exportExcel()">Export Excel</button>
            <button class="btn" onclick="logout()">⏻ Déconnexion</button>
        </div>

        <form id="manifestForm">
            <label>Titre</label>
            <input type="text" id="title" required>

            <label>Description</label>
            <textarea id="description"></textarea>

            <label>Date</label>
            <input type="date" id="date" required>

            <label>Date limite d'inscription</label>
            <input type="date" id="date_limite">

            <label>Places maximum</label>
            <input type="number" id="places_max" min="1">

            <label>Responsables</label>
            <select id="responsables" multiple></select>

            <button type="submit" class="btn btn-submit">Enregistrer les modifications</button>
        </form>
    </div>

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <!-- Auth -->
    <script src="../js/auth.js"></script>

    <script>
        // 🔒 Sécurisation admin
        requireComite();

        // Récupérer l'ID dans l'URL
        const url = new URL(window.location.href);
        const manifestationId = url.searchParams.get("id");

        if (!manifestationId) {
            document.body.innerHTML = "<p style='color:white;'>Aucune manifestation sélectionnée.</p>";
        }

        let manifestationData = null;

        // Charger la liste des compagnons
        async function loadResponsablesList(selectedIds = []) {
            const select = document.getElementById("responsables");
            select.innerHTML = "<option>Chargement...</option>";

            try {
                const companions = await pb.collection("companions").getFullList({
                    sort: "nom"
                });

                select.innerHTML = "";

                companions.forEach(c => {
                    const opt = document.createElement("option");
                    opt.value = c.id;
                    opt.textContent = `${c.nom} ${c.prenom} (${c.initiales})`;

                    if (selectedIds.includes(c.id)) {
                        opt.selected = true;
                    }

                    select.appendChild(opt);
                });

            } catch (err) {
                console.error(err);
                select.innerHTML = "<option>Erreur de chargement</option>";
            }
        }

        // Charger les données existantes
        async function loadManifestation() {
            try {
                const m = await pb.collection("manifestations").getOne(manifestationId);
                manifestationData = m;

                document.getElementById("title").value = m.title;
                document.getElementById("description").value = m.description || "";
                document.getElementById("date").value = m.date;
                document.getElementById("date_limite").value = m.date_limite || "";
                document.getElementById("places_max").value = m.places_max || "";

                await loadResponsablesList(m.responsables || []);

            } catch (err) {
                alert("Erreur lors du chargement.");
                console.error(err);
            }
        }

        loadManifestation();

        // Enregistrer les modifications
        document.getElementById("manifestForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const responsablesSelect = document.getElementById("responsables");
            const responsables = Array.from(responsablesSelect.selectedOptions).map(o => o.value);

            const data = {
                title: document.getElementById("title").value.trim(),
                description: document.getElementById("description").value.trim(),
                date: document.getElementById("date").value,
                date_limite: document.getElementById("date_limite").value || null,
                places_max: document.getElementById("places_max").value || null,
                responsables: responsables
            };

            try {
                await pb.collection("manifestations").update(manifestationId, data);
                alert("Modifications enregistrées !");
                window.location.href = "admin-manifestations.html";
            } catch (err) {
                alert("Erreur lors de l'enregistrement.");
                console.error(err);
            }
        });

        /* --- Format nom fichier --- */
        function formatFileName(title, date) {
            const cleanTitle = title.normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/[^a-zA-Z0-9]/g, "_");

            return `${cleanTitle}_${date}`;
        }

        /* --- Export PDF --- */
        function exportPDF() {
            if (!manifestationData) return;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            let y = 10;

            doc.text(`Titre : ${manifestationData.title}`, 10, y); y += 8;
            doc.text(`Date : ${manifestationData.date}`, 10, y); y += 8;
            doc.text(`Places max : ${manifestationData.places_max || "-"}`, 10, y); y += 8;
            doc.text(`Date limite : ${manifestationData.date_limite || "-"}`, 10, y); y += 12;

            const fileName = formatFileName(manifestationData.title, manifestationData.date) + ".pdf";
            doc.save(fileName);
        }

        /* --- Export Excel --- */
        function exportExcel() {
            if (!manifestationData) return;

            const data = [{
                Titre: manifestationData.title,
                Date: manifestationData.date,
                Places_max: manifestationData.places_max || "-",
                Date_limite: manifestationData.date_limite || "-"
            }];

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Manifestation");

            const fileName = formatFileName(manifestationData.title, manifestationData.date) + ".xlsx";
            XLSX.writeFile(wb, fileName);
        }
    </script>
</body>
</html>
