<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accueil — Compagnons de la Douve</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-image: url('index.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
        }

        header {
            text-align: center;
            padding: 25px 0;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
        }

        header h1 {
            margin: 0;
            font-size: 38px;
            font-weight: 600;
        }

        #welcome {
            text-align: center;
            margin-top: -10px;
            font-size: 20px;
            color: #ffe6e6;
            text-shadow: 1px 1px 4px black;
        }

        .buttons {
            position: absolute;
            top: 50%;
            left: 40px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: rgba(139, 0, 0, 0.5);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            transition: background 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            text-align: center;
            min-width: 220px;
        }

        .btn:hover {
            background: rgba(179, 0, 0, 0.8);
        }

        footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
        }
    </style>
</head>

<body>

    <header>
        <h1>Bienvenue aux Compagnons de la Douve</h1>
        <div id="welcome"></div>
    </header>

    <div class="buttons">

        <!-- ⭐ Calendrier ouvre TOUJOURS compagnons.html -->
        <a href="compagnons.html" class="btn">Calendrier</a>

        <a href="chalet.html" class="btn">Occupation du chalet</a>

        <!-- ⭐ Correction : renvoie vers liste-compagnons.html -->
        <a href="liste-compagnons.html" class="btn">Liste des compagnons</a>

        <!-- ⭐ Bouton Administration (visible uniquement si user) -->
        <a href="admin/admin-manifestations.html" class="btn" id="adminBtn" style="display:none;">
            Administration
        </a>

        <!-- ⭐ Bouton Connexion (masqué si connecté) -->
        <a href="login.html" class="btn" id="loginBtn">Connexion</a>

        <!-- ⭐ Bouton Déconnexion (visible si connecté) -->
        <button onclick="logout()" class="btn" id="logoutBtn" style="display:none;">
            Déconnexion
        </button>
    </div>

    <footer>
        © Confrérie des Compagnons de la Douve
    </footer>

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <!-- Auth -->
    <script src="js/auth.js"></script>

    <!-- ⭐ Script dynamique -->
    <script>
        if (pb.authStore.isValid) {
            const user = pb.authStore.model;

            // Masquer Connexion
            document.getElementById("loginBtn").style.display = "none";

            // Afficher Déconnexion
            document.getElementById("logoutBtn").style.display = "block";

            // Afficher Bonjour {nom}
            const nom = user.nom || user.name || user.email || "compagnon";
            document.getElementById("welcome").textContent = "Bonjour " + nom;

            // Afficher Administration si user
            if (user.collectionName === "users") {
                document.getElementById("adminBtn").style.display = "block";
            }
        }
    </script>

</body>
</html>
