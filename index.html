<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accueil — Compagnons de la Douve</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-image: url('images/fond.jpg'); /* ton image de fond */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 40px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: rgba(139, 0, 0, 0.6); /* bordeaux transparent */
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            transition: background 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .btn:hover {
            background: rgba(179, 0, 0, 0.8);
        }

        footer {
            position: absolute;
            bottom: 10px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }
    </style>
</head>

<body>

    <h1>Bienvenue aux Compagnons de la Douve</h1>

    <div class="buttons">
        <a href="manifestations.html" class="btn">Manifestations</a>
        <a href="calendrier.html" class="btn">Calendrier</a>

        <a href="compagnons.html" class="btn">Liste des compagnons</a>

</html>
