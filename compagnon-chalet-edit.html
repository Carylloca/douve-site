<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier ma réservation – Chalet</title>

    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: url("img/page-compagnon-chalet-edit.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        header {
            background: rgba(0, 0, 0, 0.85);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn:hover { background: #5A000C; }

        h2 {
            text-align: center;
            color: white;
            margin: 0;
            text-shadow: 0 0 10px black;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 30px 0;
        }

        .panel {
            width: 600px;
            margin: 20px auto;
            background: rgba(255,255,255,0.92);
            padding: 25px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            border-left: 10px solid transparent;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 25px;
        }

        .full { grid-column: span 2; }

        @media (max-width: 700px) {
            .form-grid { grid-template-columns: 1fr; }
            .full { grid-column: span 1; }
        }

        label { font-weight: bold; }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        input[readonly], textarea[readonly] { background: #eee; }

        textarea { height: 80px; resize: vertical; }

        .save-btn {
            background: #7A0010;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            width: 100%;
            font-size: 16px;
            margin-top: 10px;
        }

        .save-btn:hover { background: #5a000c; }

        /* --- VIGNETTES FICHIERS --- */
        .file-preview {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f7f7f7;
            padding: 6px 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            border: 1px solid #ddd;
        }

        .file-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-preview img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .delete-file {
            background: #7A0010;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 14px;
        }

        .delete-file:hover { background: #5A000C; }
    </style>
</head>

<body>

<header>
    <a href="compagnon-chalet.html" class="btn">⬅ Retour</a>
    <h2>Modifier ma réservation</h2>
    <button class="btn" onclick="logout()">⏻ Déconnexion</button>
</header>

<div class="overlay">
    <div class="panel" id="panel">
        <h3 style="text-align:center;">Ma réservation</h3>

        <div class="form-grid">
            <div class="full">
                <label>Status</label>
                <input id="status" readonly>
            </div>

            <div>
                <label>Type</label>
                <input id="type" readonly>
            </div>

            <div>
                <label>Compagnon</label>
                <input id="compagnon" readonly>
            </div>

            <div class="full">
                <label>Description</label>
                <textarea id="description" readonly></textarea>
            </div>

            <div>
                <label>Date début</label>
                <input type="date" id="startDate" readonly>
            </div>

            <div>
                <label>Date fin</label>
                <input type="date" id="endDate" readonly>
            </div>

            <div>
                <label>Électricité – début</label>
                <input type="number" id="electricityStart">
            </div>

            <div>
                <label>Électricité – fin</label>
                <input type="number" id="electricityEnd">
            </div>

            <div>
                <label>Gaz – début</label>
                <input type="number" id="gasStart">
            </div>

            <div>
                <label>Gaz – fin</label>
                <input type="number" id="gasEnd">
            </div>

            <div class="full">
                <label>Ajouter des fichiers (images, PDF…)</label>
                <input type="file" id="files" multiple>
            </div>

            <div class="full" id="existingFiles"></div>

            <div class="full" style="text-align:center;">
                <button class="save-btn" onclick="save()">Enregistrer</button>
            </div>
        </div>
    </div>
</div>

<script>
const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");
let currentUser = null;
let reservation = null;
let deletedFiles = [];

// Raccourcir le nom affiché
function shortenFilename(name, max = 40) {
    return name.length > max ? name.substring(0, max) + "…" : name;
}

function logout() {
    pb.authStore.clear();
    window.location.href = "../index.html";
}

async function init() {
    currentUser = pb.authStore.model;
    if (!currentUser) {
        alert("Veuillez vous connecter.");
        window.location.href = "../login.html";
        return;
    }

    const id = new URLSearchParams(window.location.search).get("id");
    reservation = await pb.collection("chalet_reservations").getOne(id, { expand: "compagnon" });

    if (!reservation.expand?.compagnon || reservation.expand.compagnon.id !== currentUser.id) {
        alert("Vous ne pouvez modifier que vos propres réservations.");
        window.location.href = "compagnon-chalet.html";
        return;
    }

    document.getElementById("status").value = reservation.status;
    document.getElementById("type").value = reservation.type;
    document.getElementById("description").value = reservation.description;
    document.getElementById("startDate").value = reservation.startDate.substring(0,10);
    document.getElementById("endDate").value = reservation.endDate.substring(0,10);
    document.getElementById("compagnon").value =
        reservation.expand.compagnon.nom + " " + reservation.expand.compagnon.prenom;

    document.getElementById("electricityStart").value = reservation.electricityStart || "";
    document.getElementById("electricityEnd").value = reservation.electricityEnd || "";
    document.getElementById("gasStart").value = reservation.gasStart || "";
    document.getElementById("gasEnd").value = reservation.gasEnd || "";

    showExistingFiles();
}

function showExistingFiles() {
    const container = document.getElementById("existingFiles");
    container.innerHTML = "";

    if (reservation.files && reservation.files.length > 0) {
        container.innerHTML = "<h4>Fichiers existants :</h4>";

        reservation.files.forEach(f => {
            const url = pb.files.getUrl(reservation, f);

            const wrapper = document.createElement("div");
            wrapper.className = "file-preview";

            const left = document.createElement("div");
            left.className = "file-left";

            let preview;
            if (f.match(/\.(png|jpg|jpeg|webp|gif)$/i)) {
                preview = document.createElement("img");
                preview.src = url;
            } else {
                preview = document.createElement("span");
                preview.textContent = "📄";
                preview.style.fontSize = "32px";
            }

            const link = document.createElement("a");
            link.href = url;
            link.target = "_blank";
            link.textContent = shortenFilename(f);

            left.appendChild(preview);
            left.appendChild(link);

            const btn = document.createElement("button");
            btn.className = "delete-file";
            btn.textContent = "Supprimer";
            btn.onclick = () => deleteFile(f);

            wrapper.appendChild(left);
            wrapper.appendChild(btn);

            container.appendChild(wrapper);
        });
    }
}

async function deleteFile(filename) {
    // Confirmation
    if (!confirm("Voulez-vous vraiment supprimer ce fichier ?")) {
        return;
    }

    // Retirer le fichier de la liste locale
    reservation.files = reservation.files.filter(f => f !== filename);

    // Préparer FormData pour mise à jour immédiate
    const formData = new FormData();

    // Champs requis (on les renvoie tels quels)
    formData.append("status", reservation.status);
    formData.append("type", reservation.type);
    formData.append("description", reservation.description);
    formData.append("startDate", reservation.startDate);
    formData.append("endDate", reservation.endDate);
    formData.append("compagnon", reservation.compagnon);
    if (reservation.created_by) {
        formData.append("created_by", reservation.created_by);
    }

    // Champs modifiables (on renvoie les valeurs actuelles)
    formData.append("electricityStart", reservation.electricityStart ?? "");
    formData.append("electricityEnd", reservation.electricityEnd ?? "");
    formData.append("gasStart", reservation.gasStart ?? "");
    formData.append("gasEnd", reservation.gasEnd ?? "");

    // Ajouter les fichiers restants
    reservation.files.forEach(f => {
        formData.append("files", f);
    });

    try {
        // Mise à jour immédiate dans PocketBase
        await pb.collection("chalet_reservations").update(reservation.id, formData);

        // Rafraîchir l'affichage
        showExistingFiles();

        alert("Fichier supprimé.");
    } catch (e) {
        console.error(e);
        alert("Erreur PocketBase : " + JSON.stringify(e.data));
    }
}

async function save() {
    const formData = new FormData();

    formData.append("electricityStart", document.getElementById("electricityStart").value);
    formData.append("electricityEnd", document.getElementById("electricityEnd").value);
    formData.append("gasStart", document.getElementById("gasStart").value);
    formData.append("gasEnd", document.getElementById("gasEnd").value);

    formData.append("status", reservation.status);
    formData.append("type", reservation.type);
    formData.append("description", reservation.description);
    formData.append("startDate", reservation.startDate);
    formData.append("endDate", reservation.endDate);
    formData.append("compagnon", reservation.compagnon);
    if (reservation.created_by) {
        formData.append("created_by", reservation.created_by);
    }

    reservation.files.forEach(f => {
        formData.append("files", f);
    });

    const newFiles = document.getElementById("files").files;
    for (let i = 0; i < newFiles.length; i++) {
        formData.append("files", newFiles[i]);
    }

    try {
        await pb.collection("chalet_reservations").update(reservation.id, formData);
        alert("Modifications enregistrées.");
        window.location.href = "compagnon-chalet.html";
    } catch (e) {
        console.error(e);
        alert("Erreur PocketBase : " + JSON.stringify(e.data));
    }
}

init();
</script>

</body>
</html>
