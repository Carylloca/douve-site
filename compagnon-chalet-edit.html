<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier ma réservation – Chalet</title>

    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: url("img/page-compagnon-chalet-edit.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        header {
            background: rgba(0, 0, 0, 0.85);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: #7A0010;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #5A000C;
        }

        h2 {
            text-align: center;
            color: white;
            margin: 0;
            text-shadow: 0 0 10px black;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 30px 0;
        }

        .panel {
            width: 600px;
            margin: 20px auto;
            background: rgba(255,255,255,0.92);
            padding: 25px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            border-left: 10px solid transparent;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 25px;
        }

        .full {
            grid-column: span 2;
        }

        @media (max-width: 700px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full {
                grid-column: span 1;
            }
        }

        label { font-weight: bold; }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        input[readonly], textarea[readonly] {
            background: #eee;
        }

        textarea {
            height: 80px;
            resize: vertical;
        }

        .save-btn {
            background: #7A0010;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            width: 100%;
            font-size: 16px;
            margin-top: 10px;
        }

        .save-btn:hover {
            background: #5a000c;
        }
    </style>
</head>

<body>

<header>
    <a href="compagnon-chalet.html" class="btn">⬅ Retour</a>
    <h2>Modifier ma réservation</h2>
    <button class="btn" onclick="logout()">⏻ Déconnexion</button>
</header>

<div class="overlay">

    <div class="panel" id="panel">

        <h3 style="text-align:center;">Ma réservation</h3>

        <div class="form-grid">

            <div class="full">
                <label>Status</label>
                <input id="status" readonly>
            </div>

            <div>
                <label>Type</label>
                <input id="type" readonly>
            </div>

            <div>
                <label>Compagnon</label>
                <input id="compagnon" readonly>
            </div>

            <div class="full">
                <label>Description</label>
                <textarea id="description" readonly></textarea>
            </div>

            <div>
                <label>Date début</label>
                <input type="date" id="startDate" readonly>
            </div>

            <div>
                <label>Date fin</label>
                <input type="date" id="endDate" readonly>
            </div>

            <div>
                <label>Électricité – début</label>
                <input type="number" id="electricityStart">
            </div>

            <div>
                <label>Électricité – fin</label>
                <input type="number" id="electricityEnd">
            </div>

            <div>
                <label>Eau – début</label>
                <input type="number" id="waterStart">
            </div>

            <div>
                <label>Eau – fin</label>
                <input type="number" id="waterEnd">
            </div>

            <div class="full" style="text-align:center;">
                <button class="save-btn" onclick="save()">Enregistrer</button>
            </div>

        </div>
    </div>

</div>

<script>
const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

let currentUser = null;
let reservation = null;

const statusColors = {
    "réservation en cours": "#1E90FF",
    "confirmée": "#32CD32",
    "terminée": "#8B4513",
    "annulée": "#B22222"
};

function logout() {
    pb.authStore.clear();
    window.location.href = "../index.html";
}

async function init() {
    currentUser = pb.authStore.model;

    if (!currentUser) {
        alert("Veuillez vous connecter.");
        window.location.href = "../login.html";
        return;
    }

    const id = new URLSearchParams(window.location.search).get("id");
    if (!id) {
        alert("Réservation introuvable.");
        window.location.href = "compagnon-chalet.html";
        return;
    }

    reservation = await pb.collection("chalet_reservations").getOne(id, {
        expand: "compagnon"
    });

    if (!reservation.expand?.compagnon || reservation.expand.compagnon.id !== currentUser.id) {
        alert("Vous ne pouvez modifier que vos propres réservations.");
        window.location.href = "compagnon-chalet.html";
        return;
    }

    document.getElementById("status").value = reservation.status;
    document.getElementById("type").value = reservation.type;
    document.getElementById("description").value = reservation.description;
    document.getElementById("startDate").value = reservation.startDate.substring(0,10);
    document.getElementById("endDate").value = reservation.endDate.substring(0,10);
    document.getElementById("compagnon").value =
        reservation.expand.compagnon.nom + " " + reservation.expand.compagnon.prenom;

    document.getElementById("electricityStart").value = reservation.electricityStart || "";
    document.getElementById("electricityEnd").value = reservation.electricityEnd || "";
    document.getElementById("waterStart").value = reservation.waterStart || "";
    document.getElementById("waterEnd").value = reservation.waterEnd || "";

    document.getElementById("panel").style.borderLeftColor =
        statusColors[reservation.status] || "#1E90FF";
}

async function save() {
    const data = {
        electricityStart: document.getElementById("electricityStart").value,
        electricityEnd: document.getElementById("electricityEnd").value,
        waterStart: document.getElementById("waterStart").value,
        waterEnd: document.getElementById("waterEnd").value
    };

    await pb.collection("chalet_reservations").update(reservation.id, data);

    alert("Modifications enregistrées.");
    window.location.href = "compagnon-chalet.html";
}

init();
</script>

</body>
</html>
