<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Disponibilités – Compagnon</title>
    <link rel="icon" type="image/png" href="../favicon.png">

    <!-- ⭐ PocketBase centralisé -->
    <script src="../js/pocketbase.umd.js"></script>
    <script src="../js/hebergement_pb.js"></script>

    <!-- ⭐ Initialisation PocketBase -->
    <script>
        const pb = new PocketBase(window.PB_URL);
    </script>

    <style>
        body {
            margin: 0;
            font-family: "DM Sans", sans-serif;
            background-image: url("../img/page-admin-evenement-public-nouveau.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header.admin-header {
            background: rgba(44, 62, 80, 0.90);
            padding: 18px 25px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
        }

        header h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 600;
        }

        .header-btn {
            background: #7A0010;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 15px;
        }

        .card {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            margin: 25px auto;
            border-radius: 10px;
            max-width: 900px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .jour-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        th {
            background: #eee;
            text-align: left;
        }

        .checkbox {
            transform: scale(1.3);
        }

        select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        .success { color: green; font-weight: bold; margin-top: 10px; }
        .error { color: red; font-weight: bold; margin-top: 10px; }
    </style>
</head>

<body>

<header class="admin-header">
    <h1 id="titrePage">Mes disponibilités</h1>
    <a href="../logout.html" class="header-btn">Déconnexion</a>
</header>

<div class="card">
    <h2>Poste souhaité</h2>
    <select id="poste_souhaite"></select>
    <p id="posteFeedback"></p>
</div>

<div id="joursContainer"></div>

<script>
const eventId = new URLSearchParams(window.location.search).get("event");
const compagnonId = new URLSearchParams(window.location.search).get("compagnon");

/* 🔐 Sécurité */
const user = pb.authStore.model;

if (!user) {
    window.location.href = "../login.html";
}

const targetCompagnon = compagnonId || user.id;

if (!["compagnon", "comite", "responsable"].includes(user.role)) {
    alert("Accès refusé.");
    window.location.href = "../index.html";
}

if (compagnonId && user.role === "compagnon") {
    alert("Accès interdit.");
    window.location.href = "../index.html";
}

if (user.role !== "compagnon") {
    document.getElementById("titrePage").textContent = "Disponibilités du compagnon";
}

/* Charger les postes */
async function loadPostes() {
    const postes = await pb.collection("planning_postes").getFullList({
        filter: `manifestation = "${eventId}"`,
        sort: "titre"
    });

    const select = document.getElementById("poste_souhaite");
    select.innerHTML = `<option value="">— Aucun —</option>`;

    postes.forEach(p => {
        select.innerHTML += `<option value="${p.id}">${p.titre}</option>`;
    });

    const dispo = await pb.collection("planning_disponibilites").getFullList({
        filter: `compagnon = "${targetCompagnon}" && planning_event = "${eventId}"`,
        sort: "-created"
    });

    if (dispo.length > 0 && dispo[0].poste_souhaite) {
        select.value = dispo[0].poste_souhaite;
    }

    select.addEventListener("change", savePosteSouhaite);
}

async function savePosteSouhaite() {
    const poste = document.getElementById("poste_souhaite").value;

    const feedback = document.getElementById("posteFeedback");
    feedback.textContent = "";

    try {
        await pb.collection("planning_disponibilites").create({
            compagnon: targetCompagnon,
            planning_event: eventId,
            poste_souhaite: poste,
            est_tiers: false
        });

        feedback.textContent = "Poste souhaité enregistré.";
        feedback.className = "success";

    } catch (err) {
        console.error(err);
        feedback.textContent = "Erreur lors de l’enregistrement.";
        feedback.className = "error";
    }
}

/* Charger jours + créneaux */
async function loadJoursEtCreneaux() {
    const jours = await pb.collection("planning_jours").getFullList({
        filter: `manifestation = "${eventId}"`,
        sort: "date"
    });

    const container = document.getElementById("joursContainer");

    for (const j of jours) {
        container.innerHTML += `
            <div class="card">
                <div class="jour-title">${j.nom_jour || j.date}</div>
                <table id="table-${j.id}">
                    <thead>
                        <tr>
                            <th>Heure</th>
                            <th>Disponible</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        `;

        loadCreneaux(j.id);
    }
}

/* Charger créneaux d’un jour */
async function loadCreneaux(jourId) {
    const creneaux = await pb.collection("planning_creneaux").getFullList({
        filter: `planning_jour = "${jourId}"`,
        sort: "heure_debut"
    });

    const dispo = await pb.collection("planning_disponibilites").getFullList({
        filter: `compagnon = "${targetCompagnon}" && planning_jour = "${jourId}"`,
    });

    const dispoMap = {};
    dispo.forEach(d => dispoMap[d.planning_creneau] = d.id);

    const tbody = document.querySelector(`#table-${jourId} tbody`);

    creneaux.forEach(c => {
        const checked = dispoMap[c.id] ? "checked" : "";

        tbody.innerHTML += `
            <tr>
                <td>${c.heure_debut} → ${c.heure_fin}</td>
                <td>
                    <input type="checkbox" class="checkbox"
                        onchange="toggleDispo('${c.id}', '${jourId}', this.checked)"
                        ${checked}>
                </td>
            </tr>
        `;
    });
}

/* Ajouter / supprimer disponibilité */
async function toggleDispo(creneauId, jourId, isChecked) {
    if (isChecked) {
        await pb.collection("planning_disponibilites").create({
            compagnon: targetCompagnon,
            planning_event: eventId,
            planning_jour: jourId,
            planning_creneau: creneauId,
            est_tiers: false
        });
    } else {
        const dispo = await pb.collection("planning_disponibilites").getFullList({
            filter: `compagnon = "${targetCompagnon}" && planning_creneau = "${creneauId}"`
        });

        if (dispo.length > 0) {
            await pb.collection("planning_disponibilites").delete(dispo[0].id);
        }
    }
}

/* Initialisation */
loadPostes();
loadJoursEtCreneaux();
</script>

</body>
</html>
