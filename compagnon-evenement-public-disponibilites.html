<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Disponibilités des compagnons – Admin</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "DM Sans", sans-serif;
            background-image: url("../img/page-admin-evenement-public-nouveau.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        header.admin-header {
            background: rgba(44, 62, 80, 0.90);
            padding: 18px 25px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
        }

        .header-btn {
            background: #7A0010;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 15px;
        }

        header h1 {
            width: 100%;
            text-align: center;
            margin: 10px 0 0 0;
            font-size: 28px;
            font-weight: 600;
        }

        .card {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 10px;
            max-width: 900px;
            margin: 30px auto;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        th {
            background: #eee;
            text-align: left;
        }

        .btn {
            background: #8b0000;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }

        .btn:hover {
            background: #b30000;
        }
    </style>
</head>

<body>

<header class="admin-header">
    <a href="../index.html" class="header-btn">Menu</a>
    <a href="admin-menu.html" class="header-btn">Menu admin</a>
    <h1>Disponibilités des compagnons</h1>
</header>

<div class="card">

    <table>
        <thead>
            <tr>
                <th>Nom</th>
                <th>Prénom</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="compagnonsTable"></tbody>
    </table>

</div>

<script>
const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

const eventId = new URLSearchParams(window.location.search).get("event");

/* 🔐 Sécurité */
const user = pb.authStore.model;

if (!user) {
    window.location.href = "../login.html";
}

if (user.role !== "comite" && user.role !== "responsable") {
    alert("Accès réservé au comité.");
    window.location.href = "../index.html";
}

/* Charger les compagnons */
async function loadCompagnons() {
    const companions = await pb.collection("companions").getFullList({
        sort: "nom"
    });

    const tbody = document.getElementById("compagnonsTable");
    tbody.innerHTML = "";

    companions.forEach(c => {
        tbody.innerHTML += `
            <tr>
                <td>${c.nom}</td>
                <td>${c.prenom}</td>
                <td>
                    <a class="btn"
                       href="../compagnon/compagnon-evenement-public-disponibilites.html?event=${eventId}&compagnon=${c.id}">
                       Voir / Modifier disponibilités
                    </a>
                </td>
            </tr>
        `;
    });
}

loadCompagnons();
</script>

</body>
</html>
