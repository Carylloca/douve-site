<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Manifestations</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* ======== IMAGE DE FOND PERSONNALISABLE ======== */
        body {
            margin: 0;
            padding: 0;
            background-image: url("page-manifestations.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        /* ======== OVERLAY ======== */
        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* ======== TITRE ======== */
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            text-shadow: 0 0 10px black;
        }

        /* ======== CARTE MANIFESTATION ======== */
        .manifest-card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 10px;
            padding: 20px;
            margin: 15px auto;
            max-width: 600px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .manifest-card h3 {
            margin-top: 0;
        }

        .btn {
            display: inline-block;
            padding: 10px 15px;
            background: #0078ff;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            margin-top: 10px;
        }

        .btn:hover {
            background: #005fcc;
        }
    </style>
</head>

<body>
    <div class="overlay">
        <h1>Manifestations</h1>

        <div id="manifestations">
            <p style="color:white;">Chargement...</p>
        </div>
    </div>

    <!-- PocketBase -->
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

    <!-- Auth -->
    <script src="js/auth.js"></script>

    <!-- API perso -->
    <script src="js/api.js"></script>

    <script>
        const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

        /* --- Format date + heure --- */
        function formatDateTime(dt) {
            if (!dt) return "-";
            const [date, time] = dt.split(" ");
            const [y, m, d] = date.split("-");
            return `${d}.${m}.${y} – ${time}`;
        }

        async function loadManifestations() {
            const container = document.getElementById("manifestations");
            container.innerHTML = "<p style='color:white;'>Chargement...</p>";

            try {
                const list = await pb.collection("manifestations").getFullList({
                    sort: "date"
                });

                if (list.length === 0) {
                    container.innerHTML = "<p style='color:white;'>Aucune manifestation disponible.</p>";
                    return;
                }

                container.innerHTML = "";

                list.forEach(m => {
                    const div = document.createElement("div");
                    div.className = "manifest-card";

                    div.innerHTML = `
                        <h3>${m.title}</h3>
                        <p><strong>Date :</strong> ${formatDateTime(m.date)}</p>
                        <p><strong>Description :</strong><br>${m.description || "-"}</p>
                        <a href="manifestation-details.html?id=${m.id}" class="btn">Voir détails</a>
                    `;

                    container.appendChild(div);
                });

            } catch (err) {
                console.error(err);
                container.innerHTML = "<p style='color:white;'>Erreur lors du chargement.</p>";
            }
        }

        loadManifestations();
    </script>
</body>
</html>
