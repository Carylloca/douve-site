<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des inscrits</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="../favicon.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("/img/page-manifestations.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        /* HEADER */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
        }

        .header-left {
            display: flex;
            gap: 10px;
        }

        .header-center {
            flex: 1;
            text-align: center;
            color: white;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 0 0 10px black;
        }

        .header-right {
            display: flex;
            gap: 10px;
        }

        /* PAGE */
        .overlay {
            background: rgba(0, 0, 0, 0.55);
            min-height: 100vh;
            padding: 120px 20px 40px 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 10px;
            padding: 20px;
            margin: 15px auto;
            max-width: 700px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            position: relative;
        }

        /* BOUTON GÉRER LES INSCRIPTIONS */
        #btnAdminEdit {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #7b0f23;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            display: none;
        }

        #btnAdminEdit:hover {
            background: #9c1a33;
        }

        /* TABLEAU */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #7b0f23;
            color: white;
        }

        /* BOUTONS BORDEAUX */
        .btn {
            display: inline-block;
            padding: 10px 15px;
            background: #7b0f23;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            margin-top: 15px;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #9c1a33;
        }

        /* BOUTON RETOUR */
        .btn-retour {
            background: #7b0f23 !important;
        }

        .btn-retour:hover {
            background: #9c1a33 !important;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-left">
        <a href="compagnons.html" class="btn btn-retour">← Menu</a>
    </div>

    <div class="header-center">
        Liste des inscrits
    </div>

    <div class="header-right">
        <button class="btn" onclick="exportPDF()">PDF</button>
        <button class="btn" onclick="exportExcel()">Excel</button>
    </div>
</div>

<div class="overlay">

    <div class="card">

        <a id="btnAdminEdit">Gérer les inscriptions</a>

        <p><strong>Manifestation :</strong> <span id="manifestTitle">Chargement...</span></p>
        <p><strong>Total inscrits :</strong> <span id="totalInscrits">0</span></p>

        <table>
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Téléphone</th>
                    <th>Email</th>
                    <th>Nb pers.</th>
                </tr>
            </thead>
            <tbody id="tableInscrits">
                <tr><td colspan="5">Chargement...</td></tr>
            </tbody>
        </table>

        <a href="compagnons.html" class="btn btn-retour">← Retour</a>

    </div>

</div>

<script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>

<script>
console.log("JS CHARGÉ");

const pb = new PocketBase("https://pocketbase-site-douve.onrender.com");

const urlParams = new URLSearchParams(window.location.search);
const manifestationId = urlParams.get("id");

let inscritsData = [];

async function loadInscrits() {
    try {
        const manifest = await pb.collection("manifestations").getOne(manifestationId, {
            expand: "responsables"
        });

        document.getElementById("manifestTitle").textContent = manifest.title;

        const user = pb.authStore.model;

        /* 🔥 Rôle comité = accès admin */
        const isComite = (user.role === "comite" && user.collectionName === "users");

        /* 🔥 Par défaut : pas responsable */
        let isResponsable = false;

        /* 🔥 Vérifie si l'utilisateur est responsable de CETTE manifestation */
        if (manifest.expand?.responsables?.length > 0) {
            isResponsable = manifest.expand.responsables.some(r => r.id === user.id);
        }

        /* 🔥 Le bouton n'apparaît QUE si :
           - l'utilisateur est comité
           - OU il est responsable de cette manifestation */
        if (isComite || isResponsable) {
            const btn = document.getElementById("btnAdminEdit");
            btn.href = `modification-responsable-inscrits-details.html?id=${manifestationId}`;
            btn.style.display = "inline-block";
        }

        const inscrits = await pb.collection("inscriptions").getFullList({
            filter: `manifestation = "${manifestationId}"`,
            expand: "companion"
        });

        inscritsData = inscrits;
        displayTable(inscrits);

        document.getElementById("totalInscrits").textContent = inscrits.length;

    } catch (err) {
        console.error("ERREUR loadInscrits :", err);
    }
}

function displayTable(list) {
    const tbody = document.getElementById("tableInscrits");
    tbody.innerHTML = "";

    if (list.length === 0) {
        tbody.innerHTML = "<tr><td colspan='5'>Aucun inscrit.</td></tr>";
        return;
    }

    list.forEach(i => {
        const c = i.expand?.companion;

        tbody.innerHTML += `
            <tr>
                <td>${c?.nom || "-"}</td>
                <td>${c?.prenom || "-"}</td>
                <td>${c?.telephone || "-"}</td>
                <td>${c?.email_public || "-"}</td>
                <td>${i.nb_personnes || 1}</td>
            </tr>
        `;
    });
}

function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.text("Liste des inscrits", 10, 10);

    let y = 20;
    inscritsData.forEach(i => {
        const c = i.expand?.companion;
        doc.text(
            `${c?.nom} ${c?.prenom} - ${c?.telephone} - ${c?.email_public} - ${i.nb_personnes} pers.`,
            10,
            y
        );
        y += 8;
    });

    doc.save("liste-inscrits.pdf");
}

function exportExcel() {
    const rows = inscritsData.map(i => {
        const c = i.expand?.companion;
        return {
            Nom: c?.nom,
            Prénom: c?.prenom,
            Téléphone: c?.telephone,
            Email: c?.email_public,
            "Nb personnes": i.nb_personnes
        };
    });

    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Inscrits");

    XLSX.writeFile(wb, "liste-inscrits.xlsx");
}

loadInscrits();
</script>

</body>
</html>
