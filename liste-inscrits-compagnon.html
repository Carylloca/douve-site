<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des inscrits</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
    <script src="js/auth.js"></script>

    <!-- Export PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Export Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body {
            margin: 0;
            background-image: url("img/page-compagnons.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: "DM Sans", sans-serif;
        }

        .overlay {
            background: rgba(0,0,0,0.55);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .header-title {
            font-size: 22px;
            font-weight: bold;
        }

        .btn {
            padding: 8px 12px;
            border-radius: 6px;
            background: white;
            color: #7b0f23;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #ffe6ea;
        }

        .container {
            padding: 110px 20px 40px 20px;
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #7b0f23;
            color: white;
            cursor: pointer;
        }

        th:hover {
            background: #9c1a33;
        }
    </style>
</head>

<body>

<div class="overlay">

    <div class="header">
        <a href="compagnons.html" class="btn">← Calendrier</a>
        <div class="header-title">Liste des inscrits</div>

        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="exportPDF()">PDF</button>
            <button class="btn" onclick="exportExcel()">Excel</button>
            <a href="index.html" class="btn">Menu</a>
            <button class="btn" onclick="logout()">Déconnexion</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2 id="manifestTitle">Chargement…</h2>
            <p><strong>Total inscrits :</strong> <span id="totalInscrits">0</span></p>
            <p><strong>Total personnes :</strong> <span id="totalPersonnes">0</span></p>
            <p><strong>Responsables :</strong> <span id="responsables">Chargement…</span></p>

            <table>
                <thead>
                    <tr>
                        <th onclick="sortTable(0)">Nom</th>
                        <th onclick="sortTable(1)">Prénom</th>
                        <th>Email</th>
                        <th>Téléphone</th>
                        <th>Initiales</th>
                        <th onclick="sortTable(5)">Nb pers.</th>
                    </tr>
                </thead>
                <tbody id="tableInscrits">
                    <tr><td colspan="6">Chargement…</td></tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

<script>
    requireCompanion();

    const url = new URL(window.location.href);
    const manifestId = url.searchParams.get("id");

    let inscriptionsData = [];

    async function loadInscrits() {
        try {
            // Manifestation + responsables
            const m = await pb.collection("manifestations").getOne(manifestId, {
                expand: "responsables"
            });

            document.getElementById("manifestTitle").textContent = m.title;

            // Affichage responsables
            if (m.expand?.responsables?.length > 0) {
                document.getElementById("responsables").textContent =
                    m.expand.responsables
                        .map(r => `${r.nom} ${r.prenom} (${r.initiales || ""})`)
                        .join(", ");
            } else {
                document.getElementById("responsables").textContent = "Non défini";
            }

            // Inscriptions
            const inscrits = await pb.collection("inscriptions").getFullList({
                filter: `manifestation = "${manifestId}"`,
                expand: "companion"
            });

            inscriptionsData = inscrits;

            const tbody = document.getElementById("tableInscrits");
            tbody.innerHTML = "";

            let totalPers = 0;

            inscrits.forEach(i => {
                const c = i.expand?.companion;
                const nb = i.nb_personnes || 1;
                totalPers += nb;

                tbody.innerHTML += `
                    <tr>
                        <td>${c?.nom || "-"}</td>
                        <td>${c?.prenom || "-"}</td>
                        <td>${c?.email || "-"}</td>
                        <td>${c?.telephone || "-"}</td>
                        <td>${c?.initiales || "-"}</td>
                        <td>${nb}</td>
                    </tr>
                `;
            });

            document.getElementById("totalInscrits").textContent = inscrits.length;
            document.getElementById("totalPersonnes").textContent = totalPers;

        } catch (err) {
            console.error(err);
            document.getElementById("tableInscrits").innerHTML =
                "<tr><td colspan='6'>Erreur de chargement.</td></tr>";
        }
    }

    // TRI DU TABLEAU
    function sortTable(col) {
        const tbody = document.getElementById("tableInscrits");
        const rows = Array.from(tbody.querySelectorAll("tr"));

        rows.sort((a, b) => {
            const A = a.children[col].innerText.toLowerCase();
            const B = b.children[col].innerText.toLowerCase();
            return A.localeCompare(B, "fr");
        });

        tbody.innerHTML = "";
        rows.forEach(r => tbody.appendChild(r));
    }

    // EXPORT EXCEL
    function exportExcel() {
        const data = inscriptionsData.map(i => ({
            Nom: i.expand?.companion?.nom || "",
            Prénom: i.expand?.companion?.prenom || "",
            Email: i.expand?.companion?.email || "",
            Téléphone: i.expand?.companion?.telephone || "",
            Initiales: i.expand?.companion?.initiales || "",
            "Nb personnes": i.nb_personnes || 1
        }));

        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Inscrits");

        XLSX.writeFile(wb, "inscrits.xlsx");
    }

    // EXPORT PDF
    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.text("Liste des inscrits", 10, 10);

        let y = 20;

        inscriptionsData.forEach(i => {
            const c = i.expand?.companion;
            doc.text(
                `${c?.nom || ""} ${c?.prenom || ""} - ${c?.email || ""} - ${c?.telephone || ""} - ${i.nb_personnes} pers.`,
                10,
                y
            );
            y += 8;
        });

        doc.save("inscrits.pdf");
    }

    loadInscrits();
</script>

</body>
</html>
